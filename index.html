<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網站公告</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    .divider {
      border: none;
      border-top: 1px solid #ececec;
      margin-bottom: 28px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .link-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s;
      word-break: break-all;
      margin-bottom: 28px;
    }

    .link-btn:hover {
      background: #1d4ed8;
    }

    .password-box {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 14px 20px;
      display: inline-block;
    }

    .password-box .pw-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }

    .password-box .pw-hint {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏠</div>
    <h1>網站已搬家</h1>
    <p class="subtitle">無毒!!!請安心使用!!!</p>
    <p class="copy-hint">不放心請複製前往 https://sophiesu000888.github.io/adminhub/index.html</p>
    <hr class="divider">
    <p class="label">新網址</p>
    <a class="link-btn" href="https://sophiesu000888.github.io/adminhub/index.html" target="_blank" rel="noopener noreferrer">
      前往新網站
    </a>
    <div class="password-box">
      <div class="pw-label">密碼提示</div>
      <div class="pw-hint">qwe*****8</div>
    </div>
  </div>
</body>
</html>
