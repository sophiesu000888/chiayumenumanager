/* ===== Firebase 登入列 ===== */

.history-entry-header {
  display: flex;
  align-items: center;
  gap: 10px;

}

  display: flex;

.btn-hist-restore {

.history-entry-body {

let weekCount = 0;

const STORAGE_KEY = "yupin_menu_v2";
const HISTORY_KEY = "yupin_menu_history_v1";

// ===== Firebase 狀態 =====
let currentUser = null;   // Firebase user 物件
let fbListenerActive = false;

// ===== 歷史紀錄資料 =====
let historyList = [];

// ── Firebase 登入 / 登出 ──
function fbLogin() {
  const { auth, provider, signInWithPopup, signInWithRedirect } = window._fb;
  // 手機用 redirect（較穩定），桌機用 popup
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if (isMobile) {
    signInWithRedirect(auth, provider).catch(e => alert("登入失敗：" + e.message));
  } else {
    signInWithPopup(auth, provider).catch(e => {
      // popup 失敗時 fallback 到 redirect
      signInWithRedirect(auth, provider).catch(e2 => alert("登入失敗：" + e2.message));
    });
  }
}
function fbLogout() {
  const { auth, signOut } = window._fb;
  signOut(auth);
}

// ── 更新 UI 登入狀態 ──
function updateAuthUI(user) {
  const loggedOut = document.getElementById("authLoggedOut");
  const loggedIn  = document.getElementById("authLoggedIn");
  if (user) {
    loggedOut.style.display = "none";
    loggedIn.style.display  = "flex";
    document.getElementById("authAvatar").src  = user.photoURL || "";
    document.getElementById("authName").textContent = user.displayName || user.email;
    document.getElementById("syncBadge").textContent = "⚡ 已連線";
    document.getElementById("syncBadge").className = "sync-badge";
  } else {
    loggedOut.style.display = "flex";
    loggedIn.style.display  = "none";
  }
}

// ── 從 Firebase 載入歷史 ──
async function loadHistory() {
  if (!window._fbReady) { historyList = []; return; }
  const { db, ref, get } = window._fb;
  try {
    const snap = await get(ref(db, "history"));
    if (snap.exists()) {
      historyList = snap.val();
      if (!Array.isArray(historyList)) historyList = [];
    } else { historyList = []; }
  } catch(e) {
    // fallback to localStorage
    try {
      const raw = localStorage.getItem(HISTORY_KEY);
      if (raw) historyList = JSON.parse(raw);
      if (!Array.isArray(historyList)) historyList = [];
    } catch(e2) { historyList = []; }
  }
}

// ── 儲存歷史到 Firebase ──
async function saveHistory() {
  if (!window._fbReady) {
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(historyList)); } catch(e) {}
    return;
  }
  const { db, ref, set } = window._fb;
  try {
    await set(ref(db, "history"), historyList);
  } catch(e) {
    alert("歷史紀錄儲存失敗：" + e.message);
  }
}

function showSaveToast(msg) {
  const t = document.getElementById("saveToast");
  t.textContent = msg || "✅ 已自動儲存";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function scheduleAutoSave() {
  clearTimeout(saveTimer);

    saveAll();
    showSaveToast("✅ 已自動儲存");
  }, 800);
}

function saveAll() {
  const data = [];
  document.querySelectorAll(".week-block").forEach(block => {
    const wid = block.id.replace("block_", "");
    const date = block.querySelector(".week-date")?.value || "";
    const info = weekDataMap[wid] || {};
    const hLocs = info.hLocs || [];
    const wLocs = info.wLocs || [];

    const locSels = [...block.querySelectorAll(".loc-sel")];
    const locInps = [...block.querySelectorAll(".loc-inp")];
    let locIdx = 0;
    const resolvedHLocs = hLocs.map(() => {
      const s = locSels[locIdx]; const inp = locInps[locIdx]; locIdx++;
      if (!s) return "";
      return s.value === "__custom__" ? (inp?.value || "") : s.value;
    });
    const resolvedWLocs = wLocs.map(() => {
      const s = locSels[locIdx]; const inp = locInps[locIdx]; locIdx++;
      if (!s) return "";
      return s.value === "__custom__" ? (inp?.value || "") : s.value;
    });

    const cells = [];
    block.querySelectorAll("table tr").forEach((tr) => {
      const catTd = tr.querySelector(".td-cat");
      if (!catTd) return;
      const rowName = catTd.textContent;
      const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
      const sels2 = [...tr.querySelectorAll("td.td-l2 select")];
      sels1.forEach((s1, i) => {
        cells.push({ row: rowName, col: i, v1: s1.value, v2: sels2[i]?.value || "" });
      });
    });

    data.push({ wid, date, hLocs: resolvedHLocs, wLocs: resolvedWLocs, cells });
  });

  // 記錄修改者資訊
  const savedBy = currentUser
    ? { name: currentUser.displayName || currentUser.email, uid: currentUser.uid, at: new Date().toLocaleString("zh-TW") }
    : { name: "（未登入）", uid: "", at: new Date().toLocaleString("zh-TW") };

  const payload = { weekCount, data, savedBy };

  if (window._fbReady && currentUser) {
    // 存到 Firebase
    const { db, ref, set } = window._fb;
    set(ref(db, "menu"), payload)
      .then(() => {
        document.getElementById("saveStatus").textContent = "💾 已同步";
        const info = document.getElementById("lastSaveInfo");
        if (info) info.textContent = `上次儲存：${savedBy.name} ${savedBy.at}`;
      })
      .catch(e => {
        document.getElementById("saveStatus").textContent = "⚠️ 同步失敗";
      });
  } else {
    // fallback: localStorage
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      document.getElementById("saveStatus").textContent = "💾 本機儲存";
    } catch(e) {
      document.getElementById("saveStatus").textContent = "⚠️ 儲存失敗";
    }
  }
}

// ===== 擷取單筆菜單資料（用於歷史紀錄） =====
function extractWeekData(block) {
  const wid = block.id.replace("block_", "");
  const date = block.querySelector(".week-date")?.value || "";
  const dayEl = block.querySelector(".week-day");
  const day = dayEl ? dayEl.textContent : "";
  const info = weekDataMap[wid] || {};
  const hLocs = info.hLocs || [];
  const wLocs = info.wLocs || [];

  const locSels = [...block.querySelectorAll(".loc-sel")];
  const locInps = [...block.querySelectorAll(".loc-inp")];
  let locIdx = 0;
  const resolvedHLocs = hLocs.map(() => {
    const s = locSels[locIdx]; const inp = locInps[locIdx]; locIdx++;
    if (!s) return "";
    return s.value === "__custom__" ? (inp?.value || "") : s.value;
  });
  const resolvedWLocs = wLocs.map(() => {
    const s = locSels[locIdx]; const inp = locInps[locIdx]; locIdx++;
    if (!s) return "";
    return s.value === "__custom__" ? (inp?.value || "") : s.value;
  });

  const cells = [];
  block.querySelectorAll("table tr").forEach((tr) => {
    const catTd = tr.querySelector(".td-cat");
    if (!catTd) return;
    const rowName = catTd.textContent;
    const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
    const sels2 = [...tr.querySelectorAll("td.td-l2 select")];
    sels1.forEach((s1, i) => {
      cells.push({ row: rowName, col: i, v1: s1.value, v2: sels2[i]?.value || "" });
    });
  });

  return { date, day, hLocs: resolvedHLocs, wLocs: resolvedWLocs, cells };
}

// ===== 儲存單筆到歷史紀錄 =====
function saveWeekToHistory(wid) {
  const block = document.getElementById(`block_${wid}`);
  if (!block) return;
  const data = extractWeekData(block);
  const date = data.date;
  if (!date) {
    alert("請先選擇日期再存入歷史紀錄。");
    return;
  }

  // 檢查是否已有相同日期（可選：詢問是否覆蓋）
  const existIdx = historyList.findIndex(h => h.date === date);
  if (existIdx >= 0) {
    if (!confirm(`「${date}」已有歷史紀錄，是否覆蓋？`)) return;
    historyList[existIdx] = {
      ...data,
      savedAt: new Date().toLocaleString("zh-TW"),
      savedBy: currentUser ? (currentUser.displayName || currentUser.email) : "（未登入）"
    };
  } else {
    historyList.unshift({
      ...data,
      savedAt: new Date().toLocaleString("zh-TW"),
      savedBy: currentUser ? (currentUser.displayName || currentUser.email) : "（未登入）"
    });
  }

  saveHistory();
  renderHistoryPanel();
  showSaveToast("📌 已存入歷史紀錄");
}

// ===== 渲染歷史紀錄面板 =====
function renderHistoryPanel() {
  const listEl = document.getElementById("historyList");
  const emptyEl = document.getElementById("historyEmpty");
  const countEl = document.getElementById("historyCount");

  countEl.textContent = `${historyList.length} 筆`;

  if (historyList.length === 0) {
    listEl.innerHTML = '';
    listEl.appendChild(Object.assign(document.createElement("div"), {
      className: "history-empty",
      textContent: "尚無歷史紀錄。在每筆菜單的標題列點選「📌 存入歷史」即可儲存。"
    }));
    return;
  }

  listEl.innerHTML = '';
  const container = document.createElement("div");
  container.className = "history-list";

  historyList.forEach((entry, idx) => {
    const entryEl = document.createElement("div");
    entryEl.className = "history-entry";

    // 標頭列
    const header = document.createElement("div");
    header.className = "history-entry-header";
    header.innerHTML = `
      <span class="hist-date">📅 ${entry.date}</span>
      <span class="hist-day">${entry.day || ""}</span>
      <span class="hist-saved-at">儲存於 ${entry.savedAt || ""}${entry.savedBy ? " ✍️ " + entry.savedBy : ""}</span>
      <div class="history-entry-actions">
        <button class="btn-hist-restore" onclick="restoreFromHistory(${idx});event.stopPropagation();">↩ 還原到編輯區</button>
        <button class="btn-hist-export" onclick="exportHistoryEntry(${idx});event.stopPropagation();">📄 匯出</button>
        <button class="btn-hist-del" onclick="deleteHistoryEntry(${idx});event.stopPropagation();">✕</button>
      </div>
      <span class="hist-toggle">▼</span>
    `;
    header.addEventListener("click", () => {
      header.classList.toggle("open");
      body.classList.toggle("open");
    });

    // 內容
    const body = document.createElement("div");
    body.className = "history-entry-body";
    body.innerHTML = buildHistoryTableHTML(entry);

    entryEl.appendChild(header);

    container.appendChild(entryEl);
  });

  listEl.appendChild(container);
}

// ===== 建立歷史紀錄預覽表格 =====
function buildHistoryTableHTML(entry) {
  const hLocs = entry.hLocs || [];
  const wLocs = entry.wLocs || [];

  const hSpan = hLocs.length * 2;
  const wSpan = wLocs.length * 2;

  let html = `<table>`;
  // row1
  html += `<tr>
    <th class="th-week" rowspan="3" style="min-width:40px;">類別</th>
    <th class="th-health" colspan="${hSpan}">【健康餐】</th>
    <th class="th-wind" colspan="${wSpan}">【風味餐】</th>
  </tr>`;

  // row2 地點
  html += "<tr>";
  hLocs.forEach((loc, i) => {
    html += `<th class="${i%2===0?"th-hloc":"th-hloc-light"}" colspan="2" style="border-left:none;border-right:none;">${loc}</th>`;
  });
  wLocs.forEach((loc, i) => {
    html += `<th class="${i%2===0?"th-wloc":"th-wloc-light"}" colspan="2" style="border-left:none;border-right:none;">${loc}</th>`;
  });
  html += "</tr>";

  // row3 sub
  html += "<tr>";
  hLocs.forEach((_, i) => {
    ["類別","品項"].forEach(l => {
      html += `<th class="th-sub ${i%2===0?"th-sub-h":"th-sub-h-light"}">${l}</th>`;
    });
  });
  wLocs.forEach((_, i) => {
    ["類別","品項"].forEach(l => {
      html += `<th class="th-sub ${i%2===0?"th-sub-w":"th-sub-w-light"}">${l}</th>`;
    });
  });
  html += "</tr>";

  // 資料列：依 ROWS 順序
  const totalLocs = hLocs.length + wLocs.length;
  ROWS.forEach(row => {
    const [hS, hS2, wS, wS2] = getRowStyles(row);
    html += `<tr><td class="td-cat">${row}</td>`;
    for (let i = 0; i < totalLocs; i++) {
      const isH = i < hLocs.length;
      const baseS  = isH ? hS  : wS;
      const baseS2 = isH ? hS2 : wS2;
      const col = i % (isH ? hLocs.length : wLocs.length);
      const useDark = col % 2 === 0;

      const cellKey = `${row}_${i}`;
      const found = (entry.cells || []).filter(c => c.row === row && c.col === i);
      const cell = found[0] || {};
      const v1 = (cell.v1 && cell.v1 !== "-") ? cell.v1 : "";
      const v2 = (cell.v2 && cell.v2 !== "-" && cell.v2 !== "-- 品項 --") ? cell.v2 : "";

      let itemBgStyle = "";
      if (v2) {
        const colors = getFoodColors(v2);
        if (colors) itemBgStyle = `background:${colors.bg};color:${colors.fg};`;
      }

      html += `<td class="td-l1 ${baseS}" style="padding:3px 5px;font-size:0.72rem;">${v1}</td>`;
      html += `<td class="td-l2 ${baseS2}" style="padding:3px 5px;font-size:0.72rem;font-weight:600;${itemBgStyle}">${v2}</td>`;
    }
    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// ===== 還原歷史到編輯區 =====
function restoreFromHistory(idx) {
  const entry = historyList[idx];
  if (!entry) return;
  if (!confirm(`確定將「${entry.date}」的歷史紀錄還原為新一筆菜單？`)) return;

  weekCount++;
  const block = buildWeek(weekCount, entry.hLocs, entry.wLocs);
  document.getElementById("scheduleArea").appendChild(block);

  const di = block.querySelector(".week-date");
  if (di && entry.date) {
    di.value = entry.date;
    di.dispatchEvent(new Event("change"));
  }

  const locSels = [...block.querySelectorAll(".loc-sel")];
  const locInps = [...block.querySelectorAll(".loc-inp")];
  const allLocs = [...(entry.hLocs||[]), ...(entry.wLocs||[])];
  allLocs.forEach((loc, i) => {
    const s = locSels[i]; const inp = locInps[i];
    if (!s) return;
    s.style.display = "none";
    if(inp) { inp.style.display="flex"; inp.value=loc; }
  });

  const rowMap = {};
  block.querySelectorAll("table tr").forEach(tr => {
    const catTd = tr.querySelector(".td-cat");
    if (!catTd) return;
    rowMap[catTd.textContent] = tr;
  });
  (entry.cells || []).forEach(c => {
    const tr = rowMap[c.row]; if (!tr) return;
    const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
    const sels2 = [...tr.querySelectorAll("td.td-l2 select")];
    const s1 = sels1[c.col]; const s2 = sels2[c.col];
    if (s1 && c.v1) {
      s1.value = c.v1;
      s1.dispatchEvent(new Event("change"));
      setTimeout(() => {
        if (s2 && c.v2) {
          s2.value = c.v2;
          s2.dispatchEvent(new Event("change"));
        }
      }, 50);
    }
  });

  block.scrollIntoView({ behavior: "smooth" });
  scheduleAutoSave();
  showSaveToast("↩ 已還原到編輯區");
}

// ===== 刪除歷史紀錄 =====
function deleteHistoryEntry(idx) {
  const entry = historyList[idx];
  if (!confirm(`確定刪除「${entry.date}」的歷史紀錄？`)) return;
  historyList.splice(idx, 1);
  saveHistory();
  renderHistoryPanel();
}

// ===== 清除全部歷史 =====
function clearAllHistory() {
  if (historyList.length === 0) { alert("歷史紀錄已是空的。"); return; }
  if (!confirm("確定清除全部歷史紀錄？此操作無法復原。")) return;
  historyList = [];
  saveHistory();
  renderHistoryPanel();
}

function getFoodColors(item) {
  const key = FOOD_COLOR[item];
  if (!key) return null;
  return { bg: COLOR_GROUPS[key].bg, fg: COLOR_GROUPS[key].fg || "#333" };
}

function makeColPair(rowKey, defaultStyle, defaultStyleL2, side) {
  let cats = ROW_CATS[rowKey] || [];

  if (rowKey === "主菜") {
    if (side === "h") {
      cats = cats.filter(c => c === "-" || c === "健康餐主菜");
    } else if (side === "w") {
      cats = cats.filter(c => c === "-" || c === "風味餐主菜");
    }
  }

  const sel1 = document.createElement("select");
  sel1.className = "sel-l1";
  sel1.innerHTML = cats.map(c =>
    `<option value="${c}" ${c==="-"?"selected":""}>${c}</option>`
  ).join("");

  const sel2 = document.createElement("select");
  sel2.className = "sel-l2";

  const td1 = document.createElement("td");
  td1.className = `td-l1 ${defaultStyle}`;
  const td2 = document.createElement("td");
  td2.className = `td-l2 ${defaultStyleL2}`;

  function applyClosedState() {
    sel2.innerHTML = `<option value="-">-</option>`;
    sel2.disabled = true;
    sel2.style.background = "#e0e0e0";
    sel2.style.color = "#9e9e9e";
    sel2.style.fontWeight = "600";
    sel2.style.borderColor = "";
    td2.style.background = "#e0e0e0";
    td2.style.color = "#9e9e9e";
    td2.className = `td-l2 ${defaultStyleL2}`;
  }
  applyClosedState();

  sel1.addEventListener("change", () => {
    const cat = sel1.value;
    td2.className = `td-l2 ${defaultStyleL2}`;
    td2.style.background=""; td2.style.color="";
    sel2.style.color=""; sel2.style.fontWeight=""; sel2.style.borderColor="";
    if (!cat || cat==="-") { applyClosedState(); scheduleAutoSave(); return; }
    const items = DB[cat] || [];
    sel2.innerHTML = `<option value="">-- 品項 --</option>` +
      items.map(i=>`<option value="${i}">${i}</option>`).join("");
    sel2.disabled=false; sel2.style.background=""; sel2.style.color=""; sel2.value="";
    scheduleAutoSave();
  });

  sel2.addEventListener("change", () => {
    const item = sel2.value;
    if (!item || item==="-" || item==="-- 品項 --") {
      td2.style.background=""; td2.style.color="";
      sel2.style.background=""; sel2.style.color="";
      sel2.style.fontWeight=""; sel2.style.borderColor="";
      td2.className=`td-l2 ${defaultStyleL2}`;

        td2.style.background=""; td2.style.color="";
        sel2.style.background=""; sel2.style.color="";
        sel2.style.fontWeight="600"; sel2.style.borderColor="transparent";
        td2.className=`td-l2 ${defaultStyleL2}`;
      }
    }
    scheduleAutoSave();
  });

  td1.appendChild(sel1); td2.appendChild(sel2);
  return [td1, td2];
}

function buildWeek(weekNum, initHLocs, initWLocs) {
  const wid = `w${weekNum}`;
  let hLocs = initHLocs ? [...initHLocs] : [...DEFAULT_HEALTH_LOCS];
  let wLocs = initWLocs ? [...initWLocs] : [...DEFAULT_WIND_LOCS];

  weekDataMap[wid] = { hLocs, wLocs };

  const block = document.createElement("div");
  block.className = "week-block";
  block.id = `block_${wid}`;

  const weekDays = ["（日）","（一）","（二）","（三）","（四）","（五）","（六）"];

  block.innerHTML = `
    <div class="week-titlebar">
      <span class="week-label">第 ${weekNum} 筆</span>
      <input class="week-date" type="date" id="date_${wid}">
      <span class="week-day" id="day_${wid}">請選日期</span>
      <button class="btn-save-to-history" onclick="saveWeekToHistory('${wid}')">📌 存入歷史</button>
      <button class="btn-del-week" onclick="removeWeek('${wid}')">刪除</button>
    </div>
  `;

  setTimeout(() => {
    const di = document.getElementById(`date_${wid}`);
    const ds = document.getElementById(`day_${wid}`);
    if (di) di.addEventListener("change", () => {
      if (di.value) {
        const d = new Date(di.value+"T00:00:00");
        ds.textContent = weekDays[d.getDay()];
        ds.style.color = (d.getDay()===0||d.getDay()===6)?"#ff6b6b":"#fff";
      } else { ds.textContent="請選日期"; ds.style.color="#b0bec5"; }
      scheduleAutoSave();
    });
  }, 0);

  function rebuildTable() {
    weekDataMap[wid].hLocs = hLocs;
    weekDataMap[wid].wLocs = wLocs;

    const old = block.querySelector(".tbl-wrap");
    if (old) old.remove();

    const wrap = document.createElement("div");
    wrap.className = "tbl-wrap";

    const ctrlBar = document.createElement("div");
    ctrlBar.style.cssText = "display:flex;gap:8px;padding:6px 12px;background:#f0f4f8;border-bottom:1px solid #ddd;flex-wrap:wrap;";

    const btnH = document.createElement("button");
    btnH.textContent = "➕ 新增健康餐地點";
    btnH.className = "ctrlBar-btn";
    btnH.style.cssText = "background:#66bb6a;color:#fff;border:none;border-radius:5px;padding:5px 12px;font-size:0.8rem;cursor:pointer;font-family:inherit;";
    btnH.onclick = () => { hLocs.push("新地點"); rebuildTable(); scheduleAutoSave(); };

    const btnW = document.createElement("button");
    btnW.textContent = "➕ 新增風味餐地點";
    btnW.className = "ctrlBar-btn";
    btnW.style.cssText = "background:#42a5f5;color:#fff;border:none;border-radius:5px;padding:5px 12px;font-size:0.8rem;cursor:pointer;font-family:inherit;";
    btnW.onclick = () => { wLocs.push("新地點"); rebuildTable(); scheduleAutoSave(); };

    ctrlBar.appendChild(btnH); ctrlBar.appendChild(btnW);

    const tbl = document.createElement("table");

    const hr1 = tbl.insertRow();
    const thCat = document.createElement("th");
    thCat.className="th-week"; thCat.rowSpan=3; thCat.textContent="類別";
    hr1.appendChild(thCat);

    const thH = document.createElement("th");
    thH.className="th-health"; thH.colSpan=hLocs.length*2;
    thH.textContent="【健康餐】"; hr1.appendChild(thH);

    const thW = document.createElement("th");
    thW.className="th-wind"; thW.colSpan=wLocs.length*2;
    thW.textContent="【風味餐】"; hr1.appendChild(thW);

    const hr2 = tbl.insertRow();
    hLocs.forEach((loc, i) => {
      hr2.appendChild(makeLocTh(loc, "h", () => {
        if (hLocs.length<=1) { alert("至少需保留一個健康餐地點"); return; }
        if (!confirm(`刪除「${loc}」欄位？`)) return;
        hLocs.splice(i,1); rebuildTable(); scheduleAutoSave();
      }, i));
    });
    wLocs.forEach((loc, i) => {
      hr2.appendChild(makeLocTh(loc, "w", () => {
        if (wLocs.length<=1) { alert("至少需保留一個風味餐地點"); return; }
        if (!confirm(`刪除「${loc}」欄位？`)) return;
        wLocs.splice(i,1); rebuildTable(); scheduleAutoSave();
      }, i));
    });

    const hr3 = tbl.insertRow();
    hLocs.forEach((_, i) => ["類別","品項"].forEach(l => {
      const th=document.createElement("th");
      th.className = "th-sub " + (i % 2 === 0 ? "th-sub-h" : "th-sub-h-light");
      th.textContent=l; hr3.appendChild(th);
    }));
    wLocs.forEach((_, i) => ["類別","品項"].forEach(l => {
      const th=document.createElement("th");
      th.className = "th-sub " + (i % 2 === 0 ? "th-sub-w" : "th-sub-w-light");
      th.textContent=l; hr3.appendChild(th);
    }));

    ROWS.forEach(row => {
      const tr = tbl.insertRow();
      const tdCat = document.createElement("td");
      tdCat.className = "td-cat";
      tdCat.textContent = row;
      const len = row.length;
      if (len >= 5) tdCat.style.fontSize = "0.6rem";
      else if (len === 4) tdCat.style.fontSize = "0.7rem";
      else if (len === 3) tdCat.style.fontSize = "0.76rem";
      tr.appendChild(tdCat);
      const [hS, hS2, wS, wS2] = getRowStyles(row);
      hLocs.forEach(()=>{ const [t1,t2]=makeColPair(row,hS,hS2,"h"); tr.appendChild(t1); tr.appendChild(t2); });
      wLocs.forEach(()=>{ const [t1,t2]=makeColPair(row,wS,wS2,"w"); tr.appendChild(t1); tr.appendChild(t2); });
    });

    wrap.appendChild(ctrlBar); wrap.appendChild(tbl);
    block.appendChild(wrap);
  }

  rebuildTable();
  return block;
}

function addWeek() {

  scheduleAutoSave();
}

function removeWeek(wid) {
  if (!confirm("確定刪除此筆？")) return;
  document.getElementById(`block_${wid}`)?.remove();
  delete weekDataMap[wid];

}

function clearAll() {

function getLocName(sel, inp) {
  if (!sel) return "";
  return sel.value === "__custom__" ? (inp?.value || "") : sel.value;
}

function exportHTML(itemOnlyMode) {
  const blocks = document.querySelectorAll(".week-block");
  if (blocks.length === 0) {
    alert("沒有可匯出的資料，請先新增日期並填寫菜單。");
    return;
  }

  let cssText = "";
  for (const sheet of document.styleSheets) {
    try {
      for (const rule of sheet.cssRules) { cssText += rule.cssText + "\n"; }
    } catch(e) {}
  }

  let tablesHTML = "";

  blocks.forEach((block) => {
    const date = block.querySelector(".week-date")?.value || "";
    const day  = block.querySelector(".week-day")?.textContent || "";
    const wid  = block.id.replace("block_", "");
    const info = weekDataMap[wid] || {};
    const hLocsCount = (info.hLocs || DEFAULT_HEALTH_LOCS).length;
    const wLocsCount = (info.wLocs || DEFAULT_WIND_LOCS).length;

    const locSels = [...block.querySelectorAll(".loc-sel")];
    const locInps = [...block.querySelectorAll(".loc-inp")];
    const resolvedLocs = locSels.map((s, i) => getLocName(s, locInps[i]));
    const hLocNames = resolvedLocs.slice(0, hLocsCount);
    const wLocNames = resolvedLocs.slice(hLocsCount, hLocsCount + wLocsCount);

    const hSpan = itemOnlyMode ? hLocNames.length : hLocNames.length * 2;
    const wSpan = itemOnlyMode ? wLocNames.length : wLocNames.length * 2;
    let hr1 = `<tr>
      <th class="th-week" rowspan="3">類別</th>
      <th class="th-health" colspan="${hSpan}">【健康餐】</th>
      <th class="th-wind" colspan="${wSpan}">【風味餐】</th>
    </tr>`;

    let hr2 = "<tr>";
    hLocNames.forEach((loc, i) => {
      const cls = i%2===0 ? "th-hloc" : "th-hloc-light";
      const cs = itemOnlyMode ? 1 : 2;
      hr2 += `<th class="${cls}" colspan="${cs}" style="border-left:none;border-right:none;">${loc}</th>`;
    });
    wLocNames.forEach((loc, i) => {
      const cls = i%2===0 ? "th-wloc" : "th-wloc-light";
      const cs = itemOnlyMode ? 1 : 2;
      hr2 += `<th class="${cls}" colspan="${cs}" style="border-left:none;border-right:none;">${loc}</th>`;
    });
    hr2 += "</tr>";

    let hr3 = "<tr>";
    if (!itemOnlyMode) {
      hLocNames.forEach((_, i) => {
        ["類別","品項"].forEach(l => {
          const cls = i%2===0 ? "th-sub th-sub-h" : "th-sub th-sub-h-light";
          hr3 += `<th class="${cls}">${l}</th>`;
        });
      });
      wLocNames.forEach((_, i) => {
        ["類別","品項"].forEach(l => {
          const cls = i%2===0 ? "th-sub th-sub-w" : "th-sub th-sub-w-light";
          hr3 += `<th class="${cls}">${l}</th>`;
        });
      });
    } else {
      hLocNames.forEach((_, i) => {
        const cls = i%2===0 ? "th-sub th-sub-h" : "th-sub th-sub-h-light";
        hr3 += `<th class="${cls}">品項</th>`;
      });
      wLocNames.forEach((_, i) => {
        const cls = i%2===0 ? "th-sub th-sub-w" : "th-sub th-sub-w-light";
        hr3 += `<th class="${cls}">品項</th>`;
      });
    }
    hr3 += "</tr>";

    let rowsHTML = "";
    block.querySelectorAll("table tr").forEach(tr => {
      const catTd = tr.querySelector(".td-cat");
      if (!catTd) return;
      const rowName = catTd.textContent;
      const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
      const sels2 = [...tr.querySelectorAll("td.td-l2 select")];

      const [hS, hS2, wS, wS2] = getRowStyles(rowName);

      rowsHTML += `<tr><td class="td-cat">${rowName}</td>`;

      sels1.forEach((s1, i) => {
        const isH = i < hLocNames.length;
        const baseS  = isH ? hS  : wS;
        const baseS2 = isH ? hS2 : wS2;
        const col    = i % (isH ? hLocNames.length : wLocNames.length);

        const v1 = s1.value && s1.value !== "-" ? s1.value : "";
        const s2el = sels2[i];
        const v2 = s2el?.value && s2el.value !== "-" && s2el.value !== "-- 品項 --" ? s2el.value : "";

        let itemBgStyle = "";
        if (s2el && s2el.value && s2el.value !== "-" && s2el.value !== "-- 品項 --") {
          const colors = getFoodColors(s2el.value);
          if (colors) {
            itemBgStyle = `background:${colors.bg};color:${colors.fg};`;
          }
        }

        if (!itemOnlyMode) {
          rowsHTML += `<td class="td-l1 ${baseS}" style="padding:4px 6px;">${v1}</td>`;
          rowsHTML += `<td class="td-l2 ${baseS2}" style="padding:4px 6px;font-weight:600;${itemBgStyle}">${v2}</td>`;
        } else {
          rowsHTML += `<td class="td-l2 ${baseS2}" style="padding:4px 6px;font-weight:600;${itemBgStyle}">${v2}</td>`;
        }
      });

      rowsHTML += "</tr>";
    });

    tablesHTML += `
      <div class="week-block" style="margin-bottom:28px;">
        <div class="week-titlebar">
          <span class="week-label">日期：${date}</span>
          <span class="week-day">${day}</span>
        </div>
        <div class="tbl-wrap">
          <table>${hr1}${hr2}${hr3}${rowsHTML}</table>
        </div>
      </div>`;
  });

  const modeLabel = itemOnlyMode ? "僅品項" : "含類別";
  const dateStr = new Date().toLocaleDateString("zh-TW").replace(/\//g,"-");
  const html = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>chiayumenu_${dateStr}（${modeLabel}）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
${cssText}
body { font-family:'Noto Sans TC',sans-serif; background:#eceff1; padding:18px 12px; }
h1 { text-align:center; color:#2e7d32; font-size:1.4rem; font-weight:700; margin-bottom:18px; letter-spacing:3px; }
select { display:none; }
.tbl-wrap { overflow-x:auto; }
@media print {
  body { background:#fff; padding:6px; }
  .week-block { page-break-inside:avoid; box-shadow:none; }
}
</style>
</head>
<body>
<h1>chiayumenumanger（${modeLabel}）</h1>
<p style="text-align:center;color:#78909c;font-size:0.82rem;margin-bottom:18px;">匯出時間：${new Date().toLocaleString("zh-TW")}</p>
${tablesHTML}
</body>
</html>`;

  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `chiayumenu_${dateStr}_${modeLabel}.html`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function initApp() {
  await loadHistory();
  const loaded = await loadAll();
  if (!loaded) {
    addWeek();
    addWeek();
  }
  renderHistoryPanel();
  initMgmtItems();

// 等 Firebase module 載入完成
function startWhenReady() {
  if (!window._fbReady) {
    window.addEventListener("fb-ready", startWhenReady, { once: true });
    return;
  }
  const { auth, onAuthStateChanged, getRedirectResult } = window._fb;

  // 處理 redirect 登入回來的結果
  getRedirectResult(auth).catch(e => {
    if (e.code !== 'auth/no-current-user') console.warn("redirect result:", e);
  });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    updateAuthUI(user);
    if (user) {
      // 登入後設定即時監聽（其他人改了會自動更新）
      if (!fbListenerActive) {
        fbListenerActive = true;
        const { db, ref, onValue } = window._fb;
        onValue(ref(db, "menu"), (snap) => {
          if (!snap.exists()) return;
          const data = snap.val();
          if (data && data.savedBy && data.savedBy.uid !== currentUser?.uid) {
            // 別人改了 → 靜默重新載入
            loadAll().then(() => {
              showSaveToast(`🔄 ${data.savedBy.name} 剛剛更新了資料`);
            });
          }
          if (data && data.savedBy) {
            const info = document.getElementById("lastSaveInfo");
            if (info) info.textContent = `上次儲存：${data.savedBy.name} ${data.savedBy.at}`;
          }
        });
      }
    }
    await initApp();
  });
}

startWhenReady();

function switchMgmtTab(tab) {
  document.querySelectorAll('.mgmt-tab').forEach((t, i) => {
    const names = ['items','colors','rowcats'];
    t.classList.toggle('active', names[i] === tab);
  });
  ['items','colors','rowcats'].forEach(s => {
    document.getElementById(`mgmt-${s}`).style.display = s===tab ? '' : 'none';
  });
  if (tab==='items') initMgmtItems();
  if (tab==='colors') initMgmtColors();
  if (tab==='rowcats') initMgmtRowCats();
}

function initMgmtItems() {
  const sel = document.getElementById('mgmt-cat-sel');
  const cur = sel.value;
  sel.innerHTML = Object.keys(DB).map(k => `<option value="${k}" ${k===cur?'selected':''}>${k}</option>`).join('');
  renderMgmtItems();
}

function renderMgmtItems() {
  const cat = document.getElementById('mgmt-cat-sel').value;
  const list = document.getElementById('mgmt-items-list');
  const style = CAT_STYLES[cat] || { itemBg:'#eceff1', itemFg:'#37474f' };
  list.innerHTML = '';
  (DB[cat]||[]).filter(i=>i!=='-').forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'mgmt-item-chip';
    chip.style.background = style.itemBg;
    chip.style.color = style.itemFg;
    chip.innerHTML = `${item}<button class="chip-del" title="刪除" onclick="removeItemFromCategory('${cat}','${item.replace(/'/g,"\\'")}')">✕</button>`;
    list.appendChild(chip);
  });
  if (!list.children.length) list.innerHTML = '<span style="color:#90a4ae;font-size:0.78rem;">（尚無品項）</span>';
}

function addItemToCategory() {
  const cat = document.getElementById('mgmt-cat-sel').value;
  const inp = document.getElementById('mgmt-item-input');
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  if (!DB[cat]) DB[cat] = ['-'];
  if (DB[cat].includes(val)) { alert('此品項已存在！'); return; }
  DB[cat].push(val);
  inp.value = '';
  renderMgmtItems();
  rerenderDBPanels();
  scheduleAutoSave();
}

function removeItemFromCategory(cat, item) {
  if (!confirm(`確定刪除「${item}」？`)) return;
  DB[cat] = DB[cat].filter(i => i !== item);
  renderMgmtItems();
  rerenderDBPanels();
  scheduleAutoSave();
}

function addNewCategory() {
  const name = prompt('輸入新類別名稱：');
  if (!name || !name.trim()) return;
  const key = name.trim();
  if (DB[key]) { alert('此類別已存在！'); return; }
  DB[key] = ['-'];
  CAT_STYLES[key] = { titleBg:'#607d8b', titleFg:'#fff', itemBg:'#eceff1', itemFg:'#37474f' };
  initMgmtItems();

function deleteCurrentCategory() {

function addItemToColorGroup() {

  rerenderDBPanels();
  scheduleAutoSave();

function removeItemFromColorGroup(key, item) {

  COLOR_GROUPS[key].items = COLOR_GROUPS[key].items.filter(i=>i!==item);
  delete FOOD_COLOR[item];
  renderMgmtColorItems();
  rerenderDBPanels();
  scheduleAutoSave();
}

function addNewColorGroup() {
  const key = prompt('輸入顏色組 key（英文，如 orange）：');
  if (!key || !key.trim()) return;
  const k = key.trim().toLowerCase().replace(/\s+/g,'');
  if (COLOR_GROUPS[k]) { alert('已存在！'); return; }
  const label = prompt('顯示名稱（如 橙）：') || k;
  COLOR_GROUPS[k] = { label, bg:'#ffcc80', fg:'#333', titleBg:'#ef6c00', items:[] };
  initMgmtColors();
  document.getElementById('mgmt-color-sel').value = k;

function deleteCurrentColorGroup() {

  if (!confirm(`確定刪除顏色組「${COLOR_GROUPS[key]?.label}」？`)) return;
  COLOR_GROUPS[key].items.forEach(item => { if (FOOD_COLOR[item]===key) delete FOOD_COLOR[item]; });

  initMgmtColors();
  rerenderDBPanels();
}

function applyColorGroupColors() {
  const key = document.getElementById('mgmt-color-sel').value;
  if (!COLOR_GROUPS[key]) return;
  COLOR_GROUPS[key].bg = document.getElementById('mgmt-color-bg').value;
  COLOR_GROUPS[key].fg = document.getElementById('mgmt-color-fg').value;
  COLOR_GROUPS[key].titleBg = document.getElementById('mgmt-color-titlebg').value;
  renderMgmtColorItems();
  rerenderDBPanels();
}

function initMgmtRowCats() {
  const sel = document.getElementById('mgmt-row-sel');
  const cur = sel.value;
  sel.innerHTML = Object.keys(ROW_CATS).map(k => `<option value="${k}" ${k===cur?'selected':''}>${k}</option>`).join('');
  renderMgmtRowCats();
}

function renderMgmtRowCats() {
  const row = document.getElementById('mgmt-row-sel').value;
  const list = document.getElementById('mgmt-rowcats-list');
  list.innerHTML = '';
  (ROW_CATS[row]||[]).filter(c=>c!=='-').forEach(cat => {
    const chip = document.createElement('span');
    chip.className = 'rowcat-chip';
    chip.innerHTML = `${cat}<button class="chip-del" onclick="removeCatFromRow('${row}','${cat.replace(/'/g,"\\'")}')">✕</button>`;
    list.appendChild(chip);
  });
  const addSel = document.getElementById('mgmt-rowcat-add-sel');
  const existing = ROW_CATS[row] || [];
  addSel.innerHTML = Object.keys(DB).filter(k=>!existing.includes(k))
    .map(k=>`<option value="${k}">${k}</option>`).join('');
}

function addCatToRow() {
  const row = document.getElementById('mgmt-row-sel').value;
  const cat = document.getElementById('mgmt-rowcat-add-sel').value;
  if (!cat) return;
  if (!ROW_CATS[row]) ROW_CATS[row] = ['-'];
  if (ROW_CATS[row].includes(cat)) return;
  ROW_CATS[row].push(cat);
  renderMgmtRowCats();
}

function removeCatFromRow(row, cat) {
  ROW_CATS[row] = (ROW_CATS[row]||[]).filter(c=>c!==cat);
  renderMgmtRowCats();
}

function rerenderDBPanels() {
  const g1 = document.getElementById('dbGrid');
  const g2 = document.getElementById('catGrid');
  g1.innerHTML = ''; g2.innerHTML = '';
  renderDB(); renderCatDB();
}

function rgbToHex(color) {
  if (!color) return null;
  if (color.startsWith('#')) return color;
  const m = color.match(/\d+/g);
  if (!m || m.length < 3) return null;
  return '#' + m.slice(0,3).map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
}
