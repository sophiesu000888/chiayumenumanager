  addSubBtn.textContent = "＋地點";
  addSubBtn.style.gridColumn = "1 / -1";
  addSubBtn.addEventListener("click", () => {
    const item = makeSubItem("", "");
    subList.insertBefore(item, addSubBtn);
    item._nameInp.focus();
    updateTotalBadge();
    scheduleAutoSave();
  });
  subList.appendChild(addSubBtn);
  outerWrap.appendChild(subList);

  // 暴露給外部讀取子地點資料
  th._subList = subList;
  th._makeSubItem = makeSubItem;

  // ── 第二行：複製／貼上／清除 ──
  const btnRow = document.createElement("div");
  btnRow.style.cssText = "display:flex;align-items:center;justify-content:center;gap:4px;width:100%;margin-top:1px;";
  btnRow.appendChild(copyBtn); btnRow.appendChild(pasteBtn); btnRow.appendChild(clearBtn);
  outerWrap.appendChild(btnRow);

  // ── 份數加總 badge ──
  const totalBadge = document.createElement("div");
  totalBadge.style.cssText = "background:rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:1px 8px;font-size:0.78rem;font-weight:700;color:inherit;white-space:nowrap;align-self:center;margin-bottom:6px;pointer-events:none;";
  function updateTotalBadge() {
    const subCount = subList.querySelectorAll(".loc-sub-item").length;
    if (subCount === 0) { totalBadge.style.display = "none"; return; }
    let total = 0;
    const mainQty = parseInt(qtyInp.value) || 0;
    total += mainQty;
    subList.querySelectorAll(".loc-sub-qty").forEach(q => { total += parseInt(q.value) || 0; });
    totalBadge.innerHTML = total > 0 ? `共 <span style="color:#ff4d4d;">${total}</span> 份` : "";
    totalBadge.style.display = total > 0 ? "" : "none";
  }
  qtyInp.addEventListener("input", updateTotalBadge);
  subList.addEventListener("input", updateTotalBadge);
  updateTotalBadge();
  th._updateTotal = updateTotalBadge;

  outerWrap.insertBefore(totalBadge, outerWrap.firstChild);
  th.appendChild(outerWrap);
  return th;
}

function buildWeek(weekNum, initHLocs, initWLocs, initHQtys, initWQtys) {
  const wid = `w${weekNum}`;
  let hLocs = initHLocs ? [...initHLocs] : [...DEFAULT_HEALTH_LOCS];
  let wLocs = initWLocs ? [...initWLocs] : [...DEFAULT_WIND_LOCS];
  // qty arrays parallel to hLocs/wLocs
  let hQtys = initHQtys ? [...initHQtys] : hLocs.map(()=>"");
  let wQtys = initWQtys ? [...initWQtys] : wLocs.map(()=>"");

  weekDataMap[wid] = { hLocs, wLocs };

  const block = document.createElement("div");
  block.className = "week-block";
  block.id = `block_${wid}`;

  const weekDays = ["（日）","（一）","（二）","（三）","（四）","（五）","（六）"];

  block.innerHTML = `
    <div class="week-titlebar">
      <span class="week-label">第 ${weekNum} 筆</span>
      <input class="week-date" type="date" id="date_${wid}">
      <span class="week-day" id="day_${wid}">請選日期</span>
      <button class="btn-save-to-history" onclick="saveWeekToHistory('${wid}')">📌 存入歷史</button>
      <button class="btn-del-week" onclick="removeWeek('${wid}')">刪除</button>
    </div>
  `;

  setTimeout(() => {
    const di = document.getElementById(`date_${wid}`);
    const ds = document.getElementById(`day_${wid}`);
    if (di) di.addEventListener("change", () => {
      if (di.value) {
        const d = new Date(di.value+"T00:00:00");
        ds.textContent = weekDays[d.getDay()];
        ds.style.color = (d.getDay()===0||d.getDay()===6)?"#ff4d4d":"var(--ink)";
      } else { ds.textContent="請選日期"; ds.style.color="#b0bec5"; }
      scheduleAutoSave();
    });
  }, 0);

  function readCurrentQtys() {
    // Read current qty values from DOM before rebuild
    const qtyInps = [...block.querySelectorAll(".loc-qty-inp")];
    const allQtys = qtyInps.map(q => q.value || "");
    hQtys = allQtys.slice(0, hLocs.length);
    wQtys = allQtys.slice(hLocs.length, hLocs.length + wLocs.length);
  }

  function snapshotCells() {
    const snapshot = {};
    const tbl = block.querySelector("table");
    if (!tbl) return snapshot;
    tbl.querySelectorAll("tr").forEach(tr => {
      const catTd = tr.querySelector(".td-cat");
      if (!catTd) return;
      const rowName = catTd.textContent;
      const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
      const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
      snapshot[rowName] = sels1.map((s, i) => ({
        v1: s.value || "-",
        v2: inps2[i] ? inps2[i].value : ""
      }));
    });
    return snapshot;
  }

  function rebuildTable(deletedColIdx) {
    weekDataMap[wid].hLocs = hLocs;
    weekDataMap[wid].wLocs = wLocs;

    // 快照品項資料
    const snapshot = snapshotCells();
    if (deletedColIdx !== undefined) {
      Object.keys(snapshot).forEach(rowName => {
        const arr = snapshot[rowName];
        if (arr && arr.length > deletedColIdx) arr.splice(deletedColIdx, 1);
      });
    }

    // ── 重建前先從舊 DOM 快照子地點（用新的 hLocs/wLocs 長度，因為刪欄後長度已更新）
    // 舊 th 數量可能和新長度不一樣（刪欄：舊多1、新增欄：舊少1），取 min 避免越界
    const _oldThCount = block.querySelectorAll("table tr:nth-child(2) th").length;
    const _hSnapCount = Math.min(hLocs.length, _oldThCount);
    const _wSnapCount = Math.min(wLocs.length, Math.max(0, _oldThCount - _hSnapCount));
    const _snapH = _readSubLocs(block, 0, _hSnapCount);
    const _snapW = _readSubLocs(block, _hSnapCount, _wSnapCount);

    const old = block.querySelector(".tbl-wrap");
    if (old) old.remove();

    const wrap = document.createElement("div");
    wrap.className = "tbl-wrap";

    const tbl = document.createElement("table");

    const hr1 = tbl.insertRow();
    const thCat = document.createElement("th");
    thCat.className="th-week"; thCat.rowSpan=3; thCat.textContent="品項";
    hr1.appendChild(thCat);

    const thH = document.createElement("th");
    thH.className="th-health"; thH.colSpan=hLocs.length*2;
    thH.textContent="【健康餐】"; hr1.appendChild(thH);

    const thW = document.createElement("th");
    thW.className="th-wind"; thW.colSpan=wLocs.length*2;
    thW.textContent="【風味餐】"; hr1.appendChild(thW);

    const hr2 = tbl.insertRow();
    hLocs.forEach((loc, i) => {
      const colIdx = i;
      hr2.appendChild(makeLocTh(loc, "h", () => {
        readCurrentQtys();
        if (hLocs.length<=1) { alert("至少需保留一個健康餐地點"); return; }
        if (!confirm(`刪除「${loc}」欄位？`)) return;
        const delIdx = i;
        hLocs.splice(i,1); hQtys.splice(i,1); rebuildTable(delIdx); scheduleAutoSave();
      }, i, hQtys[i],
      (copyBtn) => copyLocColumn(block, colIdx, copyBtn),
      () => pasteLocColumn(block, colIdx),
      () => clearLocColumn(block, colIdx)
      ));
    });
    wLocs.forEach((loc, i) => {
      const colIdx = hLocs.length + i;
      hr2.appendChild(makeLocTh(loc, "w", () => {
        readCurrentQtys();
        if (wLocs.length<=1) { alert("至少需保留一個風味餐地點"); return; }
        if (!confirm(`刪除「${loc}」欄位？`)) return;
        const delIdx = hLocs.length + i;
        wLocs.splice(i,1); wQtys.splice(i,1); rebuildTable(delIdx); scheduleAutoSave();
      }, i, wQtys[i],
      (copyBtn) => copyLocColumn(block, colIdx, copyBtn),
      () => pasteLocColumn(block, colIdx),
      () => clearLocColumn(block, colIdx)
      ));
    });

    const hr3 = tbl.insertRow();
    hLocs.forEach((_, i) => ["類別","品項"].forEach(l => {
      const th=document.createElement("th");
      th.className = "th-sub " + (i % 2 === 0 ? "th-sub-h" : "th-sub-h-light");
      th.textContent=l; hr3.appendChild(th);
    }));
    wLocs.forEach((_, i) => ["類別","品項"].forEach(l => {
      const th=document.createElement("th");
      th.className = "th-sub " + (i % 2 === 0 ? "th-sub-w" : "th-sub-w-light");
      th.textContent=l; hr3.appendChild(th);
    }));

    ROWS.forEach(row => {
      const tr = tbl.insertRow();
      tr.dataset.row = row;
      const tdCat = document.createElement("td");
      tdCat.className = "td-cat";
      tdCat.textContent = row;
      const len = row.length;
      if (len >= 5) tdCat.style.fontSize = "0.95rem";
      else if (len === 4) tdCat.style.fontSize = "1.1rem";
      else tdCat.style.fontSize = "1.3rem";
      tdCat.addEventListener('click', () => {
        // 只有所有品項都是空的才允許折收
        const inputs = [...tr.querySelectorAll('input.sel-l2-inp')];
        const hasContent = inputs.some(inp => inp.value && inp.value !== '-' && inp.value !== '-- 品項 --');
        if (hasContent && !tr.classList.contains('row-collapsed')) {
          // 利用閉包中的 hLocs/wLocs 找出哪些地點有填選內容
          const filledLocs = [];
          const allLocs = [...hLocs, ...wLocs];
          inputs.forEach((inp, idx) => {
            if (inp.value && inp.value !== '-' && inp.value !== '-- 品項 --') {
              // 每個地點有2個td（類別+品項），inp是品項欄
              const locIdx = Math.floor(idx / 2);
              const locName = allLocs[locIdx] || '';
              if (locName && !filledLocs.includes(locName)) filledLocs.push(locName);
            }
          });
          showWarningModal(`「${row}」尚有地點已選擇品項，\n無法摺收此列。`, filledLocs);
          return;
        }
        tr.classList.toggle('row-collapsed');
      });
      tr.appendChild(tdCat);
      const [hS, hS2, wS, wS2] = getRowStyles(row);
      hLocs.forEach(()=>{ const [t1,t2]=makeColPair(row,hS,hS2,"h"); tr.appendChild(t1); tr.appendChild(t2); });
      wLocs.forEach(()=>{ const [t1,t2]=makeColPair(row,wS,wS2,"w"); tr.appendChild(t1); tr.appendChild(t2); });
    });

    wrap.appendChild(tbl);
    block.appendChild(wrap);

    // ── 還原品項快照 ──
    if (snapshot && Object.keys(snapshot).length > 0) {
      tbl.querySelectorAll("tr").forEach(tr => {
        const catTd = tr.querySelector(".td-cat");
        if (!catTd) return;
        const rowName = catTd.textContent;
        const rowData = snapshot[rowName];
        if (!rowData) return;
        const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
        const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
        sels1.forEach((s1, i) => {
          const d = rowData[i];
          if (!d) return;
          if (d.v1 && d.v1 !== "-") s1.value = d.v1;
          const inp2 = inps2[i];
          if (inp2 && d.v2 && d.v2 !== "-" && d.v2 !== "-- 品項 --") {
            inp2.value = d.v2;
            if (inp2._applyColor) inp2._applyColor(d.v2);
          }
        });
      });
    }

    // ── 還原子地點快照（刪欄時對應欄的快照自然短少，新增欄的快照為空） ──
    _applySubLocs(block, 0, _snapH);
    _applySubLocs(block, hLocs.length, _snapW);
  }

  rebuildTable(undefined);
  block._rebuildTable = rebuildTable;
  block._hQtysRef = hQtys;
  block._wQtysRef = wQtys;
  return block;
}

function addWeek() {
  weekCount++;

  // 以最新日期（最後一筆）的地點設定為預設值
  const blocks = document.querySelectorAll(".week-block");
  let initHLocs, initWLocs;
  if (blocks.length > 0) {
    const lastBlock = blocks[blocks.length - 1];
    const lastWid = lastBlock.id.replace("block_", "");
    const lastInfo = weekDataMap[lastWid];
    if (lastInfo) {
      // 讀取最新日期目前實際的地點名稱（從 DOM）
      const locSels = [...lastBlock.querySelectorAll(".loc-sel")];
      const locInps = [...lastBlock.querySelectorAll(".loc-inp")];
      const allNames = locSels.map((s, i) => {
        if (s.style.display === "none") return locInps[i]?.value || "";
        return s.value === "__custom__" ? (locInps[i]?.value || "") : s.value;
      });
      initHLocs = allNames.slice(0, lastInfo.hLocs.length);
      initWLocs = allNames.slice(lastInfo.hLocs.length, lastInfo.hLocs.length + lastInfo.wLocs.length);
    }
  }

  const block = buildWeek(weekCount, initHLocs, initWLocs);
  document.getElementById("scheduleArea").appendChild(block);
  scheduleAutoSave();
}

// 對所有現有日期新增健康餐地點
function addGlobalHLoc() {
  const blocks = document.querySelectorAll(".week-block");
  if (blocks.length === 0) { alert("請先新增日期。"); return; }
  blocks.forEach(block => {
    const wid = block.id.replace("block_", "");
    const info = weekDataMap[wid];
    if (!info) return;
    // 讀取目前 qty 值後再 push
    const qtyInps = [...block.querySelectorAll(".loc-qty-inp")];
    const allQtys = qtyInps.map(q => q.value || "");
    info.hLocs.push("新地點");
    // 把新 qty 空值插到 h 範圍末尾
    if (block._hQtysRef) block._hQtysRef.push("");
    block._rebuildTable && block._rebuildTable();
  });
  scheduleAutoSave();
}

// 對所有現有日期新增風味餐地點
function addGlobalWLoc() {
  const blocks = document.querySelectorAll(".week-block");
  if (blocks.length === 0) { alert("請先新增日期。"); return; }
  blocks.forEach(block => {
    const wid = block.id.replace("block_", "");
    const info = weekDataMap[wid];
    if (!info) return;
    info.wLocs.push("新地點");
    if (block._wQtysRef) block._wQtysRef.push("");
    block._rebuildTable && block._rebuildTable();
  });
  scheduleAutoSave();
}

function removeWeek(wid) {
  if (!confirm("確定刪除此筆？")) return;
  document.getElementById(`block_${wid}`)?.remove();
  delete weekDataMap[wid];
  scheduleAutoSave();
}

function clearAll() {
  if (!confirm("確定清除全部？這將同時清除儲存的資料。")) return;
  document.getElementById("scheduleArea").innerHTML="";
  weekCount=0; weekDataMap={};
  if (_menuAutoSave) _menuAutoSave(); // 以空資料覆寫 Firestore
}

function getLocName(sel, inp) {
  if (!sel) return "";
  // inp 是預設顯示的元素；只有在使用者雙擊切換到 sel 模式時 inp 才會被隱藏
  if (inp && inp.style.display !== "none") return inp.value || "";
  return sel.value === "__custom__" ? (inp?.value || "") : sel.value;
}

function exportHTML(itemOnlyMode) {
  const blocks = document.querySelectorAll(".week-block");
  if (blocks.length === 0) {
    alert("沒有可匯出的資料，請先新增日期並填寫菜單。");
    return;
  }

  let cssText = "";
  for (const sheet of document.styleSheets) {
    try {
      for (const rule of sheet.cssRules) { cssText += rule.cssText + "\n"; }
    } catch(e) {}
  }

  let tablesHTML = "";

  blocks.forEach((block) => {
    const date = block.querySelector(".week-date")?.value || "";
    const day  = block.querySelector(".week-day")?.textContent || "";
    const wid  = block.id.replace("block_", "");
    const info = weekDataMap[wid] || {};
    const hLocsCount = (info.hLocs || DEFAULT_HEALTH_LOCS).length;
    const wLocsCount = (info.wLocs || DEFAULT_WIND_LOCS).length;

    const locSels = [...block.querySelectorAll(".loc-sel")];
    const locInps = [...block.querySelectorAll(".loc-inp")];
    const resolvedLocs = locSels.map((s, i) => getLocName(s, locInps[i]));
    const hLocNames = resolvedLocs.slice(0, hLocsCount);
    const wLocNames = resolvedLocs.slice(hLocsCount, hLocsCount + wLocsCount);

    const hSpan = itemOnlyMode ? hLocNames.length : hLocNames.length * 2;
    const wSpan = itemOnlyMode ? wLocNames.length : wLocNames.length * 2;
    let hr1 = `<tr>
      <th class="th-week" rowspan="3">品項</th>
      <th class="th-health" colspan="${hSpan}">【健康餐】</th>
      <th class="th-wind" colspan="${wSpan}">【風味餐】</th>
    </tr>`;

    let hr2 = "<tr>";
    hLocNames.forEach((loc, i) => {
      const cls = i%2===0 ? "th-hloc" : "th-hloc-light";
      const cs = itemOnlyMode ? 1 : 2;
      hr2 += `<th class="${cls}" colspan="${cs}" style="">${loc}</th>`;
    });
    wLocNames.forEach((loc, i) => {
      const cls = i%2===0 ? "th-wloc" : "th-wloc-light";
      const cs = itemOnlyMode ? 1 : 2;
      hr2 += `<th class="${cls}" colspan="${cs}" style="">${loc}</th>`;
    });
    hr2 += "</tr>";

    let hr3 = "<tr>";
    if (!itemOnlyMode) {
      hLocNames.forEach((_, i) => {
        ["類別","品項"].forEach(l => {
          const cls = i%2===0 ? "th-sub th-sub-h" : "th-sub th-sub-h-light";
          hr3 += `<th class="${cls}">${l}</th>`;
        });
      });
      wLocNames.forEach((_, i) => {
        ["類別","品項"].forEach(l => {
          const cls = i%2===0 ? "th-sub th-sub-w" : "th-sub th-sub-w-light";
          hr3 += `<th class="${cls}">${l}</th>`;
        });
      });
    } else {
      hLocNames.forEach((_, i) => {
        const cls = i%2===0 ? "th-sub th-sub-h" : "th-sub th-sub-h-light";
        hr3 += `<th class="${cls}">品項</th>`;
      });
      wLocNames.forEach((_, i) => {
        const cls = i%2===0 ? "th-sub th-sub-w" : "th-sub th-sub-w-light";
        hr3 += `<th class="${cls}">品項</th>`;
      });
    }
    hr3 += "</tr>";

    let rowsHTML = "";
    block.querySelectorAll("table tr").forEach(tr => {
      const catTd = tr.querySelector(".td-cat");
      if (!catTd) return;
      if (tr.classList.contains('row-collapsed')) return;
      const rowName = catTd.textContent;
      const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
      const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];

      const [hS, hS2, wS, wS2] = getRowStyles(rowName);

      rowsHTML += `<tr><td class="td-cat">${rowName}</td>`;

      sels1.forEach((s1, i) => {
        const isH = i < hLocNames.length;
        const baseS  = isH ? hS  : wS;
        const baseS2 = isH ? hS2 : wS2;
        const col    = i % (isH ? hLocNames.length : wLocNames.length);

        const v1 = s1.value && s1.value !== "-" ? s1.value : "";
        const rawV2 = inps2[i]?.value || "";
        const v2 = rawV2 && rawV2 !== "-" && rawV2 !== "-- 品項 --" ? rawV2 : "";

        let itemBgStyle = "";
        let itemDisplayHtml = v2;
        if (v2 && DISH_NAMES.has(v2)) {
          // 料理：綠底 + 展開食材
          const isReview = DISH_NEEDS_REVIEW.has(v2);
          itemBgStyle = isReview
            ? "background:#fdecea;color:#c0392b;"
            : "background:#e8f5e9;color:#1a6e3c;";
          const ings = (DISH_DB[v2] && DISH_DB[v2].ingredients) ? DISH_DB[v2].ingredients : [];
          const ingLines = ings.map(ing =>
            `<div style="font-size:0.78rem;color:#444;font-weight:400;padding-left:4px;line-height:1.5;">・${ing.ingredient} <b>${ing.grams}g</b></div>`
          ).join("");
          itemDisplayHtml = `<div style="font-weight:700;margin-bottom:2px;">${v2}</div>${ingLines}`;
        } else if (v2) {
          const colors = getFoodColors(v2);
          if (colors) {
            itemBgStyle = `background:${colors.bg};color:${colors.fg};`;
          }
        }

        if (!itemOnlyMode) {
          rowsHTML += `<td class="td-l1 ${baseS}" style="padding:4px 6px;">${v1}</td>`;
          rowsHTML += `<td class="td-l2 ${baseS2}" style="padding:4px 6px;font-weight:600;${itemBgStyle}">${itemDisplayHtml}</td>`;
        } else {
          rowsHTML += `<td class="td-l2 ${baseS2}" style="padding:4px 6px;font-weight:600;${itemBgStyle}">${itemDisplayHtml}</td>`;
        }
      });

      rowsHTML += "</tr>";
    });

    tablesHTML += `
      <div class="week-block" style="margin-bottom:28px;">
        <div class="week-titlebar">
          <span class="week-label">日期：${date}</span>
          <span class="week-day">${day}</span>
        </div>
        <div class="tbl-wrap">
          <table>${hr1}${hr2}${hr3}${rowsHTML}</table>
        </div>
      </span>`;
  });

// ── 顏色面板：目前選中的 key ──
let _colorPanelActiveKey = null;

function renderDB() {
  const tabsBar = document.getElementById("colorTabsBar");
  const tabContent = document.getElementById("colorTabContent");
  if (!tabsBar || !tabContent) return;
  tabsBar.innerHTML = "";
  tabContent.innerHTML = "";

  const keys = Object.keys(COLOR_GROUPS);
  if (!_colorPanelActiveKey || !COLOR_GROUPS[_colorPanelActiveKey]) {
    _colorPanelActiveKey = keys[0] || null;
  }

  Object.entries(COLOR_GROUPS).forEach(([key, g], idx) => {
    const isActive = key === _colorPanelActiveKey;
    // Tab 按鈕
    const btn = document.createElement("button");
    btn.className = "cat-tab-btn" + (isActive ? " active" : "");
    btn.style.borderColor = g.titleBg;
    btn.style.color = isActive ? (g.fg || "#333") : g.titleBg;
    btn.style.background = isActive ? g.bg : "#fff";
    btn.textContent = g.label;
    btn.dataset.colorKey = key;
    btn.addEventListener("click", () => {
      _colorPanelActiveKey = key;
      tabsBar.querySelectorAll(".cat-tab-btn").forEach(b => {
        const k = b.dataset.colorKey;
        const gs = k && COLOR_GROUPS[k] ? COLOR_GROUPS[k] : { bg:"#fff", fg:"#607d8b", titleBg:"#607d8b" };
        b.style.background = "#fff";
        b.style.color = gs.titleBg;
        b.classList.remove("active");
      });
      btn.style.background = g.bg;
      btn.style.color = g.fg || "#333";
      btn.classList.add("active");
      tabContent.querySelectorAll(".cat-tab-panel").forEach(p => p.classList.remove("active"));
      document.getElementById("colorPanel_" + key).classList.add("active");
      const lbl = document.getElementById("colorPanelActiveLabel");
      if (lbl) lbl.textContent = "目前：" + g.label;
    });
    tabsBar.appendChild(btn);

    // 內容面板
    const panel = document.createElement("div");
    panel.className = "cat-tab-panel" + (isActive ? " active" : "");
    panel.id = "colorPanel_" + key;
    const colorGrid = document.createElement("div");
    colorGrid.className = "cat-items-grid";
    g.items.forEach(itemName => {
      const chip = document.createElement("div");
      chip.className = "color-item-chip chip-editable";
      chip.style.background = g.bg;
      chip.style.color = g.fg || "#333";
      chip.title = "點擊管理此食材";

      const span = document.createElement("span");
      span.textContent = itemName;
      chip.appendChild(span);

      chip.addEventListener("click", (e) => {
        e.stopPropagation();
        openColorItemPopup(key, itemName, chip);
      });
      colorGrid.appendChild(chip);
    });
    panel.appendChild(colorGrid);
    tabContent.appendChild(panel);
  });

  // 更新 active label
  const lbl = document.getElementById("colorPanelActiveLabel");
  if (lbl && _colorPanelActiveKey && COLOR_GROUPS[_colorPanelActiveKey]) {
    lbl.textContent = "目前：" + COLOR_GROUPS[_colorPanelActiveKey].label;
  }

    // ── 「未標示」tab：排除主菜/副主菜，依類別分組顯示 ──
  const EXCLUDED_CATS_FROM_UNTAGGED = ["主菜", "副主菜"];
  const allTagged = new Set(Object.values(COLOR_GROUPS).flatMap(g => g.items));

  const untaggedByCat = {};
  let untaggedTotal = 0;
  Object.entries(DB).forEach(([cat, items]) => {
    if (EXCLUDED_CATS_FROM_UNTAGGED.includes(cat)) return;
    items.filter(i => i !== "-").forEach(i => {
      if (!allTagged.has(i)) {
        if (!untaggedByCat[cat]) untaggedByCat[cat] = [];
        if (!untaggedByCat[cat].includes(i)) { untaggedByCat[cat].push(i); untaggedTotal++; }
      }
    });
  });

  const UT_BG = "#cfd8dc", UT_FG = "#263238", UT_TITLE = "#455a64";

  const utBtn = document.createElement("button");
  utBtn.className = "cat-tab-btn";
  utBtn.style.borderColor = UT_TITLE;
  utBtn.style.color = UT_TITLE;
  utBtn.style.background = "#fff";
  utBtn.textContent = `未標示${untaggedTotal ? "（" + untaggedTotal + "）" : ""}`;
  utBtn.addEventListener("click", () => {
    tabsBar.querySelectorAll(".cat-tab-btn").forEach(b => {
      const k = Object.keys(COLOR_GROUPS).find(k => COLOR_GROUPS[k].label === b.textContent);
      const gs = k ? COLOR_GROUPS[k] : { bg:"#fff", fg:UT_TITLE, titleBg:UT_TITLE };
      b.style.background = "#fff"; b.style.color = k ? gs.titleBg : UT_TITLE;
      b.classList.remove("active");
    });
    utBtn.style.background = UT_BG; utBtn.style.color = UT_FG; utBtn.classList.add("active");
    tabContent.querySelectorAll(".cat-tab-panel").forEach(p => p.classList.remove("active"));
    document.getElementById("colorPanel_untagged").classList.add("active");
  });
  tabsBar.appendChild(utBtn);

  const utPanel = document.createElement("div");
  utPanel.className = "cat-tab-panel";
  utPanel.id = "colorPanel_untagged";

  if (!untaggedTotal) {
    const utGrid = document.createElement("div");
    utGrid.className = "cat-items-grid";
    const empty = document.createElement("span");
    empty.style.cssText = "color:#90a4ae;font-size:0.85rem;";
    empty.textContent = "所有品項都已有顏色標示 🎉";
    utGrid.appendChild(empty);
    utPanel.appendChild(utGrid);
  } else {
    Object.entries(untaggedByCat).forEach(([cat, items]) => {
      if (!items.length) return;
      const catStyle = CAT_STYLES[cat] || { titleBg:"#607d8b" };
      const catLabel = document.createElement("div");
      catLabel.style.cssText = `width:100%;font-size:0.85rem;font-weight:700;color:#fff;background:${catStyle.titleBg};padding:3px 8px 3px 10px;border-radius:4px;margin:8px 0 4px;letter-spacing:1px;box-sizing:border-box;`;
      catLabel.textContent = cat;
      utPanel.appendChild(catLabel);

      const catGrid = document.createElement("div");
      catGrid.className = "cat-items-grid";
      catGrid.style.marginBottom = "2px";
      items.forEach(itemName => {
        const chip = document.createElement("div");
        chip.className = "color-item-chip chip-editable";
        chip.style.cssText = `background:${UT_BG};color:${UT_FG};border:1.5px dashed ${UT_TITLE};cursor:pointer;`;
        chip.title = itemName + "（點擊指定顏色）";
        const span = document.createElement("span");
        span.textContent = itemName;
        chip.appendChild(span);

        chip.addEventListener("click", (e) => { e.stopPropagation(); openColorItemPopup(null, itemName, chip); });
        catGrid.appendChild(chip);
      });
      utPanel.appendChild(catGrid);
    });
  }
  tabContent.appendChild(utPanel);
}


const CAT_STYLES = {
  "主菜": { titleBg:"#2e7d32", titleFg:"#fff", itemBg:"#c8e6c9", itemFg:"#1b5e20" },
  "副主菜":     { titleBg:"#f57f17", titleFg:"#fff", itemBg:"#fff9c4", itemFg:"#6d4c00" },
  "米飯":       { titleBg:"#795548", titleFg:"#fff", itemBg:"#ffe0b2", itemFg:"#4e342e" },
  "白葉菜":     { titleBg:"#546e7a", titleFg:"#fff", itemBg:"#eceff1", itemFg:"#263238" },
  "綠葉菜":     { titleBg:"#388e3c", titleFg:"#fff", itemBg:"#dcedc8", itemFg:"#1b5e20" },
  "蛋白質":     { titleBg:"#e65100", titleFg:"#fff", itemBg:"#ffe0b2", itemFg:"#bf360c" },
  "菇":         { titleBg:"#6d4c41", titleFg:"#fff", itemBg:"#d7ccc8", itemFg:"#3e2723" },
  "瓜果":       { titleBg:"#00838f", titleFg:"#fff", itemBg:"#b2ebf2", itemFg:"#006064" },
  "根莖":       { titleBg:"#c62828", titleFg:"#fff", itemBg:"#ffcdd2", itemFg:"#b71c1c" },
  "海帶":       { titleBg:"#1a237e", titleFg:"#fff", itemBg:"#c5cae9", itemFg:"#1a237e" },
  "其他":       { titleBg:"#616161", titleFg:"#fff", itemBg:"#f5f5f5", itemFg:"#424242" },
  "輔料":       { titleBg:"#6a1b9a", titleFg:"#fff", itemBg:"#e1bee7", itemFg:"#4a148c" }
};

// ── 類別面板：目前選中的 cat ──
let _catPanelActiveCat = null;

function renderCatDB() {
  const tabsBar = document.getElementById("catTabsBar");
  const tabContent = document.getElementById("catTabContent");
  if (!tabsBar || !tabContent) return;
  tabsBar.innerHTML = "";
  tabContent.innerHTML = "";

  // 建立食材 → 料理 反向索引（以主食材為主）
  const _ingToDishes = {};
  Object.entries(DISH_DB).forEach(([dishName, data]) => {
    if (!data.ingredients) return;
    // 只取重量最重的食材（主食材）做索引
    const sorted = [...data.ingredients].sort((a,b) => b.grams - a.grams);
    const mainIng = sorted[0]?.ingredient;
    if (mainIng) {
      if (!_ingToDishes[mainIng]) _ingToDishes[mainIng] = [];
      _ingToDishes[mainIng].push(dishName);
    }
  });

  const CAT_ORDER = ["主菜","副主菜","米飯","白葉菜","綠葉菜","蛋白質","菇","瓜果","根莖","海帶","其他","輔料"];
  const cats = Object.entries(DB).sort(([a],[b]) => {
    const ai = CAT_ORDER.indexOf(a), bi = CAT_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
  const catKeys = cats.map(([k]) => k);
  if (!_catPanelActiveCat || !DB[_catPanelActiveCat]) {
    _catPanelActiveCat = catKeys[0] || null;
  }

  cats.forEach(([cat, items], idx) => {
    const isActive = cat === _catPanelActiveCat;
    const style = CAT_STYLES[cat] || { titleBg:"#607d8b", titleFg:"#fff", itemBg:"#eceff1", itemFg:"#37474f" };
    const realItems = items.filter(i => i !== "-");

    // Tab 按鈕
    const btn = document.createElement("button");
    btn.className = "cat-tab-btn" + (isActive ? " active" : "");
    btn.style.borderColor = style.titleBg;
    btn.style.color = isActive ? "#fff" : style.titleBg;
    btn.style.background = isActive ? style.titleBg : "#fff";
    btn.style.display = 'inline-flex';
    btn.style.alignItems = 'center';
    btn.style.gap = '4px';
    btn.style.paddingRight = '6px';
    btn.dataset.catKey = cat;

    const btnLabel = document.createElement('span');
    btnLabel.textContent = cat;
    btn.appendChild(btnLabel);

    // ✏️ 改名按鈕
    const editPen = document.createElement('span');
    editPen.textContent = '✏️';
    editPen.title = `改名「${cat}」`;
    editPen.style.cssText = 'font-size:0.8rem;opacity:0.5;margin-left:2px;padding:1px 3px;border-radius:3px;cursor:pointer;transition:opacity .1s;line-height:1;';
    editPen.addEventListener('mouseenter', () => { editPen.style.opacity = '1'; editPen.style.background = 'rgba(255,255,255,0.3)'; });
    editPen.addEventListener('mouseleave', () => { editPen.style.opacity = '0.5'; editPen.style.background = 'none'; });
    editPen.addEventListener('click', (e) => {
      e.stopPropagation();
      const newName = prompt(`將類別「${cat}」改名為：`, cat);
      if (!newName || newName.trim() === cat || !newName.trim()) return;
      const trimmed = newName.trim();
      if (DB[trimmed]) { alert(`類別「${trimmed}」已存在`); return; }
      // 改名：複製資料到新 key，刪除舊 key
      DB[trimmed] = DB[cat];
      delete DB[cat];
      // 同步更新 ROW_CATS
      Object.keys(ROW_CATS).forEach(row => {
        if (ROW_CATS[row] === cat) ROW_CATS[row] = trimmed;
      });
      // 同步更新 DISH_DB 的 category
      Object.values(DISH_DB).forEach(d => { if (d.category === cat) d.category = trimmed; });
      if (_catPanelActiveCat === cat) _catPanelActiveCat = trimmed;
      scheduleAutoSave();
      renderCatDB();
    });
    btn.appendChild(editPen);

    // ✕ 刪除按鈕
    const delX = document.createElement('span');
    delX.textContent = '✕';
    delX.title = `刪除「${cat}」類別`;
    delX.style.cssText = 'font-size:1.05rem;opacity:0.6;margin-left:4px;line-height:1;padding:1px 4px;border-radius:3px;cursor:pointer;transition:opacity .1s;';
    delX.addEventListener('mouseenter', () => { delX.style.opacity = '1'; delX.style.background = 'rgba(255,0,0,0.2)'; });
    delX.addEventListener('mouseleave', () => { delX.style.opacity = '0.6'; delX.style.background = 'none'; });
    delX.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm(`確定刪除「${cat}」類別及其所有品項？`)) return;
      delete DB[cat];
      scheduleAutoSave();
      renderCatDB();
    });
    btn.appendChild(delX);

    btn.addEventListener("click", () => {
      _catPanelActiveCat = cat;
      tabsBar.querySelectorAll(".cat-tab-btn").forEach(b => {
        const s = CAT_STYLES[b.querySelector('span')?.textContent || b.textContent] || { titleBg:"#607d8b" };
        b.style.background = "#fff";
        b.style.color = s.titleBg;
        b.classList.remove("active");
      });
      btn.style.background = style.titleBg;
      btn.style.color = "#fff";
      btn.classList.add("active");
      tabContent.querySelectorAll(".cat-tab-panel").forEach(p => p.classList.remove("active"));
      document.getElementById("catPanel_" + cat).classList.add("active");
      const lbl = document.getElementById("catPanelActiveLabel");
      if (lbl) lbl.textContent = "目前：" + cat;
    });
    tabsBar.appendChild(btn);

    // 內容面板
    const panel = document.createElement("div");
    panel.className = "cat-tab-panel" + (isActive ? " active" : "");
    panel.id = "catPanel_" + cat;
    if (cat === "主菜") {
      const hint = document.createElement("div");
      hint.style.cssText = 'font-size:0.95rem;font-weight:700;color:#2e7d32;background:#f1f8f1;border:1.5px solid #a5d6a7;border-radius:6px;padding:5px 10px;margin-bottom:8px;';
      hint.textContent = '🌿 有 * 為健康餐';
      panel.appendChild(hint);
    }

    function makeCatChip(itemName) {
      const chip = document.createElement("div");
      chip.className = "cat-item-chip chip-editable";
      // 主菜：有 * 用綠色系，無 * 用藍色系
      if (cat === "主菜") {
        const hasStar = itemName.endsWith("*");
        chip.style.background = hasStar ? "#c8e6c9" : "#bbdefb";
        chip.style.color       = hasStar ? "#1b5e20" : "#0d47a1";

        // 若 items 集合已載入，且品項不在其中 → 紅框警示
        const baseName = itemName.replace(/\*$/, '');
        if (_latestItemsSet.size > 0 && !_latestItemsSet.has(baseName)) {
          chip.style.outline = "2px solid red";
          chip.style.outlineOffset = "1px";
          chip.title = "⚠ 此品項不在 items 品項列表中，點擊可新增";
          chip.addEventListener("click", (e) => {
            e.stopPropagation();
            openAddToItemsPopup(itemName, chip, cat);
          });
        } else {
          chip.title = "點擊編輯";
          chip.addEventListener("click", (e) => {
            e.stopPropagation();
            openCatItemPopup(cat, itemName, chip);
          });
        }
      } else {
        chip.style.background = style.itemBg;
        chip.style.color = style.itemFg;
        chip.title = "點擊編輯";
      }
      const span = document.createElement("span");
      span.textContent = itemName;
      chip.appendChild(span);

      // 數字 badge：以該食材為主食材的料理數
      if (cat !== "主菜") {
        const count = (_ingToDishes[itemName] || []).length;
        if (count > 0) {
          const badge = document.createElement("span");
          badge.textContent = count;
          badge.title = `以「${itemName}」為主食材的料理：${count} 道`;
          badge.style.cssText = `
            display:inline-flex;align-items:center;justify-content:center;
            min-width:17px;height:17px;padding:0 4px;margin-left:5px;
            background:var(--ink);color:#fff;
            border-radius:9px;font-size:10px;font-weight:700;line-height:1;
            flex-shrink:0;pointer-events:none;
          `;
          chip.appendChild(badge);
        }
      }

      const chipColor = cat === "主菜"
        ? (itemName.endsWith("*") ? "#1b5e20" : "#0d47a1")
        : style.itemFg;
      // 非主菜的 click handler（主菜已在上方分支各自設定）
      if (cat !== "主菜") {
        chip.addEventListener("click", (e) => {
          e.stopPropagation();
          const relatedDishes = _ingToDishes[itemName] || [];
          if (relatedDishes.length === 0) {
            // 沒有料理 → 開編輯 popup
            openCatItemPopup(cat, itemName, chip);
            return;
          }
          // 有料理 → 手風琴展開/收起
          const existingAccordion = chip.nextElementSibling;
          if (existingAccordion && existingAccordion.classList.contains('dish-accordion')) {
            existingAccordion.remove();
            chip.style.outline = '';
            return;
          }
          // 關閉其他展開的手風琴
          document.querySelectorAll('.dish-accordion').forEach(a => {
            if (a.previousElementSibling) a.previousElementSibling.style.outline = '';
            a.remove();
          });
          chip.style.outline = '2.5px solid var(--ink)';
          chip.style.outlineOffset = '2px';
          const accordion = document.createElement('div');
          accordion.className = 'dish-accordion';
          accordion.style.cssText = `
            width: 100%;
            background: #fffef9;
            border: 2px solid var(--ink);
            border-radius: 8px;
            padding: 8px 10px;
            margin-top: 4px;
            box-shadow: 2px 2px 0 var(--ink);
            animation: accordionOpen 0.15s ease;
          `;
          const title = document.createElement('div');
          title.style.cssText = 'font-size:0.75rem;font-weight:700;color:#666;margin-bottom:6px;letter-spacing:0.5px;display:flex;align-items:center;justify-content:space-between;';
          title.innerHTML = `<span>🍽 以「${itemName}」為主食材的料理</span>`;
          // 編輯食材按鈕
          const editIngBtn = document.createElement('button');
          editIngBtn.textContent = '✏️ 編輯食材';
          editIngBtn.style.cssText = 'font-size:0.78rem;font-weight:700;background:white;border:1.5px solid var(--ink);border-radius:5px;padding:2px 8px;cursor:pointer;font-family:inherit;box-shadow:2px 2px 0 var(--ink);transition:all 0.1s;';
          editIngBtn.addEventListener('mouseenter', () => { editIngBtn.style.transform='translate(1px,1px)'; editIngBtn.style.boxShadow='1px 1px 0 var(--ink)'; });
          editIngBtn.addEventListener('mouseleave', () => { editIngBtn.style.transform=''; editIngBtn.style.boxShadow='2px 2px 0 var(--ink)'; });
          editIngBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            accordion.remove();
            chip.style.outline = '';
            openCatItemPopup(cat, itemName, chip);
          });
          title.appendChild(editIngBtn);
          accordion.appendChild(title);
          const chips = document.createElement('div');
          chips.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;';
          relatedDishes.forEach(dishName => {
            const dc = document.createElement('div');
            dc.style.cssText = `
              display:inline-flex;align-items:center;
              background:#2d2d2d;color:#fff;
              border:2px solid var(--ink);
              border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
              padding:4px 10px;font-size:0.82rem;font-weight:700;
              cursor:pointer;font-family:'Kalam','Noto Sans TC',sans-serif;
              box-shadow:2px 2px 0 var(--ink);
              transition:all 0.1s;
            `;
            dc.textContent = dishName;
            dc.title = '點擊編輯此料理';
            dc.addEventListener('mouseenter', () => { dc.style.transform='translate(1px,1px)'; dc.style.boxShadow='1px 1px 0 var(--ink)'; });
            dc.addEventListener('mouseleave', () => { dc.style.transform=''; dc.style.boxShadow='2px 2px 0 var(--ink)'; });
            dc.addEventListener('click', e => {
              e.stopPropagation();
              openDishEdit(dishName, e);
            });
            chips.appendChild(dc);
          });
          accordion.appendChild(chips);
          chip.insertAdjacentElement('afterend', accordion);
        });
      }
      return chip;
    }

    const groups = MENU_GROUPS[cat] || null;
    const catGrid = document.createElement("div");
    catGrid.className = "cat-items-grid";
    if (groups) {
      const groupedItems = new Set(groups.flatMap(g => g.items));
      groups.forEach(group => {
        const gi = group.items.filter(i => realItems.includes(i));
        if (!gi.length) return;
        // 有 * 的排前，無 * 的排後
        const sorted = [
          ...gi.filter(i => i.endsWith("*")),
          ...gi.filter(i => !i.endsWith("*"))
        ];
        const label = document.createElement("div");
        label.className = "cat-sub-label";
        label.textContent = group.label;
        catGrid.appendChild(label);
        sorted.forEach(i => catGrid.appendChild(makeCatChip(i)));
      });
      // 顯示未分組的品項
      const ungrouped = realItems.filter(i => !groupedItems.has(i));
      if (ungrouped.length) {
        const label = document.createElement("div");
        label.className = "cat-sub-label";
        label.textContent = "其他";
        catGrid.appendChild(label);
        ungrouped.forEach(i => catGrid.appendChild(makeCatChip(i)));
      }
    } else {
      // 混炒類別：品項本身就是料理，直接用料理 chip 樣式顯示
      if (cat === '混炒') {
        // 加說明標題
        const hint = document.createElement('div');

// ===== 初始化流程（Firebase Auth + Firestore 同步）=====
async function initApp() {
  requireAuth(async (user) => {
    currentUser = user;
    injectStatusBar('menu');
    initPresence(user);
    await loadHistory();

    _menuAutoSave = makeAutoSave('menu', () => {
      const d = collectMenuData();
      _lastSavedMenuJSON = JSON.stringify(d.data);
      return d;
    }, 800);
    _dbAutoSave   = makeAutoSave('menudb', collectDbData, 800);
    _histAutoSave = makeAutoSave('history', () => JSON.stringify(historyList), 800);

    // 歷史紀錄同步（獨立 modules/history 文件，JSON 字串存儲避免 nested arrays）
    startSync('history', user, (content) => {
      const incoming = typeof content === 'string'
        ? (() => { try { return JSON.parse(content); } catch(e) { return null; } })()
        : content;
      if (Array.isArray(incoming) && incoming.length > 0) {
        historyList = incoming;
        localStorage.setItem(HISTORY_KEY, JSON.stringify(historyList));
        renderHistoryPanel();
      } else if (historyList.length > 0) {
        // 本機有紀錄但 Firestore 尚無 → 一次性遷移推上去
        _histAutoSave();
      }
    });

    let _dbReady = false;
    let _pendingMenuContent = undefined; // undefined = 尚未收到；null = 收到但空

    startSync('menudb', user, (dbContent) => {
      applyDbData(dbContent);
      if (!_dbReady) {
        _dbReady = true;
        // menudb 到齊後，若 menu snapshot 已先到，立刻套用
        if (_pendingMenuContent !== undefined) {
          _applyMenuSync(_pendingMenuContent);
          _pendingMenuContent = undefined;
        }
        // menudb 到齊後，補跑 items sync
        _origDbReadyCheck();
      }
    });

    async function _applyMenuSync(content) {
      const incomingJSON = JSON.stringify(content && content.data);
      // 若收到的資料與本機剛存的完全相同，跳過重建（避免閃爍）
      // 清除快照確保只跳過一次：下次遠端有任何更新都會正常套用
      if (_lastSavedMenuJSON && incomingJSON === _lastSavedMenuJSON) {
        _lastSavedMenuJSON = null;
        return;
      }
      _lastSavedMenuJSON = null; // 收到遠端資料後清除，避免誤擋跨裝置更新
      const loaded = await applyMenuData(content);
      if (!loaded) { addWeek(); addWeek(); }
      renderHistoryPanel();
      initMgmtItems();
      rerenderDBPanels();
    }

    startSync('menu', user, (content) => {
      if (!_dbReady) {
        // menudb 還沒到，先暫存（只保留最新一筆）
        _pendingMenuContent = content;
        return;
      }
      _applyMenuSync(content);
    });

    // ── 監聽 items（品項列表）資料，自動同步主菜選項 ──
    let _pendingItemsContent;
    startSync('items', user, (itemsContent) => {
      if (!Array.isArray(itemsContent)) return;
      if (!_dbReady) {
        _pendingItemsContent = itemsContent;
        return;
      }
      _syncMainDishFromItems(itemsContent);
    });

    // menudb ready 後，補跑 items sync（若 items snapshot 比 menudb 先到）
    const _origDbReadyCheck = () => {
      if (_pendingItemsContent !== undefined) {
        _syncMainDishFromItems(_pendingItemsContent);
        _pendingItemsContent = undefined;
      }
    };
  });
}

// ── 從 items 資料自動補入主菜 ──
function _syncMainDishFromItems(itemsList) {
  if (!DB["主菜"]) DB["主菜"] = [];
  const mainDishArr = DB["主菜"];

  // ── 更新全域品項名稱集合（每次 items 同步都重建）──
  _latestItemsSet = new Set(
    itemsList.map(it => (it.name || '').replace(/\*$/, '')).filter(Boolean)
  );

  // items 類別 → MENU_GROUPS label 對應表
  const CAT_LABEL_MAP = {
    "雞":   "🐔 雞",
    "豬":   "🐷 豬",
    "牛":   "🐄 牛",
    "鴨":   "🦆 鴨",
    "舒肥": "🥩 舒肥",
    "雙拼": "🍱 雙拼",
    "魚":   "🐟 魚",
  };

  // 建立「品項名稱 → { hasHealth, cat }」的 map（同名合併）
  const nameMap = {}; // baseName → { hasHealth, cat }
  itemsList.forEach(it => {
    if (!it.name) return;
    const baseName = it.name;
    const isHealth = !!it.isHealthy;
    const cat = it.cat || '';
    if (!(baseName in nameMap)) {
      nameMap[baseName] = { hasHealth: isHealth, cat };
    } else {
      if (isHealth) nameMap[baseName].hasHealth = true;
      if (cat && !nameMap[baseName].cat) nameMap[baseName].cat = cat;
    }
  });

  if (!MENU_GROUPS["主菜"]) MENU_GROUPS["主菜"] = [];
  const groups = MENU_GROUPS["主菜"];

  // 建立「group label → group 物件」的快速查找
  function getOrCreateGroup(label) {
    let g = groups.find(g => g.label === label);
    if (!g) {
      g = { label, items: [] };
      groups.push(g);
    }
    return g;
  }

  let changed = false;

  Object.entries(nameMap).forEach(([baseName, { hasHealth, cat }]) => {
    const displayName = hasHealth ? baseName + '*' : baseName;

    // 找 DB["主菜"] 是否已有此品項（含或不含*）
    const existingIdx = mainDishArr.findIndex(
      item => item.replace(/\*$/, '') === baseName
    );

    if (existingIdx < 0) {
      // 完全新品項：加入 DB 並加入對應分組
      mainDishArr.push(displayName);
      const label = CAT_LABEL_MAP[cat] || null;
      if (label) {
        const g = getOrCreateGroup(label);
        if (!g.items.includes(displayName)) {
          g.items.push(displayName);
        }
      }
      changed = true;
    } else {
      // 已存在：檢查是否需要補星號
      const existingName = mainDishArr[existingIdx];
      const existingHasStar = existingName.endsWith('*');
      if (hasHealth && !existingHasStar) {
        const newName = baseName + '*';
        mainDishArr[existingIdx] = newName;
        // 同步更新 MENU_GROUPS 裡的名稱
        groups.forEach(g => {
          const gi = g.items.indexOf(existingName);
          if (gi >= 0) g.items[gi] = newName;
        });
        changed = true;
      }

      // 確保已存在的品項有放入對應分組（用去星號的 baseName 比對）
      const currentName = mainDishArr[existingIdx]; // 可能剛更新過
      const label = CAT_LABEL_MAP[cat] || null;
      if (label) {
        const g = getOrCreateGroup(label);
        // 用 baseName 比對，避免星號不一致造成找不到
        const alreadyInGroup = groups.some(gr =>
          gr.items.some(i => i.replace(/\*$/, '') === baseName)
        );
        if (!alreadyInGroup) {
          g.items.push(currentName);
          changed = true;
        }
      }
    }
  });

  if (changed) {
    rerenderDBPanels();
    initMgmtItems();
    if (_dbAutoSave) _dbAutoSave();
  } else {
    // 即使 DB 沒有變化，items 集合已更新 → 強制重繪 chip 紅框狀態
    rerenderDBPanels();
  }

  // 重新觸發所有主菜欄 input 的顏色驗證（items 比 menu 晚到時補跑）
  document.querySelectorAll('tr[data-row="主菜"] td.td-l2 input.sel-l2-inp').forEach(inp => {
    if (inp._applyColor && inp.value) inp._applyColor(inp.value);
  });
}



function escapeHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}

function qaInitSelects() {
  const catSel = document.getElementById('qa-cat');

  const sortedCats = Object.keys(DB).sort((a, b) => {
    const ai = CAT_ORDER_QA.indexOf(a), bi = CAT_ORDER_QA.indexOf(b);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
  catSel.innerHTML = sortedCats.map(k => `<option value="${k}">${k}</option>`).join('');
  const colorSel = document.getElementById('qa-color');
  colorSel.innerHTML = '<option value="">— 不設定 —</option>' +
    Object.entries(COLOR_GROUPS).map(([k,g]) =>

  qaUpdatePreview();

function qaUpdatePreview() {
  const name = document.getElementById('qa-name').value.trim();
  const cat  = document.getElementById('qa-cat').value;
  const colorKey = document.getElementById('qa-color').value;
  const prev = document.getElementById('qa-preview');

  const catStyle = CAT_STYLES[cat] || { itemBg:'#eceff1', itemFg:'#37474f' };
  const groupIdx = document.getElementById('qa-group').value;
  const groups = MENU_GROUPS[cat];
  let html = `將 <span class="qa-tag" style="background:${catStyle.itemBg};color:${catStyle.itemFg};border:1px solid rgba(0,0,0,0.1);">${name}</span>`;
  html += ` 加到「<b>${cat}</b>」`;
  if (groups && groupIdx !== '') {
    html += `→「<b>${groups[parseInt(groupIdx)].label}</b>」`;
  }
  if (colorKey && COLOR_GROUPS[colorKey]) {
    const g = COLOR_GROUPS[colorKey];
    html += `，顏色：<span class="qa-tag" style="background:${g.bg};color:${g.fg};border:1px solid rgba(0,0,0,0.12);">${g.label}</span>`;
  }
  prev.innerHTML = html;
}

function qaAddItem() {
  const inp = document.getElementById('qa-name');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  const cat = document.getElementById('qa-cat').value;
  const colorKey = document.getElementById('qa-color').value;
  if (!DB[cat]) DB[cat] = ['-'];
  if (DB[cat].includes(name)) { alert(`「${name}」在類別「${cat}」中已存在！`); return; }
  const stripStar = s => s.replace(/\*/g, '').trim();
  const sortChars = s => s.replace(/\*/g, '').trim().split('').sort().join('');
  const nameNorm = stripStar(name), nameSort = sortChars(name);
  for (const existing of (DB[cat] || [])) {
    if (existing === '-' || existing === name) continue;
    let reason = null;
    if (stripStar(existing) === nameNorm) reason = `「${existing}」與「${name}」只差 * 標記`;
    else if (sortChars(existing) === nameSort) reason = `「${existing}」與「${name}」字元相同但順序不同`;
    if (reason && !confirm(`⚠️ 疑似重複：${reason}\n\n確定要新增嗎？`)) return;
  }
  DB[cat].push(name);
  // 加入子群組
  const groupIdx = document.getElementById('qa-group').value;
  if (groupIdx !== '' && MENU_GROUPS[cat] && MENU_GROUPS[cat][parseInt(groupIdx)]) {
    const grp = MENU_GROUPS[cat][parseInt(groupIdx)];
    if (!grp.items.includes(name)) grp.items.push(name);
    }
  if (colorKey && COLOR_GROUPS[colorKey]) {
    if (!COLOR_GROUPS[colorKey].items.includes(name)) {
      COLOR_GROUPS[colorKey].items.push(name);
      FOOD_COLOR[name] = colorKey;
    }
  }
  inp.value = '';
  inp.focus();
  qaUpdatePreview();
  _catPanelActiveCat = cat;
  renderMgmtItems();
  rerenderDBPanels();
  scheduleAutoSave();
  showSaveToast(`✅ 已新增「${name}」到「${cat}」${colorKey ? ' + 顏色組' : ''}`);
}

function addItemToCategory() {
  const cat = document.getElementById('mgmt-cat-sel').value;
  const inp = document.getElementById('mgmt-item-input');
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  const oldVal = inp.dataset.editingItem || '';
  if (oldVal && oldVal !== val) {
    // 改名模式
    if (!DB[cat]) DB[cat] = ['-'];
    if (DB[cat].includes(val)) { alert('此品項已存在！'); return; }
    const idx = DB[cat].indexOf(oldVal);
    if (idx !== -1) DB[cat][idx] = val;
    // 同步 FOOD_COLOR
    if (FOOD_COLOR[oldVal]) { FOOD_COLOR[val] = FOOD_COLOR[oldVal]; delete FOOD_COLOR[oldVal]; }
    // 同步 COLOR_GROUPS
    Object.values(COLOR_GROUPS).forEach(g => {
      const ci = g.items.indexOf(oldVal);
      if (ci !== -1) g.items[ci] = val;
    });
  } else {
    if (!DB[cat]) DB[cat] = ['-'];
    if (DB[cat].includes(val)) { alert('此品項已存在！'); return; }
    DB[cat].push(val);
  }
  inp.value = '';
  delete inp.dataset.editingItem;
  const btn = document.getElementById('mgmt-item-btn');
  if (btn) btn.textContent = '➕ 新增品項';
  renderMgmtItems();
  rerenderDBPanels();
  scheduleAutoSave();
}

function removeItemFromCategory(cat, item) {
  if (!confirm(`確定刪除「${item}」？`)) return;
  DB[cat] = DB[cat].filter(i => i !== item);
  renderMgmtItems();
  rerenderDBPanels();
  scheduleAutoSave();
}

    chip.style.background = g.bg;
    chip.style.color = g.fg || '#333';

    chip.style.cursor = 'pointer';

    const nameSpan = document.createElement('span');
    nameSpan.textContent = item;
    nameSpan.style.flex = '1';
    nameSpan.style.textAlign = 'center';
    nameSpan.onclick = () => {
      const inp = document.getElementById('mgmt-color-item-input');
      inp.value = item;
      inp.dataset.editingItem = item;
      inp.focus();
      const btn = document.getElementById('mgmt-color-item-btn');
      if (btn) btn.textContent = '✏️ 修改食材';
    };

    delBtn.onclick = (e) => { e.stopPropagation(); removeItemFromColorGroup(key, item); };

function addItemToColorGroup() {
  const key = document.getElementById('mgmt-color-sel').value;
  const inp = document.getElementById('mgmt-color-item-input');
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  if (!COLOR_GROUPS[key]) return;
  const oldVal = inp.dataset.editingItem || '';
  if (oldVal && oldVal !== val) {
    // 改名模式
    if (COLOR_GROUPS[key].items.includes(val)) { alert('此食材已存在！'); return; }
    const ci = COLOR_GROUPS[key].items.indexOf(oldVal);
    if (ci !== -1) COLOR_GROUPS[key].items[ci] = val;
    if (FOOD_COLOR[oldVal] === key) { FOOD_COLOR[val] = key; delete FOOD_COLOR[oldVal]; }
    // 同步 DB
    Object.keys(DB).forEach(cat => {
      const di = DB[cat].indexOf(oldVal);
      if (di !== -1) DB[cat][di] = val;
    });
  } else {
    if (COLOR_GROUPS[key].items.includes(val)) { alert('此食材已存在！'); return; }
    COLOR_GROUPS[key].items.push(val);
    FOOD_COLOR[val] = key;
  }
  inp.value = '';
  delete inp.dataset.editingItem;
  const btn = document.getElementById('mgmt-color-item-btn');
  if (btn) btn.textContent = '➕ 新增食材';
  renderMgmtColorItems();
  rerenderDBPanels();
  scheduleAutoSave();
}

function removeItemFromColorGroup(key, item) {
  if (!confirm(`確定從顏色組刪除「${item}」？`)) return;
  COLOR_GROUPS[key].items = COLOR_GROUPS[key].items.filter(i=>i!==item);
  delete FOOD_COLOR[item];
  renderMgmtColorItems();
  rerenderDBPanels();
  scheduleAutoSave();
}

function addNewColorGroup() {
  const key = prompt('輸入顏色組 key（英文，如 orange）：');
  if (!key || !key.trim()) return;
  const k = key.trim().toLowerCase().replace(/\s+/g,'');
  if (COLOR_GROUPS[k]) { alert('已存在！'); return; }
  const label = prompt('顯示名稱（如 橙）：') || k;

function deleteCurrentColorGroup() {
  const key = document.getElementById('mgmt-color-sel').value;
  if (!confirm(`確定刪除顏色組「${COLOR_GROUPS[key]?.label}」？`)) return;

// ===== 列管理（更名、新增、刪除）=====
const PROTECTED_ROWS = [];

function renderRowMgmtList() {

    };

function syncRowOrder() {
  // sync ROW_ORDER array (used by renderAllRowCats)
  ROW_ORDER.length = 0;
  ROWS.forEach(r => ROW_ORDER.push(r));
  // sync DATA_ROWS
  DATA_ROWS.length = 0;
  ROWS.filter(r => !PROTECTED_ROWS.includes(r)).forEach(r => DATA_ROWS.push(r));
}

function rowMgmtRename(oldName, newName) {
  const idx = ROWS.indexOf(oldName);
  if (idx < 0) return;
  ROWS[idx] = newName;
  // sync ROW_CATS
  if (ROW_CATS[oldName]) {
    ROW_CATS[newName] = ROW_CATS[oldName];
    delete ROW_CATS[oldName];
  }
  syncRowOrder();
  renderRowMgmtList();
  renderAllRowCats();
  scheduleAutoSave();
  showSaveToast(`✏️ 已將「${oldName}」改名為「${newName}」`);
}

function rowMgmtDelete(rowName) {
  if (!confirm(`確定刪除列「${rowName}」？\n（已存在的菜單不受影響）`)) return;
  if (!confirm(`再次確認：真的要刪除「${rowName}」嗎？`)) return;
  const idx = ROWS.indexOf(rowName);
  if (idx >= 0) ROWS.splice(idx, 1);
  delete ROW_CATS[rowName];
  syncRowOrder();
  renderRowMgmtList();
  renderAllRowCats();
  scheduleAutoSave();
  showSaveToast(`🗑️ 已刪除列「${rowName}」`);
}

function rowMgmtAdd() {
  const inp = document.getElementById('row-add-input');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  if (ROWS.includes(name)) { alert(`「${name}」已存在！`); return; }
  ROWS.push(name);
  ROW_CATS[name] = ['-', ...Object.keys(DB).filter(k => !['主菜','副主菜','米飯'].includes(k))];
  syncRowOrder();
  inp.value = '';
  renderRowMgmtList();
  renderAllRowCats();
  scheduleAutoSave();
  showSaveToast(`✅ 已新增列「${name}」`);
}

// ===== 顏色抽屜：浮層操作 =====
let _colorPopupKey = null;
let _colorPopupItem = null;

function closeAllPopups() {
  ['catItemPopup','colorItemPopup','addToItemsPopup'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

function openColorItemPopup(key, itemName, anchorEl) {
  closeAllPopups();
  _colorPopupKey = key;
  _colorPopupItem = itemName;
  const popup = document.getElementById("colorItemPopup");
  const inp = document.getElementById("colorPopupInput");
  const moveTarget = document.getElementById("colorPopupMoveTarget");
  const title = document.getElementById("colorPopupTitle");
  const renameBtn = document.getElementById("colorPopupRenameBtn");
  const deleteBtn = document.getElementById("colorPopupDeleteBtn");
  const moveBtn = document.getElementById("colorPopupMoveBtn");
  const moveLabel = document.getElementById("colorPopupMoveLabel");

  title.textContent = "食材：" + itemName;
  inp.value = itemName;

  const isUntagged = (key === null);
  renameBtn.style.display = isUntagged ? "none" : "";
  deleteBtn.style.display = isUntagged ? "none" : "";
  inp.style.display = isUntagged ? "none" : "";
  moveLabel.textContent = isUntagged ? "指定顏色組：" : "移到顏色組：";
  moveBtn.textContent = isUntagged ? "➕ 指定顏色" : "➡️ 移動";

  // 未標示模式：顯示全部顏色組；已有顏色模式：排除目前所在的組
  moveTarget.innerHTML = Object.entries(COLOR_GROUPS)
    .filter(([k]) => isUntagged || k !== key)
    .map(([k, g]) => `<option value="${k}">${g.label}（${k}）</option>`)
    .join('');

  // 定位浮層在 chip 旁
  const rect = anchorEl.getBoundingClientRect();
  popup.style.display = "block";
  const pw = popup.offsetWidth || 300;
  const ph = popup.offsetHeight;
  let left = rect.left;
  let top = rect.bottom + 6;
  if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
  if (left < 10) left = 10;
  if (top + ph > window.innerHeight - 10) top = rect.top - ph - 6;
  if (top < 10) top = 10;
  popup.style.left = left + "px";
  popup.style.top = top + "px";

  inp.focus();
  inp.select();
}

function colorPopupSave() {
  const popup = document.getElementById("colorItemPopup");
  const inp = document.getElementById("colorPopupInput");
  const newVal = inp.value.trim();
  if (!newVal) { inp.focus(); return; }
  if (!_colorPopupKey || !_colorPopupItem) return;
  const g = COLOR_GROUPS[_colorPopupKey];
  if (!g) return;
  if (newVal !== _colorPopupItem) {
    const i = g.items.indexOf(_colorPopupItem);
    if (i >= 0) g.items[i] = newVal;
    if (FOOD_COLOR[_colorPopupItem] === _colorPopupKey) {
      delete FOOD_COLOR[_colorPopupItem];
      FOOD_COLOR[newVal] = _colorPopupKey;
    }
    // 同步 DB
    Object.keys(DB).forEach(cat => {
      const di = DB[cat].indexOf(_colorPopupItem);
      if (di !== -1) DB[cat][di] = newVal;
    });
    scheduleAutoSave();
    showSaveToast("✏️ 已改名為「" + newVal + "」");
  }
  popup.style.display = "none";
  rerenderDBPanels();
}

function colorPopupMove() {
  const popup = document.getElementById("colorItemPopup");
  const targetKey = document.getElementById("colorPopupMoveTarget").value;
  if (!targetKey || !_colorPopupItem) return;
  const dstG = COLOR_GROUPS[targetKey];
  if (!dstG) return;
  // Remove from source (skip if untagged, i.e. _colorPopupKey === null)
  if (_colorPopupKey) {
    const srcG = COLOR_GROUPS[_colorPopupKey];
    if (srcG) srcG.items = srcG.items.filter(i => i !== _colorPopupItem);
  }
  // Add to dest (avoid dup)
  if (!dstG.items.includes(_colorPopupItem)) dstG.items.push(_colorPopupItem);
  // Update FOOD_COLOR
  FOOD_COLOR[_colorPopupItem] = targetKey;
  _colorPanelActiveKey = targetKey;
  scheduleAutoSave();
  const toastMsg = _colorPopupKey ? "➡️ 已移到「" + dstG.label + "」" : "🎨 已指定顏色「" + dstG.label + "」";
  showSaveToast(toastMsg);
  popup.style.display = "none";
  rerenderDBPanels();
}

function colorPopupDelete() {
  if (!_colorPopupKey || !_colorPopupItem) return;
  if (!confirm("確定刪除食材「" + _colorPopupItem + "」？")) return;
  const g = COLOR_GROUPS[_colorPopupKey];
  if (g) g.items = g.items.filter(i => i !== _colorPopupItem);
  delete FOOD_COLOR[_colorPopupItem];
  // Remove from DB too
  Object.keys(DB).forEach(cat => {
    DB[cat] = DB[cat].filter(i => i !== _colorPopupItem);
  });
  scheduleAutoSave();
  showSaveToast("🗑️ 已刪除「" + _colorPopupItem + "」");
  document.getElementById("colorItemPopup").style.display = "none";
  rerenderDBPanels();
  initMgmtItems();
}

function openAddToItemsPopup(itemName, anchorEl, cat) {

function catPopupToggleStar() {
  if (!_catPopupCat || !_catPopupItem || _catPopupCat !== "主菜") return;
  const cb = document.getElementById("catPopupStarCb");
  const wantStar = cb ? cb.checked : !_catPopupItem.endsWith("*");
  const hasStar  = _catPopupItem.endsWith("*");
  // 若狀態沒變就不動
  if (wantStar === hasStar) return;
  const newName = wantStar ? _catPopupItem + "*" : _catPopupItem.slice(0, -1);
  const baseName = _catPopupItem.replace(/\*$/, "");

  // 更新本地 DB
  const catArr = DB["主菜"];
  const i = catArr ? catArr.indexOf(_catPopupItem) : -1;
  if (i >= 0) catArr[i] = newName;

  // 同步 FOOD_COLOR
  const colorKey = FOOD_COLOR[_catPopupItem];
  if (colorKey) {
    delete FOOD_COLOR[_catPopupItem];
    FOOD_COLOR[newName] = colorKey;
    const cg = COLOR_GROUPS[colorKey];
    if (cg) { const ci = cg.items.indexOf(_catPopupItem); if (ci >= 0) cg.items[ci] = newName; }
  }

  // 同步 MENU_GROUPS
  Object.values(MENU_GROUPS).forEach(groups => {
    groups.forEach(g => {
      const gi = g.items.indexOf(_catPopupItem);
      if (gi >= 0) g.items[gi] = newName;
    });
  });

  _catPopupItem = newName;
  scheduleAutoSave();
  rerenderDBPanels();
  initMgmtItems();

  // 同步 Firebase ITEMS 一覽表 isHealthy 欄位
  (async () => {
    try {
      const { db, auth } = initFirebase();
      const snap = await db.collection("modules").doc("items").get();
      const existing = (snap.exists && snap.data().content)
        ? restoreFromFirestore(snap.data().content) : [];
      if (!Array.isArray(existing)) return;
      const idx = existing.findIndex(it => (it.name || "").replace(/\*$/, "") === baseName);
      if (idx < 0) return; // ITEMS 裡沒有這個品項就不更新
      existing[idx] = { ...existing[idx], isHealthy: wantStar, updatedAt: Date.now() };
      const user = auth.currentUser;
      await db.collection("modules").doc("items").set({
        content: sanitizeForFirestore(existing),
        lastSaved: {
          uid: user ? user.uid : "menu",
          displayName: user ? (user.displayName || user.email) : "menu",
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }
      });
      showSaveToast(`✅「${newName}」已更新（含 ITEMS）`);
    } catch(e) {
      console.error("同步 ITEMS 失敗", e);
      showSaveToast(`✅「${newName}」已更新（本地）`);
    }
  })();

  document.getElementById("catItemPopup").style.display = "none";
}

function catPopupSave() {
  const popup = document.getElementById("catItemPopup");
  const inp = document.getElementById("catPopupInput");
  const newVal = inp.value.trim();
  if (!newVal) { inp.focus(); return; }
  if (!_catPopupCat || !_catPopupItem) return;
  if (newVal !== _catPopupItem) {
    const catArr = DB[_catPopupCat];
    const i = catArr ? catArr.indexOf(_catPopupItem) : -1;
    if (i >= 0) catArr[i] = newVal;
    // 同步 FOOD_COLOR
    const colorKey = FOOD_COLOR[_catPopupItem];
    if (colorKey) {
      delete FOOD_COLOR[_catPopupItem];
      FOOD_COLOR[newVal] = colorKey;
      const cg = COLOR_GROUPS[colorKey];
      if (cg) {
        const ci = cg.items.indexOf(_catPopupItem);
        if (ci >= 0) cg.items[ci] = newVal;
      }
    }
    // 同步 MENU_GROUPS
    Object.values(MENU_GROUPS).forEach(groups => {
      groups.forEach(g => {
        const gi = g.items.indexOf(_catPopupItem);
        if (gi >= 0) g.items[gi] = newVal;
      });
    });
    scheduleAutoSave();
    showSaveToast("✏️ 已改名為「" + newVal + "」");
  }
  popup.style.display = "none";
  rerenderDBPanels();
  initMgmtItems();
}

}

function rgbToHex(color) {
  if (!color) return null;
  if (color.startsWith('#')) return color;
  const m = color.match(/\d+/g);
  if (!m || m.length < 3) return null;
  return '#' + m.slice(0,3).map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
}

function mgmtItemInputChange(inp) {
  if (inp.dataset.editingItem && inp.value !== inp.dataset.editingItem) {
    delete inp.dataset.editingItem;
    const btn = document.getElementById('mgmt-item-btn');
    if (btn) btn.textContent = '➕ 新增品項';
  }
}
function mgmtColorInputChange(inp) {
  if (inp.dataset.editingItem && inp.value !== inp.dataset.editingItem) {
    delete inp.dataset.editingItem;
    const btn = document.getElementById('mgmt-color-item-btn');
    if (btn) btn.textContent = '➕ 新增食材';
  }
}

// initMgmtItems() called via initApp()



// ===== 料理食材 Tooltip =====
const _dishTooltip = document.createElement('div');
_dishTooltip.style.cssText = `
  position: fixed;
  z-index: 99999;
  background: #1a1a2e;
  color: #e8f5e9;
  border: 1.5px solid #2e7d32;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.82rem;
  line-height: 1.7;
  pointer-events: none;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  min-width: 160px;
  max-width: 240px;
  display: none;
  font-family: 'Noto Sans TC', sans-serif;
`;
document.body.appendChild(_dishTooltip);

function showDishTooltip(item, e) {
  const data = DISH_DB[item];
  if (!data || !data.ingredients) return;
  const isReview = data.review;
  let html = `<div style="font-weight:700;font-size:0.88rem;color:#a5d6a7;margin-bottom:6px;border-bottom:1px solid #2e7d32;padding-bottom:4px;">🍽 ${item}</div>`;
  data.ingredients.forEach(ing => {
    html += `<div style="display:flex;justify-content:space-between;gap:12px;">
      <span style="color:#e8f5e9;">${ing.ingredient}</span>
      <span style="color:#81c784;font-weight:600;">${ing.grams}g</span>
    </div>`;
  });
  if (isReview) html += `<div style="color:#ef9a9a;font-size:0.75rem;margin-top:4px;">⚠️ 待確認料理名稱</div>`;
  _dishTooltip.innerHTML = html;
  _dishTooltip.style.display = 'block';
  positionDishTooltip(e);
}

function positionDishTooltip(e) {
  const x = e.clientX + 16;
  const y = e.clientY + 16;
  _dishTooltip.style.left = '0px';
  _dishTooltip.style.top  = '0px';
  const w = _dishTooltip.offsetWidth;
  const h = _dishTooltip.offsetHeight;
  _dishTooltip.style.left = (x + w > window.innerWidth  ? e.clientX - w - 8 : x) + 'px';
  _dishTooltip.style.top  = (y + h > window.innerHeight ? e.clientY - h - 8 : y) + 'px';
}

function hideDishTooltip() {
  _dishTooltip.style.display = 'none';
}

// 全域委派：任何 sel-l2-inp 移入時檢查是否為料理
document.addEventListener('mouseover', e => {
  const inp = e.target;
  if (inp && inp.classList && inp.classList.contains('sel-l2-inp')) {
    const val = inp.value ? inp.value.trim() : '';
    if (val && DISH_NAMES.has(val)) {
      showDishTooltip(val, e);
      return;
    }
  }
  hideDishTooltip();
});
document.addEventListener('mousemove', e => {
  if (_dishTooltip.style.display === 'none') return;
  const inp = e.target;
  if (inp && inp.classList && inp.classList.contains('sel-l2-inp')) {
    positionDishTooltip(e);
  } else {
    hideDishTooltip();
  }
});

// ===== 料理庫管理 =====
let _dishActiveCat = '全部';
let _dishEditingKey = null;

const DISH_CATS = ['全部','蛋白質','白葉菜','綠葉菜','菇','瓜果','根莖','海帶','混炒','其他'];

function dishIngRowHtml(ing = '', g = '') {
  return `<div class="dish-ing-row dep-ing-row">
    <div class="dep-ing-cell-name"><input type="text" placeholder="食材名稱" value="${ing}"></div>
    <div class="dep-ing-cell-num"><input type="number" placeholder="0" value="${g}" min="0" step="0.5"></div>
    <div class="dep-ing-cell-unit"><span class="dep-ing-unit">g</span></div>
    <div class="dep-ing-cell-del"><button class="dep-ing-del" onclick="this.closest('.dish-ing-row').remove()" title="移除">✕</button></div>
  </div>`;
}

function dishAddIngRow() {
  document.getElementById('dish-new-ings').insertAdjacentHTML('beforeend', dishIngRowHtml());
}

function dishEditAddIngRow() {
  document.getElementById('dishEditIngs').insertAdjacentHTML('beforeend', dishIngRowHtml());
}

function dishReadIngs(containerId) {
  const rows = document.getElementById(containerId).querySelectorAll('tr.dish-ing-row, div.dish-ing-row');
  const ings = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const ing = inputs[0].value.trim();
    const g   = parseFloat(inputs[1].value);
    if (ing && !isNaN(g) && g > 0) ings.push({ ingredient: ing, grams: g });
  });
  return ings;
}

function dishSaveNew() {
  const name = document.getElementById('dish-new-name').value.trim();
  const cat  = document.getElementById('dish-new-cat').value;
  const ings = dishReadIngs('dish-new-ings');
  if (!name) { alert('請輸入料理名稱'); return; }
  if (!ings.length) { alert('請至少新增一項食材'); return; }
  DISH_DB[name] = { category: cat, review: false, ingredients: ings };
  DISH_NAMES.add(name);
  DISH_BY_CAT[cat] = DISH_BY_CAT[cat] || [];
  if (!DISH_BY_CAT[cat].includes(name)) DISH_BY_CAT[cat].push(name);
  // 清空表單
  document.getElementById('dish-new-name').value = '';
  document.getElementById('dish-new-ings').innerHTML = '';
  scheduleAutoSave();
  renderDishPanel();
}

function renderDishPanel() {
  const search = (document.getElementById('dish-search')?.value || '').trim().toLowerCase();

  // Cat tabs
  const tabsEl = document.getElementById('dish-cat-tabs');
  tabsEl.innerHTML = DISH_CATS.map(c =>
    `<button class="dish-cat-tab ${c === _dishActiveCat ? 'active' : ''}" onclick="_dishActiveCat='${c}';renderDishPanel()">${c}</button>`
  ).join('');

  // 過濾
  const allDishes = Object.keys(DISH_DB);
  const filtered = allDishes.filter(name => {
    const catOk = _dishActiveCat === '全部' || DISH_DB[name].category === _dishActiveCat;
    const searchOk = !search || name.includes(search);
    return catOk && searchOk;
  });

  // 依類別分組顯示
  const byC = {};
  filtered.forEach(name => {
    const c = DISH_DB[name].category;
    byC[c] = byC[c] || [];
    byC[c].push(name);
  });

  const listEl = document.getElementById('dish-list');
  if (!filtered.length) { listEl.innerHTML = '<div style="color:#90a4ae;font-size:0.88rem;">沒有符合的料理</div>'; return; }

  let html = '';
  const catOrder = ['蛋白質','白葉菜','綠葉菜','菇','瓜果','根莖','海帶','混炒','其他'];
  catOrder.forEach(cat => {
    if (!byC[cat] || !byC[cat].length) return;
    html += `<div class="dish-cat-section-title">${cat} <span style="font-size:0.75rem;opacity:0.6;">${byC[cat].length}道</span></div>`;
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;">';
    byC[cat].forEach(name => {
      const isReview = DISH_DB[name].review;
      html += `<div class="dish-chip ${isReview ? 'review' : ''}" onclick="openDishEdit('${name.replace(/'/g,"\'")}',event)">${isReview ? '⚠️ ' : ''}${name}</div>`;
    });
    html += '</div>';
  });
  listEl.innerHTML = html;
}

function openDishEdit(name, e) {
  _dishEditingKey = name;
  const data = DISH_DB[name];
  if (!data) return;
  document.getElementById('dishEditTitle').textContent = `✏️ ${name}`;
  document.getElementById('dishEditName').value = name;
  document.getElementById('dishEditCat').value = data.category;
  const ingsEl = document.getElementById('dishEditIngs');
  ingsEl.innerHTML = data.ingredients.map(i => dishIngRowHtml(i.ingredient, i.grams)).join('');
  const popup = document.getElementById('dishEditPopup');
  popup.style.display = 'block';
  // 定位
  const x = Math.min(e.clientX, window.innerWidth - 340);
  const y = Math.min(e.clientY, window.innerHeight - 480);
  popup.style.left = Math.max(8, x) + 'px';
  popup.style.top  = Math.max(8, y) + 'px';
}

function dishEditSave() {
  const oldName = _dishEditingKey;
  const newName = document.getElementById('dishEditName').value.trim();
  const cat     = document.getElementById('dishEditCat').value;
  const ings    = dishReadIngs('dishEditIngs');
  if (!newName) { alert('料理名稱不能為空'); return; }
  if (!ings.length) { alert('請至少保留一項食材'); return; }

  // 如果改名，刪舊的
  if (oldName && oldName !== newName) {
    const oldCat = DISH_DB[oldName]?.category;
    delete DISH_DB[oldName];
    DISH_NAMES.delete(oldName);
    if (oldCat && DISH_BY_CAT[oldCat]) {
      DISH_BY_CAT[oldCat] = DISH_BY_CAT[oldCat].filter(n => n !== oldName);
    }
  }

  DISH_DB[newName] = { category: cat, review: false, ingredients: ings };
  DISH_NAMES.add(newName);
  DISH_BY_CAT[cat] = DISH_BY_CAT[cat] || [];
  if (!DISH_BY_CAT[cat].includes(newName)) DISH_BY_CAT[cat].push(newName);

  document.getElementById('dishEditPopup').style.display = 'none';
  scheduleAutoSave();
  renderDishPanel();
}

function dishEditDelete() {
  const name = _dishEditingKey;
  if (!name || !confirm(`確定要刪除「${name}」嗎？`)) return;
  const cat = DISH_DB[name]?.category;
  delete DISH_DB[name];
  DISH_NAMES.delete(name);
  if (cat && DISH_BY_CAT[cat]) {
    DISH_BY_CAT[cat] = DISH_BY_CAT[cat].filter(n => n !== name);
  }
  document.getElementById('dishEditPopup').style.display = 'none';
  scheduleAutoSave();
  renderDishPanel();
}

// 點空白關閉編輯浮層
document.addEventListener('mousedown', e => {
  const popup = document.getElementById('dishEditPopup');
  if (popup && popup.style.display !== 'none' && !popup.contains(e.target)) {
    popup.style.display = 'none';
  }
});

</script>
