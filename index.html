 <meta charset="UTF-8">

<title>Menu Schedule</title>
<meta property="og:title" content="Menu Schedule">

<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root {
  --paper: #f5f3ee;
  --ink: #2d2d2d;
  --red: #ff4d4d;
  --blue: #2d5da1;
  --shadow: #2d2d2d;
  --gold: #b8942a;
  --green-dark: #b8942a;
  --blue-dark: #2a4a8a;
  --border: #2d2d2d;
  --surface-card: #fffef9;
  --surface-card2: #f8f5ef;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  background-color: #f5f3ee;
  background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
  background-size: 22px 22px;
  min-height: 100vh;
  padding: 14px 12px;
  color: var(--ink);
}

h1 {
  text-align: center;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  font-size: 3.2rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 10px;
  letter-spacing: 2px;
  -webkit-text-stroke: 1px rgba(45,45,45,0.2);
  transform: rotate(-1deg);
  display: inline-block;
  width: 100%;
}

.toolbar {
  display: flex; gap: 8px; justify-content: center;
  margin-bottom: 16px; flex-wrap: wrap;
}
.toolbar button {
  padding: 8px 18px;
  border: 2.5px solid var(--ink);
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  font-size: 1.14rem; font-weight: 700;
  cursor: pointer;
  transition: all 0.1s;
  background: white;
  color: var(--ink);
  box-shadow: 3px 3px 0px 0px var(--shadow);
}
.toolbar button:hover {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0px 0px var(--shadow);
}
.toolbar button:active {
  transform: translate(3px, 3px);
  box-shadow: 0px 0px 0px 0px var(--shadow);
}

.btn-add    { background: #fff8e7 !important; color: var(--ink) !important; }
.btn-add-hloc { background: #e6f4e7 !important; color: #2e7d32 !important; border-color: #2e7d32 !important; box-shadow: 3px 3px 0 0 #2e7d32 !important; }
.btn-add-hloc:hover { box-shadow: 1px 1px 0 0 #2e7d32 !important; }
.btn-add-wloc { background: #e8f0fc !important; color: var(--blue) !important; border-color: var(--blue) !important; box-shadow: 3px 3px 0 0 var(--blue) !important; }
.btn-add-wloc:hover { box-shadow: 1px 1px 0 0 var(--blue) !important; }
.btn-export { background: #e7eeff !important; color: var(--blue) !important; border-color: var(--blue) !important; box-shadow: 3px 3px 0 0 var(--blue) !important; }
.btn-export:hover { box-shadow: 1px 1px 0 0 var(--blue) !important; }
.btn-save   { background: #fff3cd !important; color: #856404 !important; border-color: #856404 !important; box-shadow: 3px 3px 0 0 #856404 !important; cursor: default !important; }
.btn-clear  { background: #ffe7e7 !important; color: var(--red) !important; border-color: var(--red) !important; box-shadow: 3px 3px 0 0 var(--red) !important; }
.btn-clear:hover { box-shadow: 1px 1px 0 0 var(--red) !important; }
.btn-history-save { background: white !important; color: var(--gold) !important; border-color: var(--gold) !important; box-shadow: 3px 3px 0 0 var(--gold) !important; cursor: pointer !important; }
.btn-history-save:hover { box-shadow: 1px 1px 0 0 var(--gold) !important; }
.btn-backup  { background: #f0fff4 !important; color: #276749 !important; border-color: #276749 !important; box-shadow: 3px 3px 0 0 #276749 !important; }
.btn-backup:hover  { box-shadow: 1px 1px 0 0 #276749 !important; }
.btn-restore { background: #fff8f0 !important; color: #c05621 !important; border-color: #c05621 !important; box-shadow: 3px 3px 0 0 #c05621 !important; }
.btn-restore:hover { box-shadow: 1px 1px 0 0 #c05621 !important; }

.schedule-area { display: flex; flex-direction: column; gap: 24px; }

.week-block {
  background: transparent;
  border: 2.5px solid var(--ink);
  border-radius: 12px 3px 10px 3px / 3px 10px 3px 12px;
  box-shadow: 5px 5px 0px 0px var(--shadow);
  overflow: hidden;
}
.week-titlebar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: transparent;
  border-bottom: 2.5px solid var(--ink);

}
select:focus { outline: none; border-color: var(--blue); }

/* ── Fuzzy dropdown ── */
.fuzzy-dropdown {
  position: absolute;
  z-index: 9999;
  background: white;
  border: 2px solid var(--ink);
  border-radius: 8px;
  box-shadow: 4px 4px 0 0 var(--ink);
  max-height: 200px;
  overflow-y: auto;
  min-width: 120px;
  font-size: 0.85rem;
  font-family: inherit;
}
.fuzzy-dropdown-item {
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  color: var(--ink);
  transition: background 0.1s;
}
.fuzzy-dropdown-item:hover, .fuzzy-dropdown-item.active {
  background: rgba(45,93,161,0.1);
  color: var(--ink);
}
.fuzzy-dropdown-group {
  padding: 5px 10px 2px;
  font-size: 0.75rem;
  font-weight: 700;
  color: #888;
  letter-spacing: 1px;
  border-top: 1px solid #eee;
  margin-top: 2px;
  pointer-events: none;
  user-select: none;
}
.fuzzy-dropdown-group:first-child {
  border-top: none;
  margin-top: 0;
}
.fuzzy-dropdown-item mark {
  background: #fff9c4;
  color: var(--red);
  font-weight: 700;
  border-radius: 2px;
  padding: 0 1px;
}

.save-toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--ink); color: #fff;
  padding: 10px 20px;
  border: 2px solid var(--ink);
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  font-size: 0.85rem; font-weight: 700;
  box-shadow: 4px 4px 0 0 var(--shadow);
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 9999;
}
.save-toast.show { opacity: 1; }

/* 警告視窗 */
.warning-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(45,45,45,0.45);
  z-index: 99999;
  display: flex; align-items: center; justify-content: center;
  animation: wmFadeIn 0.15s ease;
}
@keyframes wmFadeIn { from { opacity: 0; } to { opacity: 1; } }
.warning-modal {
  background: #fff8e7;
  border: 3px solid var(--red);
  border-radius: 12px 3px 12px 3px / 3px 12px 3px 12px;
  box-shadow: 6px 6px 0 0 var(--red);
  padding: 28px 32px 22px;
  max-width: 360px;
  width: calc(100% - 40px);
  text-align: center;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  animation: wmSlideIn 0.18s ease;
}
@keyframes wmSlideIn { from { transform: translateY(-12px) scale(0.97); opacity:0; } to { transform: none; opacity:1; } }
.warning-modal-icon { font-size: 2.4rem; margin-bottom: 10px; }
.warning-modal-msg {
  color: var(--ink); font-size: 1rem; font-weight: 700;
  white-space: pre-line; line-height: 1.7; margin-bottom: 20px;
}

  display: inline-flex; flex-wrap: wrap; gap: 6px; justify-content: center;

}

  background: #ffe7e7; color: var(--red);

  border-radius: 20px; padding: 2px 12px;
  font-size: 0.88rem; font-weight: 700;
}
.warning-modal-btn {
  padding: 8px 32px;
  background: var(--red); color: #fff;
  border: 2.5px solid var(--red);
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  box-shadow: 3px 3px 0 0 #c0392b;
  transition: all 0.1s;
}
.warning-modal-btn:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 0 #c0392b; }
.warning-modal-btn:active { transform: translate(3px,3px); box-shadow: none; }

/* DB panel */

/* ===== 食物顏色分類管理面板 ===== */

  font-family: inherit;
  font-size: 0.85rem;

}

}

  align-items: center;
  justify-content: center;

/* 可點擊編輯屬性 */

  cursor: pointer;

}

.db-item[style*="#FFFFFF"],
.db-item[style*="#ffffff"],

/* ===== 所有抽屜體內按鈕、選單、輸入框、分頁：1.5x ===== */

.drawer-tab           { padding: 7px 18px; font-size: 1.2rem; }

/* 遮罩（半透明，點擊後關閉） */

  position: fixed;

.drawer-header {
  color: var(--ink);

// ===== 歷史紀錄資料 =====
let historyList = [];


async function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (raw) historyList = JSON.parse(raw);
    if (!Array.isArray(historyList)) historyList = [];
  } catch(e) { historyList = []; }
}

async function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(historyList)); } catch(e) {}
  if (_histAutoSave) _histAutoSave();
}

function showSaveToast(msg, duration) {
  let t = document.getElementById("saveToast");
  if (!t) {
    t = document.createElement("div");
    t.id = "saveToast";
    t.className = "save-toast";
    document.body.appendChild(t);
  }
  t.textContent = msg || "✅ 已自動儲存";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration || 2500);
}

function showWarningModal(msg, locs) {
  // 移除舊的（防重複）
  const old = document.getElementById('_warningModalOverlay');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.className = 'warning-modal-overlay';
  overlay.id = '_warningModalOverlay';

  const modal = document.createElement('div');
  modal.className = 'warning-modal';

  const icon = document.createElement('div');
  icon.className = 'warning-modal-icon';
  icon.textContent = '⚠️';

  const msgEl = document.createElement('div');
  msgEl.className = 'warning-modal-msg';
  msgEl.textContent = msg;

  const btn = document.createElement('button');
  btn.className = 'warning-modal-btn';
  btn.textContent = '知道了';
  btn.onclick = () => overlay.remove();

  modal.appendChild(icon);
  modal.appendChild(msgEl);
  if (locs && locs.length) {
    const locsDiv = document.createElement('div');
    locsDiv.className = 'warning-modal-locs';
    locs.forEach(l => {
      const tag = document.createElement('span');
      tag.className = 'warning-modal-loc-tag';
      tag.textContent = l;
      locsDiv.appendChild(tag);
    });
    modal.appendChild(locsDiv);
  }
  modal.appendChild(btn);
  overlay.appendChild(modal);

  // 點擊背景也可關閉
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  btn.focus();
}

function scheduleAutoSave() {

function collectDbData() {
  return {
    DB: JSON.parse(JSON.stringify(DB)),
    MENU_GROUPS: JSON.parse(JSON.stringify(MENU_GROUPS)),
    COLOR_GROUPS: JSON.parse(JSON.stringify(COLOR_GROUPS)),
    FOOD_COLOR: JSON.parse(JSON.stringify(FOOD_COLOR)),
    ROWS: JSON.parse(JSON.stringify(ROWS)),
    ROW_CATS: JSON.parse(JSON.stringify(ROW_CATS)),
    DISH_DB: JSON.parse(JSON.stringify(DISH_DB)),
  };
}

function applyDbData(saved) {
  if (!saved) return;
  if (saved.DB) {
    Object.keys(DB).forEach(k => delete DB[k]);
    Object.assign(DB, saved.DB);
  }
  if (saved.MENU_GROUPS) {
    Object.keys(MENU_GROUPS).forEach(k => delete MENU_GROUPS[k]);
    Object.assign(MENU_GROUPS, saved.MENU_GROUPS);
  }
  if (saved.COLOR_GROUPS) {
    Object.keys(COLOR_GROUPS).forEach(k => delete COLOR_GROUPS[k]);
    Object.assign(COLOR_GROUPS, saved.COLOR_GROUPS);
  }
  if (saved.FOOD_COLOR) {
    Object.keys(FOOD_COLOR).forEach(k => delete FOOD_COLOR[k]);
    Object.assign(FOOD_COLOR, saved.FOOD_COLOR);
  }
  if (saved.ROWS) {
    ROWS.length = 0;
    saved.ROWS.forEach(r => ROWS.push(r));
    DATA_ROWS.length = 0;
    saved.ROWS.filter(r => !["主菜","副主菜","米飯"].includes(r)).forEach(r => DATA_ROWS.push(r));
  }
  if (saved.ROW_CATS) {
    Object.keys(ROW_CATS).forEach(k => delete ROW_CATS[k]);
    Object.assign(ROW_CATS, saved.ROW_CATS);
  }
  if (saved.DISH_DB) {
    Object.keys(DISH_DB).forEach(k => delete DISH_DB[k]);
    Object.assign(DISH_DB, saved.DISH_DB);
    // 重建 DISH_NAMES 和 DISH_BY_CAT
    DISH_NAMES.clear();
    Object.keys(DISH_BY_CAT).forEach(k => delete DISH_BY_CAT[k]);
    Object.entries(DISH_DB).forEach(([name, data]) => {
      DISH_NAMES.add(name);
      DISH_BY_CAT[data.category] = DISH_BY_CAT[data.category] || [];
      if (!DISH_BY_CAT[data.category].includes(name)) DISH_BY_CAT[data.category].push(name);
    });
  }
  rerenderDBPanels();
  initMgmtItems();
}

// ===== 子地點（同欄附加地點）讀取 / 套用 =====
function _readSubLocs(block, startCol, count) {
  // 取得 table 第2行的 th（地點標題列）
  const ths = [...block.querySelectorAll("table tr:nth-child(2) th")];
  const result = [];
  for (let i = 0; i < count; i++) {
    const th = ths[i + startCol]; // +1 for sticky "品項" th that is rowspan=3
    if (!th || !th._subList) { result.push([]); continue; }
    const subs = [];
    th._subList.querySelectorAll(".loc-sub-item").forEach(item => {
      subs.push({
        name: item._nameInp?.value || "",
        qty:  item._qtyInp?.value  || ""
      });
    });
    result.push(subs);
  }
  return result;
}

function _applySubLocs(block, startCol, subLocsArr, makeSubItemFn) {
  if (!subLocsArr || !subLocsArr.length) return;
  const ths = [...block.querySelectorAll("table tr:nth-child(2) th")];
  subLocsArr.forEach((subs, i) => {
    if (!subs || !subs.length) return;
    const th = ths[i + startCol];
    if (!th || !th._subList || !th._makeSubItem) return;
    const addBtn = th._subList.querySelector(".loc-add-sub-btn");
    subs.forEach(s => {
      const item = th._makeSubItem(s.name, s.qty);
      th._subList.insertBefore(item, addBtn);
    });
    if (th._updateTotal) th._updateTotal();
  });
}

function collectMenuData() {

  document.querySelectorAll(".week-block").forEach(block => {
    const wid = block.id.replace("block_", "");
    const date = block.querySelector(".week-date")?.value || "";
    const info = weekDataMap[wid] || {};

    const wLocs = info.wLocs || [];

    const locSels = [...block.querySelectorAll(".loc-sel")];
    const locInps = [...block.querySelectorAll(".loc-inp")];
    const locQtys = [...block.querySelectorAll(".loc-qty-inp")];
    let locIdx = 0;
    const resolvedHLocs = hLocs.map(() => {
      const s = locSels[locIdx]; const inp = locInps[locIdx]; locIdx++;
      if (!s) return "";
      // 若 sel 被隱藏（已切換為自訂輸入模式），直接讀 inp 的值
      if (!s || s.style.display === "none") return inp?.value || "";
      return s.value === "__custom__" ? (inp?.value || "") : s.value;
    });
    const resolvedWLocs = wLocs.map(() => {
      const s = locSels[locIdx]; const inp = locInps[locIdx]; locIdx++;
      if (!s) return "";
      if (!s || s.style.display === "none") return inp?.value || "";
      return s.value === "__custom__" ? (inp?.value || "") : s.value;
    });
    const resolvedHQtys = hLocs.map((_, i) => locQtys[i]?.value || "");

      const sels2 = [...tr.querySelectorAll("td.td-l2 select")];
      sels1.forEach((s1, i) => {

      });
    });

    data.push({ wid, date, hLocs: resolvedHLocs, wLocs: resolvedWLocs, hQtys: resolvedHQtys, wQtys: resolvedWQtys, cells,
      hSubLocs: _readSubLocs(block, 0, hLocs.length),

  return { weekCount, data };

// ===== 儲存單筆到歷史紀錄 =====
function saveWeekToHistory(wid) {
  const block = document.getElementById(`block_${wid}`);
  if (!block) return;
  const data = extractWeekData(block);
  const date = data.date;
  if (!date) {
    alert("請先選擇日期再存入歷史紀錄。");
    return;
  }

  // 檢查是否已有相同日期（可選：詢問是否覆蓋）
  const existIdx = historyList.findIndex(h => h.date === date);
  if (existIdx >= 0) {
    const existing = historyList[existIdx];
    const savedAtInfo = existing.savedAt ? `\n（已存的紀錄儲存於：${existing.savedAt}${existing.savedBy ? "，存檔者：" + existing.savedBy : ""}）` : "";
    const choice = confirm(`「${date}」已有歷史紀錄，是否覆蓋？${savedAtInfo}\n\n按「確定」覆蓋，按「取消」略過。`);
    if (!choice) return;
    historyList[existIdx] = {
      ...data,
      savedAt: new Date().toLocaleString("zh-TW"),
      savedBy: currentUser ? (currentUser.displayName || currentUser.email) : "（未登入）"
    };
  } else {
    historyList.unshift({
      ...data,
      savedAt: new Date().toLocaleString("zh-TW"),
      savedBy: currentUser ? (currentUser.displayName || currentUser.email) : "（未登入）"
    });
  }

  saveHistory();
  renderHistoryPanel();
  showSaveToast("📌 已存入歷史紀錄");
}

// ===== 歷史日曆 =====
let _histCalYear  = new Date().getFullYear();
let _histCalMonth = new Date().getMonth();

function histCalNav(dir) {
  _histCalMonth += dir;
  if (_histCalMonth > 11) { _histCalMonth = 0; _histCalYear++; }
  if (_histCalMonth < 0)  { _histCalMonth = 11; _histCalYear--; }
  renderHistoryPanel();
}
function histCalGoToday() {
  const n = new Date();
  _histCalYear = n.getFullYear(); _histCalMonth = n.getMonth();
  renderHistoryPanel();
}

function renderHistoryPanel() {
  const gridEl   = document.getElementById('hist-cal-grid');
  const countEl  = document.getElementById('historyCount');
  const titleEl  = document.getElementById('hist-cal-month-title');
  const statsEl  = document.getElementById('hist-cal-stats');
  if (!gridEl) return;

  if (countEl) countEl.textContent = `${historyList.length} 筆`;

  const y = _histCalYear, m = _histCalMonth;
  if (titleEl) titleEl.textContent = `${y} . ${String(m+1).padStart(2,'0')}`;

  // 建立日期 → index 對照
  const dateMap = {};
  historyList.forEach((entry, idx) => { if (entry.date) dateMap[entry.date] = idx; });

  const firstDay    = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const now         = new Date();
  const todayStr    = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  let monthCount = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (dateMap[ds] !== undefined) monthCount++;
  }
  if (statsEl) statsEl.textContent = `本月 ${monthCount} 天有紀錄`;

  gridEl.innerHTML = '';

  // 前補空格
  for (let i = 0; i < firstDay; i++) {
    const b = document.createElement('div');
    b.className = 'hist-cal-cell out-month';
    gridEl.appendChild(b);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ds  = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const idx = dateMap[ds];
    const hasData = idx !== undefined;
    const isToday = ds === todayStr;
    const dow = (firstDay + d - 1) % 7;
    const isSun = dow === 0, isSat = dow === 6;

    const cell = document.createElement('div');
    cell.className = ['hist-cal-cell', hasData ? 'has-data' : '', isToday ? 'is-today' : ''].join(' ');

    const numSpan = document.createElement('span');
    numSpan.className = ['hist-cal-num', isSun ? 'is-sun' : isSat ? 'is-sat' : '', isToday ? 'is-today-num' : ''].join(' ');
    numSpan.textContent = d;
    cell.appendChild(numSpan);

    if (hasData) {
      const dot = document.createElement('div');
      dot.className = 'hist-cal-dot';
      dot.textContent = '✓ 有紀錄';
      cell.appendChild(dot);
      cell.addEventListener('click', () => openHistDateModal(idx));
    }

    gridEl.appendChild(cell);
  }

  // 後補空格
  const rem = (firstDay + daysInMonth) % 7;
  if (rem) for (let i = 0; i < 7 - rem; i++) {
    const b = document.createElement('div');
    b.className = 'hist-cal-cell out-month';
    gridEl.appendChild(b);
  }
}

function openHistDateModal(idx) {
  const entry = historyList[idx];
  if (!entry) return;
  const modal     = document.getElementById('histDateModal');
  const titleEl   = document.getElementById('histDateModalTitle');
  const bodyEl    = document.getElementById('histDateModalBody');
  const footerEl  = document.getElementById('histDateModalFooter');

  titleEl.innerHTML = `📅 ${entry.date}${entry.day ? '　' + entry.day : ''}`;

  bodyEl.innerHTML = `
    <div style="font-size:0.82rem;color:#888;margin-bottom:10px;">
      儲存於 ${entry.savedAt || '—'}${entry.savedBy ? '　✍️ ' + entry.savedBy : ''}
    </div>
    <div style="overflow-x:auto;">${buildHistoryTableHTML(entry)}</div>
  `;

  footerEl.innerHTML = '';
  const restoreBtn = document.createElement('button');
  restoreBtn.className = 'btn-hist-restore';
  restoreBtn.textContent = '↩ 還原到編輯區';
  restoreBtn.onclick = () => { restoreFromHistory(idx); closeHistDateModal(); };
  const exportBtn = document.createElement('button');
  exportBtn.className = 'btn-hist-export';
  exportBtn.textContent = '📄 匯出';
  exportBtn.onclick = () => exportHistoryEntry(idx);
  const delBtn = document.createElement('button');
  delBtn.className = 'btn-hist-del';
  delBtn.textContent = '✕ 刪除此紀錄';
  delBtn.onclick = () => { deleteHistoryEntry(idx); closeHistDateModal(); renderHistoryPanel(); };
  footerEl.appendChild(restoreBtn);
  footerEl.appendChild(exportBtn);
  footerEl.appendChild(delBtn);

  modal.classList.add('open');
}

function closeHistDateModal() {
  document.getElementById('histDateModal').classList.remove('open');
}

function buildHistoryTableHTML(entry) {
  const hLocs = entry.hLocs || [];
  const wLocs = entry.wLocs || [];

  const hSpan = hLocs.length * 2;
  const wSpan = wLocs.length * 2;

  let html = `<table>`;
  // row1
  html += `<tr>
    <th class="th-week" rowspan="3" style="min-width:40px;">品項</th>
    <th class="th-health" colspan="${hSpan}">【健康餐】</th>
    <th class="th-wind" colspan="${wSpan}">【風味餐】</th>
  </tr>`;

  // row2 地點
  html += "<tr>";
  hLocs.forEach((loc, i) => {
    const qty = (entry.hQtys||[])[i];
    const qtyBadge = qty ? `<span style="display:inline-block;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;margin-left:4px;display:inline-flex;align-items:center;gap:1px;">✦${qty}份</span>` : "";

    const subBadges = subs.length ? `<span style="display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;margin-top:3px;">${subs.map(s=>`<span style="display:inline-flex;align-items:center;gap:3px;">${s.name}${s.qty?`<span style="display:inline-flex;align-items:center;gap:1px;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;">✦${s.qty}份</span>`:""}</span>`).join("")}</div>` : "";
    html += `<th class="${i%2===0?"th-hloc":"th-hloc-light"}" colspan="2" style=""><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="display:flex;align-items:center;flex-wrap:nowrap;white-space:nowrap;">${loc}${qtyBadge}</div>${subBadges}</div></th>`;
  });
  wLocs.forEach((loc, i) => {
    const qty = (entry.wQtys||[])[i];
    const qtyBadge = qty ? `<span style="display:inline-block;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;margin-left:4px;display:inline-flex;align-items:center;gap:1px;">✦${qty}份</span>` : "";
    const subs = ((entry.wSubLocs||[])[i]||[]);
    const subBadges = subs.length ? `<span style="display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;margin-top:3px;">${subs.map(s=>`<span style="display:inline-flex;align-items:center;gap:3px;">${s.name}${s.qty?`<span style="display:inline-flex;align-items:center;gap:1px;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;">✦${s.qty}份</span>`:""}</span>`).join("")}</div>` : "";
    html += `<th class="${i%2===0?"th-wloc":"th-wloc-light"}" colspan="2" style=""><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="display:flex;align-items:center;flex-wrap:nowrap;white-space:nowrap;">${loc}${qtyBadge}</div>${subBadges}</div></th>`;
  });
  html += "</tr>";

  // row3 sub
  html += "<tr>";
  hLocs.forEach((_, i) => {
    ["類別","品項"].forEach(l => {
      html += `<th class="th-sub ${i%2===0?"th-sub-h":"th-sub-h-light"}">${l}</th>`;
    });
  });

      html += `<th class="th-sub ${i%2===0?"th-sub-w":"th-sub-w-light"}">${l}</th>`;
    });

  html += "</tr>";

  // 資料列：依 ROWS 順序
  const totalLocs = hLocs.length + wLocs.length;
  ROWS.forEach(row => {
    const [hS, hS2, wS, wS2] = getRowStyles(row);
    html += `<tr><td class="td-cat">${row}</td>`;
    for (let i = 0; i < totalLocs; i++) {

      const baseS  = isH ? hS  : wS;
      const baseS2 = isH ? hS2 : wS2;

      const useDark = col % 2 === 0;

      const cellKey = `${row}_${i}`;
      const found = (entry.cells || []).filter(c => c.row === row && c.col === i);
      const cell = found[0] || {};
      const v1 = (cell.v1 && cell.v1 !== "-") ? cell.v1 : "";
      const v2 = (cell.v2 && cell.v2 !== "-" && cell.v2 !== "-- 品項 --") ? cell.v2 : "";

      let itemBgStyle = "";
      if (v2) {
        const colors = getFoodColors(v2);
        if (colors) itemBgStyle = `background:${colors.bg};color:${colors.fg};`;
      }

      html += `<td class="td-l1 ${baseS}" style="padding:3px 5px;font-size:0.85rem;">${v1}</td>`;
      html += `<td class="td-l2 ${baseS2}" style="padding:3px 5px;font-size:0.85rem;font-weight:600;${itemBgStyle}">${v2}</td>`;
    }
    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// ===== 還原歷史到編輯區 =====
function restoreFromHistory(idx) {
  const entry = historyList[idx];
  if (!entry) return;
  if (!confirm(`確定將「${entry.date}」的歷史紀錄還原為新一筆菜單？`)) return;

  weekCount++;
  const block = buildWeek(weekCount, entry.hLocs, entry.wLocs, entry.hQtys, entry.wQtys);
  document.getElementById("scheduleArea").appendChild(block);

  const di = block.querySelector(".week-date");
  if (di && entry.date) {
    di.value = entry.date;
    di.dispatchEvent(new Event("change"));
  }

  const locSels = [...block.querySelectorAll(".loc-sel")];
  const locInps = [...block.querySelectorAll(".loc-inp")];
  const locQtys = [...block.querySelectorAll(".loc-qty-inp")];
  const allLocs = [...(entry.hLocs||[]), ...(entry.wLocs||[])];
  const allQtys = [...(entry.hQtys||[]), ...(entry.wQtys||[])];
  allLocs.forEach((loc, i) => {
    const s = locSels[i]; const inp = locInps[i];
    if (!s) return;
    s.style.display = "none";
    if(inp) { inp.style.display="flex"; inp.value=loc; }
    if(locQtys[i] && allQtys[i]) locQtys[i].value = allQtys[i];
  });

  const rowMap = {};
  block.querySelectorAll("table tr").forEach(tr => {
    const catTd = tr.querySelector(".td-cat");
    if (!catTd) return;
    rowMap[catTd.textContent] = tr;
  });
  (entry.cells || []).forEach(c => {
    const tr = rowMap[c.row]; if (!tr) return;
    const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
    const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
    const s1 = sels1[c.col]; const inp2 = inps2[c.col];
    if (s1 && c.v1) {
      s1.value = c.v1;
      s1.dispatchEvent(new Event("change"));
      setTimeout(() => {
        if (inp2 && c.v2 && c.v2 !== "-" && c.v2 !== "-- 品項 --") {
          inp2.value = c.v2;
          if (inp2._applyColor) inp2._applyColor(c.v2);
        }
      }, 50);
    }
  });

  // 套用子地點
  const hLen = (entry.hLocs||[]).length;
  _applySubLocs(block, 0, entry.hSubLocs || []);
  _applySubLocs(block, hLen, entry.wSubLocs || []);

  block.scrollIntoView({ behavior: "smooth" });
  scheduleAutoSave();
  showSaveToast("↩ 已還原到編輯區");
}

// ===== 刪除歷史紀錄 =====
function deleteHistoryEntry(idx) {
  const entry = historyList[idx];
  if (!confirm(`確定刪除「${entry.date}」的歷史紀錄？`)) return;
  historyList.splice(idx, 1);
  saveHistory();
  renderHistoryPanel();
}

// ===== 清除全部歷史 =====
function clearAllHistory() {
  if (historyList.length === 0) { alert("歷史紀錄已是空的。"); return; }
  if (!confirm("確定清除全部歷史紀錄？此操作無法復原。")) return;
  historyList = [];
  saveHistory();
  renderHistoryPanel();
}

// ===== 匯出全部歷史紀錄（由新到舊，依菜單日期） =====
function exportAllHistory() {
  if (historyList.length === 0) { alert("目前沒有歷史紀錄可匯出。"); return; }

  const from = document.getElementById('export-date-from')?.value || '';
  const to   = document.getElementById('export-date-to')?.value   || '';

  let cssText = "";
  for (const sheet of document.styleSheets) {
    try {
      for (const rule of sheet.cssRules) { cssText += rule.cssText + "\n"; }
    } catch(e) {}
  }

  // 依菜單日期由新到舊排序，並套用日期區間篩選
  const sorted = [...historyList]
    .filter(e => {
      if (from && e.date < from) return false;
      if (to   && e.date > to)   return false;
      return true;
    })
    .sort((a, b) => new Date(b.date || "2000-01-01") - new Date(a.date || "2000-01-01"));

  if (sorted.length === 0) { alert("篩選後沒有符合日期區間的歷史紀錄。"); return; }

  let tablesHTML = "";
  sorted.forEach(entry => {
    const tableHTML = buildHistoryTableHTML(entry);
    tablesHTML += `
      <div class="week-block" style="margin-bottom:28px;">
        <div class="week-titlebar">
          <span class="week-label">日期：${entry.date}</span>
          <span class="week-day">${entry.day || ""}</span>
          <span style="font-size:0.85rem;color:#b0bec5;margin-left:8px;">儲存於 ${entry.savedAt || ""}${entry.savedBy ? " ✍️ " + entry.savedBy : ""}</span>
        </div>
        <div class="tbl-wrap">${tableHTML}</div>
      </span>`;
  });

// ===== 匯出目前主畫面為 HTML =====
function exportCurrentAsHTML() {
  const blocks = document.querySelectorAll(".week-block");
  if (blocks.length === 0) { alert("目前沒有任何菜單可匯出。"); return; }

  const from = document.getElementById('export-date-from')?.value || '';
  const to   = document.getElementById('export-date-to')?.value   || '';

  let cssText = "";
  for (const sheet of document.styleSheets) {
    try { for (const rule of sheet.cssRules) { cssText += rule.cssText + "\n"; } } catch(e) {}
  }

  let tablesHTML = "";
  blocks.forEach(block => {
    const date = block.querySelector(".week-date")?.value || "";
    if (from && date && date < from) return;
    if (to   && date && date > to)   return;
    const day = block.querySelector(".week-day")?.textContent || "";
    const wid = block.id.replace("block_", "");
    const info = weekDataMap[wid] || {};
    const hLocsCount = (info.hLocs || DEFAULT_HEALTH_LOCS).length;
    const wLocsCount = (info.wLocs || DEFAULT_WIND_LOCS).length;
    const locSels = [...block.querySelectorAll(".loc-sel")];
    const locInps = [...block.querySelectorAll(".loc-inp")];
    const locQtyInps = [...block.querySelectorAll(".loc-qty-inp")];
    const resolvedLocs = locSels.map((s, i) => getLocName(s, locInps[i]));
    const hLocNames = resolvedLocs.slice(0, hLocsCount);
    const wLocNames = resolvedLocs.slice(hLocsCount, hLocsCount + wLocsCount);
    const hQtyVals = hLocNames.map((_, i) => locQtyInps[i]?.value || "");
    const wQtyVals = wLocNames.map((_, i) => locQtyInps[hLocNames.length + i]?.value || "");

    const hSpan = hLocNames.length * 2;
    const wSpan = wLocNames.length * 2;
    let hr1 = `<tr><th class="th-week" rowspan="3">品項</th><th class="th-health" colspan="${hSpan}">【健康餐】</th><th class="th-wind" colspan="${wSpan}">【風味餐】</th></tr>`;
    // 讀子地點
    const hSubL = _readSubLocs(block, 0, hLocNames.length);
    const wSubL = _readSubLocs(block, hLocNames.length, wLocNames.length);
    let hr2 = "<tr>";
    hLocNames.forEach((loc, i) => {
      const qty = hQtyVals[i];
      const qtyBadge = qty ? `<span style="display:inline-block;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;margin-left:4px;display:inline-flex;align-items:center;gap:1px;">✦${qty}份</span>` : "";
      const subBadges = ((hSubL[i]||[]).length ? `<span style="display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;margin-top:3px;">${(hSubL[i]||[]).map(s=>`<span style="display:inline-flex;align-items:center;gap:3px;">${s.name}${s.qty?`<span style="display:inline-flex;align-items:center;gap:1px;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;">✦${s.qty}份</span>`:""}</span>`).join("")}</div>` : "");
      const hTotal2 = (() => { const subs = hSubL[i]||[]; if (!subs.length) return ""; let t = parseInt(hQtyVals[i])||0; subs.forEach(s=>{ t += parseInt(s.qty)||0; }); return t > 0 ? `<div style="font-size:0.78rem;font-weight:700;white-space:nowrap;background:rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:1px 8px;margin-bottom:6px;align-self:center;">共 <span style="color:#ff4d4d;">${t}</span> 份</div>` : ""; })();
      hr2 += `<th class="${i%2===0?"th-hloc":"th-hloc-light"}" colspan="2" style=""><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 6px;">${hTotal2}<div style="display:flex;align-items:center;flex-wrap:nowrap;white-space:nowrap;">${loc}${qtyBadge}</div>${subBadges}</div></th>`;
    });
    wLocNames.forEach((loc, i) => {
      const qty = wQtyVals[i];
      const qtyBadge = qty ? `<span style="display:inline-block;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;margin-left:4px;display:inline-flex;align-items:center;gap:1px;">✦${qty}份</span>` : "";
      const subBadges = ((wSubL[i]||[]).length ? `<span style="display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;margin-top:3px;">${(wSubL[i]||[]).map(s=>`<span style="display:inline-flex;align-items:center;gap:3px;">${s.name}${s.qty?`<span style="display:inline-flex;align-items:center;gap:1px;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;">✦${s.qty}份</span>`:""}</span>`).join("")}</div>` : "");
      const wTotal2 = (() => { const subs = wSubL[i]||[]; if (!subs.length) return ""; let t = parseInt(wQtyVals[i])||0; subs.forEach(s=>{ t += parseInt(s.qty)||0; }); return t > 0 ? `<div style="font-size:0.78rem;font-weight:700;white-space:nowrap;background:rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:1px 8px;margin-bottom:6px;align-self:center;">共 <span style="color:#ff4d4d;">${t}</span> 份</div>` : ""; })();

    });
    hr2 += "</tr>";
    let hr3 = "<tr>";
    hLocNames.forEach((_, i) => ["類別","品項"].forEach(l => { hr3 += `<th class="th-sub ${i%2===0?"th-sub-h":"th-sub-h-light"}">${l}</th>`; }));
    wLocNames.forEach((_, i) => ["類別","品項"].forEach(l => { hr3 += `<th class="th-sub ${i%2===0?"th-sub-w":"th-sub-w-light"}">${l}</th>`; }));
    hr3 += "</tr>";

    let rowsHTML = "";
    block.querySelectorAll("table tr").forEach(tr => {
      const catTd = tr.querySelector(".td-cat");
      if (!catTd) return;
      if (tr.classList.contains('row-collapsed')) return; // 折收的列不匯出
      const rowName = catTd.textContent;
      const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
      const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
      const [hS, hS2, wS, wS2] = getRowStyles(rowName);
      rowsHTML += `<tr><td class="td-cat">${rowName}</td>`;
      sels1.forEach((s1, i) => {
        const isH = i < hLocNames.length;
        const baseS = isH ? hS : wS;
        const baseS2 = isH ? hS2 : wS2;
        const v1 = s1.value && s1.value !== "-" ? s1.value : "";
        const rawV2 = inps2[i]?.value || "";
        const v2 = rawV2 && rawV2 !== "-" && rawV2 !== "-- 品項 --" ? rawV2 : "";
        let itemBgStyle = "";
        if (v2) { const colors = getFoodColors(v2); if (colors) itemBgStyle = `background:${colors.bg};color:${colors.fg};`; }
        rowsHTML += `<td class="td-l1 ${baseS}" style="padding:4px 6px;">${v1}</td>`;
        rowsHTML += `<td class="td-l2 ${baseS2}" style="padding:4px 6px;font-weight:600;${itemBgStyle}">${v2}</td>`;
      });
      rowsHTML += "</tr>";
    });

    const dayLabel = (day && day !== "請選日期") ? `<span class="week-day">${day}</span>` : "";
    tablesHTML += `<div class="week-block" style="margin-bottom:28px;">
      <div class="week-titlebar">
        <span class="week-label">日期：${date}</span>${dayLabel}
      </div>
      <div class="tbl-wrap"><table>${hr1}${hr2}${hr3}${rowsHTML}</table></div>
    </span>`;
  });

// ===== 全部存成歷史 =====
async function saveAllToHistory() {
  const blocks = document.querySelectorAll(".week-block");
  if (blocks.length === 0) { alert("目前沒有任何日期菜單。"); return; }

  // 先收集所有 block 的資料，並找出哪些有重複
  const toSave = [];
  for (const block of blocks) {
    const data = extractWeekData(block);
    if (!data.date) continue;
    toSave.push(data);
  }
  if (toSave.length === 0) { alert("請先選擇日期再存入歷史紀錄。"); return; }

  let savedCount = 0;
  let skippedCount = 0;

  for (const data of toSave) {
    const date = data.date;
    const existIdx = historyList.findIndex(h => h.date === date);

    if (existIdx >= 0) {
      const existing = historyList[existIdx];
      const savedAtInfo = existing.savedAt ? `\n（已存的紀錄儲存於：${existing.savedAt}${existing.savedBy ? "，存檔者：" + existing.savedBy : ""}）` : "";
      const choice = confirm(`「${date}」已有歷史紀錄，是否覆蓋？${savedAtInfo}\n\n按「確定」覆蓋，按「取消」略過。`);
      if (!choice) { skippedCount++; continue; }
      historyList[existIdx] = {
        ...data,
        savedAt: new Date().toLocaleString("zh-TW"),
        savedBy: currentUser ? (currentUser.displayName || currentUser.email) : "（未登入）"
      };
    } else {
      historyList.unshift({
        ...data,
        savedAt: new Date().toLocaleString("zh-TW"),
        savedBy: currentUser ? (currentUser.displayName || currentUser.email) : "（未登入）"
      });
    }
    savedCount++;
  }

  if (savedCount > 0) {
    await saveHistory();
    renderHistoryPanel();
    showSaveToast(`📌 已儲存 ${savedCount} 筆到歷史紀錄${skippedCount > 0 ? "，略過 " + skippedCount + " 筆" : ""}`);
  } else {
    showSaveToast(`⏭️ 全部略過，共 ${skippedCount} 筆`);
  }
}

// ===== 備份 & 匯入恢復 =====
function backupData() {
  const backup = {
    version: "backup_v1",
    exportedAt: new Date().toLocaleString("zh-TW"),
    menu: collectMenuData(),
    history: JSON.parse(JSON.stringify(historyList)),
    db: collectDbData()
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const a = document.createElement("a");
  const dateStr = new Date().toLocaleDateString("zh-TW").replace(/\//g, "-");
  a.href = URL.createObjectURL(blob);
  a.download = `menu_backup_${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showSaveToast("💾 備份已下載");
}

async function restoreData(input) {
  const file = input.files[0];
  input.value = "";
  if (!file) return;
  let backup;
  try {
    backup = JSON.parse(await file.text());
  } catch(e) {
    alert("❌ 檔案格式錯誤，無法解析 JSON。"); return;
  }
  if (!backup.version || !backup.version.startsWith("backup_")) {
    alert("❌ 不是合法的備份檔。"); return;
  }

  const hasmenu = backup.menu && Array.isArray(backup.menu.data) && backup.menu.data.length > 0;
  const hasHistory = Array.isArray(backup.history) && backup.history.length > 0;
  const parts = [];
  if (hasmenu) parts.push(`主畫面菜單 ${backup.menu.data.length} 筆`);
  if (hasHistory) parts.push(`歷史紀錄 ${backup.history.length} 筆`);
  if (parts.length === 0) { alert("備份檔中沒有可恢復的資料。"); return; }

  const msg = `確定要匯入恢復以下資料嗎？\n\n• ${parts.join("\n• ")}\n\n（主畫面現有菜單將被覆蓋，歷史紀錄將合併）`;
  if (!confirm(msg)) return;

  // 恢復 DB（品項/顏色等設定）
  if (backup.db) {
    applyDbData(backup.db);
    if (_dbAutoSave) _dbAutoSave();
  }

  // 恢復主畫面菜單
  if (hasmenu) {
    await applyMenuData(backup.menu);
    scheduleAutoSave();
  }

  // 恢復歷史紀錄（以日期去重合併，備份的優先）
  if (hasHistory) {
    backup.history.forEach(entry => {
      const existIdx = historyList.findIndex(h => h.date === entry.date);
      if (existIdx >= 0) {
        historyList[existIdx] = entry; // 備份覆蓋同日期
      } else {
        historyList.push(entry);
      }
    });
    historyList.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
    await saveHistory();
    renderHistoryPanel();
  }

  showSaveToast(`✅ 恢復完成：${parts.join("、")}`);
}

// ===== 匯出抽屜日期篩選提示 =====
function updateExportDateHint() {
  const from = document.getElementById('export-date-from')?.value;
  const to   = document.getElementById('export-date-to')?.value;
  const hint = document.getElementById('export-date-hint');
  if (!hint) return;
  if (!from && !to) { hint.textContent = '未設定區間，將匯出全部'; return; }
  let imgCount = 0;
  document.querySelectorAll(".week-block").forEach(b => {
    const d = b.querySelector(".week-date")?.value || "";
    if (!d) return;
    if (from && d < from) return;
    if (to   && d > to)   return;
    imgCount++;
  });
  const histCount = historyList.filter(e => {
    if (from && e.date < from) return false;
    if (to   && e.date > to)   return false;
    return true;
  }).length;
  hint.textContent = `圖片 ${imgCount} 筆　歷史 ${histCount} 筆`;
}
function updateImgDateHint() { updateExportDateHint(); }
function updateHistDateHint() { updateExportDateHint(); }

// ===== 匯出成圖片（使用 html2canvas） =====
async function exportAsImage(itemOnlyMode) {
  const from = document.getElementById('export-date-from')?.value || '';
  const to   = document.getElementById('export-date-to')?.value   || '';

  const allBlocks = [...document.querySelectorAll(".week-block")];
  const blocks = allBlocks.filter(b => {
    const d = b.querySelector(".week-date")?.value || "";
    if (!d) return (!from && !to); // 沒日期：無篩選才包含
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    return true;
  });

  if (blocks.length === 0) {
    alert("沒有符合條件的資料可匯出，請確認日期區間或主畫面是否有日期菜單。");
    return;
  }

  // 動態載入 html2canvas
  if (!window.html2canvas) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
      s.onload = resolve;
      s.onerror = () => reject(new Error("html2canvas 載入失敗"));
      document.head.appendChild(s);
    });
  }

  const modeLabel = itemOnlyMode ? "僅品項" : "含類別";
  const dateStr = new Date().toLocaleDateString("zh-TW").replace(/\//g,"-");

  // 建立一個隱藏容器來渲染
  let cssText = "";
  for (const sheet of document.styleSheets) {
    try { for (const rule of sheet.cssRules) { cssText += rule.cssText + "\n"; } } catch(e) {}
  }

  let tablesHTML = "";
  blocks.forEach((block) => {
    const date = block.querySelector(".week-date")?.value || "";
    const day  = block.querySelector(".week-day")?.textContent || "";
    const wid  = block.id.replace("block_", "");
    const info = weekDataMap[wid] || {};
    const hLocsCount = (info.hLocs || DEFAULT_HEALTH_LOCS).length;
    const wLocsCount = (info.wLocs || DEFAULT_WIND_LOCS).length;
    const locSels = [...block.querySelectorAll(".loc-sel")];
    const locInps = [...block.querySelectorAll(".loc-inp")];
    const resolvedLocs = locSels.map((s, i) => getLocName(s, locInps[i]));
    const hLocNames = resolvedLocs.slice(0, hLocsCount);
    const wLocNames = resolvedLocs.slice(hLocsCount, hLocsCount + wLocsCount);

    const hSpan = itemOnlyMode ? hLocNames.length : hLocNames.length * 2;
    const wSpan = itemOnlyMode ? wLocNames.length : wLocNames.length * 2;
    let hr1 = `<tr><th class="th-week" rowspan="3">品項</th><th class="th-health" colspan="${hSpan}">【健康餐】</th><th class="th-wind" colspan="${wSpan}">【風味餐】</th></tr>`;
    let hr2 = "<tr>";

    // read qty values from DOM
    const locQtyInps = [...block.querySelectorAll(".loc-qty-inp")];
    const hQtyVals = hLocNames.map((_, i) => locQtyInps[i]?.value || "");
    const wQtyVals = wLocNames.map((_, i) => locQtyInps[hLocNames.length + i]?.value || "");
    // 讀子地點
    const hSubL = _readSubLocs(block, 0, hLocNames.length);
    const wSubL = _readSubLocs(block, hLocNames.length, wLocNames.length);

    hLocNames.forEach((loc, i) => {
      const qty = hQtyVals[i];
      const qtyBadge = qty ? `<span style="display:inline-block;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;margin-left:4px;display:inline-flex;align-items:center;gap:1px;">✦${qty}份</span>` : "";
      const subBadges = ((hSubL[i]||[]).length ? `<span style="display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;margin-top:3px;">${(hSubL[i]||[]).map(s=>`<span style="display:inline-flex;align-items:center;gap:3px;">${s.name}${s.qty?`<span style="display:inline-flex;align-items:center;gap:1px;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;">✦${s.qty}份</span>`:""}</span>`).join("")}</div>` : "");
      const hTotal = (() => { const subs = hSubL[i]||[]; if (!subs.length) return ""; let t = parseInt(hQtyVals[i])||0; subs.forEach(s=>{ t += parseInt(s.qty)||0; }); return t > 0 ? `<div style="font-size:0.78rem;font-weight:700;white-space:nowrap;background:rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:1px 8px;margin-bottom:6px;align-self:center;">共 <span style="color:#ff4d4d;">${t}</span> 份</div>` : ""; })();
      hr2 += `<th class="${i%2===0?"th-hloc":"th-hloc-light"}" colspan="${itemOnlyMode?1:2}" style=""><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 6px;">${hTotal}<div style="display:flex;align-items:center;flex-wrap:nowrap;white-space:nowrap;">${loc}${qtyBadge}</div>${subBadges}</div></th>`;
    });
    wLocNames.forEach((loc, i) => {
      const qty = wQtyVals[i];
      const qtyBadge = qty ? `<span style="display:inline-block;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;margin-left:4px;display:inline-flex;align-items:center;gap:1px;">✦${qty}份</span>` : "";
      const subBadges = ((wSubL[i]||[]).length ? `<span style="display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;margin-top:3px;">${(wSubL[i]||[]).map(s=>`<span style="display:inline-flex;align-items:center;gap:3px;">${s.name}${s.qty?`<span style="display:inline-flex;align-items:center;gap:1px;background:rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:2px 7px 2px 5px;font-size:0.85rem;font-weight:700;">✦${s.qty}份</span>`:""}</span>`).join("")}</div>` : "");
      const wTotal = (() => { const subs = wSubL[i]||[]; if (!subs.length) return ""; let t = parseInt(wQtyVals[i])||0; subs.forEach(s=>{ t += parseInt(s.qty)||0; }); return t > 0 ? `<div style="font-size:0.78rem;font-weight:700;white-space:nowrap;background:rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.18);border-radius:20px;padding:1px 8px;margin-bottom:6px;align-self:center;">共 <span style="color:#ff4d4d;">${t}</span> 份</div>` : ""; })();
      hr2 += `<th class="${i%2===0?"th-wloc":"th-wloc-light"}" colspan="${itemOnlyMode?1:2}" style=""><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 6px;">${wTotal}<div style="display:flex;align-items:center;flex-wrap:nowrap;white-space:nowrap;">${loc}${qtyBadge}</div>${subBadges}</div></th>`;
    });
    hr2 += "</tr>";
    let hr3 = "<tr>";
    if (!itemOnlyMode) {
      hLocNames.forEach((_, i) => ["類別","品項"].forEach(l => { hr3 += `<th class="th-sub ${i%2===0?"th-sub-h":"th-sub-h-light"}">${l}</th>`; }));
      wLocNames.forEach((_, i) => ["類別","品項"].forEach(l => { hr3 += `<th class="th-sub ${i%2===0?"th-sub-w":"th-sub-w-light"}">${l}</th>`; }));
    } else {
      hLocNames.forEach((_, i) => { hr3 += `<th class="th-sub ${i%2===0?"th-sub-h":"th-sub-h-light"}">品項</th>`; });
      wLocNames.forEach((_, i) => { hr3 += `<th class="th-sub ${i%2===0?"th-sub-w":"th-sub-w-light"}">品項</th>`; });
    }
    hr3 += "</tr>";

    let rowsHTML = "";
    block.querySelectorAll("table tr").forEach(tr => {
      const catTd = tr.querySelector(".td-cat");
      if (!catTd) return;
      if (tr.classList.contains('row-collapsed')) return;
      const rowName = catTd.textContent;
      const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
      const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
      const [hS, hS2, wS, wS2] = getRowStyles(rowName);
      rowsHTML += `<tr><td class="td-cat">${rowName}</td>`;
      sels1.forEach((s1, i) => {
        const isH = i < hLocNames.length;
        const baseS = isH ? hS : wS;
        const baseS2 = isH ? hS2 : wS2;
        const v1 = s1.value && s1.value !== "-" ? s1.value : "";
        const rawV2 = inps2[i]?.value || "";
        const v2 = rawV2 && rawV2 !== "-" && rawV2 !== "-- 品項 --" ? rawV2 : "";
        let itemBgStyle = "";
        if (v2) {
          const colors = getFoodColors(v2);
          if (colors) itemBgStyle = `background:${colors.bg};color:${colors.fg};`;
        }
        if (!itemOnlyMode) {
          rowsHTML += `<td class="td-l1 ${baseS}" style="padding:4px 6px;">${v1}</td>`;
          rowsHTML += `<td class="td-l2 ${baseS2}" style="padding:4px 6px;font-weight:600;${itemBgStyle}">${v2}</td>`;
        } else {
          rowsHTML += `<td class="td-l2 ${baseS2}" style="padding:4px 6px;font-weight:600;${itemBgStyle}">${v2}</td>`;
        }
      });
      rowsHTML += "</tr>";
    });

    tablesHTML += `<div class="week-block" style="margin-bottom:28px;"><div class="week-titlebar"><span class="week-label">日期：${date}</span>${(day && day !== "請選日期") ? `<span class="week-day">${day}</span>` : ""}</div><div class="tbl-wrap"><table>${hr1}${hr2}${hr3}${rowsHTML}</table></div></span>`;
  });

  // 建立離屏 iframe 來渲染（寬度依欄數動態計算）
  let totalCols = 0;
  blocks.forEach((block) => {
    const wid = block.id.replace("block_", "");
    const info = weekDataMap[wid] || {};
    const hC = (info.hLocs || DEFAULT_HEALTH_LOCS).length;
    const wC = (info.wLocs || DEFAULT_WIND_LOCS).length;
    const cols = itemOnlyMode ? (hC + wC) : (hC + wC) * 2;
    if (cols > totalCols) totalCols = cols;
  });
  const colWidth = itemOnlyMode ? 160 : 200;
  const iframeWidth = Math.max(900, 60 + totalCols * colWidth + 40);
  const iframe = document.createElement("iframe");
  iframe.style.cssText = `position:fixed;left:-9999px;top:0;width:${iframeWidth}px;height:auto;border:none;visibility:hidden;`;
  document.body.appendChild(iframe);
  const iDoc = iframe.contentDocument || iframe.contentWindow.document;
  iDoc.open();

// ===== 匯出所有歷史 Excel 檔（單張工作表，攤平格式） =====
function exportAllHistoryExcel() {
  if (historyList.length === 0) { alert("目前沒有歷史紀錄可匯出。"); return; }

  const from = document.getElementById('export-date-from')?.value || '';
  const to   = document.getElementById('export-date-to')?.value   || '';

  const sorted = [...historyList]
    .filter(e => {
      if (from && e.date < from) return false;
      if (to   && e.date > to)   return false;
      return true;
    })
    .sort((a, b) => new Date(a.date || "2000-01-01") - new Date(b.date || "2000-01-01"));

  if (sorted.length === 0) { alert("篩選後沒有符合日期區間的歷史紀錄。"); return; }

  // 固定欄位順序：主菜、副主菜、米飯、1~7
  const FIXED_ROWS = ["主菜", "副主菜", "米飯", "1", "2", "3", "4", "5", "6", "7"];

  // 第一列標頭
  const header = ["日期", "類別", "主菜", "副主菜", "米飯", "1", "2", "3", "4", "5", "6", "7"];
  const allRows = [header];

  sorted.forEach(entry => {
    const hLocs = entry.hLocs || [];
    const wLocs = entry.wLocs || [];
    const allLocs = [...hLocs, ...wLocs];

    // 輔助：輸出一列資料（地點、kind、qty、cells col index）
    function pushLocRow(locName, kind, qty, colIdx) {
      const qtyStr = qty ? `(${qty}份)` : "";
      const label = `${kind}-${locName}${qtyStr}-品項`;
      const dataRow = [entry.date, label];
      FIXED_ROWS.forEach(rowKey => {
        const found = (entry.cells || []).find(c => c.row === rowKey && c.col === colIdx);
        const v2 = (found?.v2 && found.v2 !== "-" && found.v2 !== "-- 品項 --") ? found.v2 : "";
        dataRow.push(v2);
      });
      allRows.push(dataRow);
    }

    // 為每個主地點輸出一列，子地點也各自輸出一列（品項內容相同，只有地點/份數不同）
    allLocs.forEach((loc, locIdx) => {
      const isHealth = locIdx < hLocs.length;
      const kind = isHealth ? "健康餐" : "風味餐";
      const qty = isHealth
        ? ((entry.hQtys || [])[locIdx] || "")
        : ((entry.wQtys || [])[locIdx - hLocs.length] || "");
      pushLocRow(loc, kind, qty, locIdx);

      // 子地點（同份菜單，品項 col 與主地點相同）
      const subArr = isHealth
        ? ((entry.hSubLocs || [])[locIdx] || [])
        : ((entry.wSubLocs || [])[locIdx - hLocs.length] || []);
      subArr.forEach(s => {
        if (s.name) pushLocRow(s.name, kind, s.qty, locIdx);
      });
    });
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(allRows);

  // 設定欄寬
  ws['!cols'] = [
    { wch: 12 }, // 日期
    { wch: 20 }, // 類別
    { wch: 14 }, // 主菜
    { wch: 10 }, // 副主菜
    { wch: 8  }, // 米飯
    { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 },
    { wch: 10 }, { wch: 10 }, { wch: 10 }
  ];

  XLSX.utils.book_append_sheet(wb, ws, "歷史菜單");

  const dateStr = new Date().toLocaleDateString("zh-TW").replace(/\//g,"-");
  XLSX.writeFile(wb, `menu_allhistory_${dateStr}.xlsx`);
  showSaveToast("📊 歷史 Excel 已匯出");
}

// ===== 匯出品項類別 Excel 檔 =====
function exportCategoryExcel() {
  const wb = XLSX.utils.book_new();

  // 工作表1：類別品項
  const catRows = [["類別", "品項"]];
  Object.entries(DB).forEach(([cat, items]) => {
    items.filter(i => i !== "-").forEach(item => {
      catRows.push([cat, item]);
    });
  });
  const wsCat = XLSX.utils.aoa_to_sheet(catRows);
  XLSX.utils.book_append_sheet(wb, wsCat, "類別品項");

  // 工作表2：顏色分組
  const colorRows = [["顏色組", "顯示名稱", "品項"]];
  Object.entries(COLOR_GROUPS).forEach(([key, g]) => {
    g.items.forEach(item => {
      colorRows.push([key, g.label, item]);
    });
  });
  const wsColor = XLSX.utils.aoa_to_sheet(colorRows);
  XLSX.utils.book_append_sheet(wb, wsColor, "顏色分組");

  // 工作表3：料理DB
  // 每道料理一列，食材1/用量1、食材2/用量2… 橫向展開
  // 先算最多幾個食材（決定欄數）
  const maxIng = Object.values(DISH_DB).reduce((m, d) =>
    Math.max(m, Array.isArray(d.ingredients) ? d.ingredients.length : 0), 0);
  const dishHeader = ["料理名稱", "類別", "待審"];
  for (let i = 1; i <= maxIng; i++) {
    dishHeader.push(`食材${i}`, `用量${i}(g)`);
  }
  const dishRows = [dishHeader];
  Object.entries(DISH_DB).forEach(([name, data]) => {
    const row = [
      name,
      data.category || "",
      data.review ? "是" : "否"
    ];
    const ings = Array.isArray(data.ingredients) ? data.ingredients : [];
    for (let i = 0; i < maxIng; i++) {
      if (ings[i]) {
        row.push(ings[i].ingredient || "", ings[i].grams ?? "");
      } else {
        row.push("", "");
      }
    }
    dishRows.push(row);
  });
  const wsDish = XLSX.utils.aoa_to_sheet(dishRows);
  XLSX.utils.book_append_sheet(wb, wsDish, "料理DB");

  const dateStr = new Date().toLocaleDateString("zh-TW").replace(/\//g,"-");
  XLSX.writeFile(wb, `menu_db_${dateStr}.xlsx`);
  showSaveToast("🗂️ 資料庫 Excel 已匯出（品項類別 + 顏色分組 + 料理DB）");
}

async function applyMenuData(saved) {
  _isLoading = true;   // 開始載入，禁止自動儲存觸發

  if (!saved || !saved.data) return false;

  weekCount = 0;
  document.getElementById("scheduleArea").innerHTML = "";
  weekDataMap = {};

  saved.data.forEach(item => {
    weekCount++;
    const wid = `w${weekCount}`;
    const block = buildWeek(weekCount, item.hLocs, item.wLocs, item.hQtys, item.wQtys);
    document.getElementById("scheduleArea").appendChild(block);

    const di = block.querySelector(".week-date");
    if (di && item.date) {
      di.value = item.date;
      di.dispatchEvent(new Event("change"));
    }

    const locSels = [...block.querySelectorAll(".loc-sel")];
    const locInps = [...block.querySelectorAll(".loc-inp")];
    const locQtys = [...block.querySelectorAll(".loc-qty-inp")];
    const allLocs = [...(item.hLocs||[]), ...(item.wLocs||[])];
    const allQtys = [...(item.hQtys||[]), ...(item.wQtys||[])];
    allLocs.forEach((loc, i) => {
      const s = locSels[i]; const inp = locInps[i];
      if (!s) return;
      s.style.display = "none";
      if(inp) { inp.style.display="flex"; inp.value=loc; }
      if(locQtys[i] && allQtys[i]) locQtys[i].value = allQtys[i];
    });

    const rowMap = {};
    block.querySelectorAll("table tr").forEach(tr => {
      const catTd = tr.querySelector(".td-cat");
      if (!catTd) return;
      rowMap[catTd.textContent] = tr;
    });
    (item.cells || []).forEach(c => {
      const tr = rowMap[c.row]; if (!tr) return;
      const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
      const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
      const s1 = sels1[c.col]; const inp2 = inps2[c.col];
      if (s1 && c.v1) {
        s1.value = c.v1;
        s1.dispatchEvent(new Event("change"));
        setTimeout(() => {
          if (inp2 && c.v2 && c.v2 !== "-" && c.v2 !== "-- 品項 --") {
            inp2.value = c.v2;
            if (inp2._applyColor) inp2._applyColor(c.v2);
          }
        }, 50);
      }
    });

    // 套用子地點
    const hLen = (item.hLocs||[]).length;
    _applySubLocs(block, 0, item.hSubLocs || []);
    _applySubLocs(block, hLen, item.wSubLocs || []);
  });
  // setTimeout 裡還有 dispatchEvent，等它們都跑完後才關旗標
  setTimeout(() => {
    _isLoading = false;
    // 清除載入期間意外排進去的 save（透過旗標讓 scheduleAutoSave 重新判斷）
  }, 300);
  return true;
}

function getFoodColors(item) {
  const key = FOOD_COLOR[item];
  if (!key) return null;
  return { bg: COLOR_GROUPS[key].bg, fg: COLOR_GROUPS[key].fg || "#333" };
}

function makeColPair(rowKey, defaultStyle, defaultStyleL2, side) {
  let cats = ROW_CATS[rowKey] || [];



  const sel1 = document.createElement("select");
  sel1.className = "sel-l1";
  sel1.innerHTML = cats.map(c =>
    `<option value="${c}" ${c==="-"?"selected":""}>${c === "-" ? "" : c}</option>`
  ).join("");

  const td1 = document.createElement("td");
  td1.className = `td-l1 ${defaultStyle}`;
  const td2 = document.createElement("td");
  td2.className = `td-l2 ${defaultStyleL2}`;

  const inp2 = document.createElement("input");
  inp2.type = "text";
  inp2.className = "sel-l2-inp";
  inp2.placeholder = "品項";
  inp2.autocomplete = "off";

  function populateDatalistFromCat(cat) {
    const items = DB[cat] || [];
    _allItems = items.filter(i => i !== "-");
    // 也加入同類別料理
    (DISH_BY_CAT[cat] || []).forEach(d => { if (!_allItems.includes(d)) _allItems.push(d); });
  }

  function buildFullDatalist() {
    const allItems = new Set();
    cats.filter(c => c !== "-").forEach(c => {
      (DB[c] || []).filter(i => i !== "-").forEach(i => allItems.add(i));
    });
    // 加入料理庫
    Object.keys(DISH_DB).forEach(d => allItems.add(d));
    _allItems = [...allItems];
  }

  // ── 自訂 fuzzy dropdown ──
  let _allItems = [];
  let _activeIdx = -1;
  let _isSelecting = false;

  const dropdown = document.createElement("div");
  dropdown.className = "fuzzy-dropdown";
  dropdown.style.display = "none";
  document.body.appendChild(dropdown);

  // 用事件委派，同時處理 mouse 和 touch，掛一次就夠
  function _onDropdownSelect(e) {
    const item = e.target.closest(".fuzzy-dropdown-item");
    if (!item) return;
    e.preventDefault();
    e.stopPropagation();
    _isSelecting = true;
    selectItem(item.dataset.val);
    setTimeout(() => { _isSelecting = false; }, 300);
  }
  dropdown.addEventListener("mousedown", _onDropdownSelect);
  dropdown.addEventListener("touchstart", _onDropdownSelect, { passive: false });

  function positionDropdown() {
    const rect = inp2.getBoundingClientRect();
    dropdown.style.left = (rect.left + window.scrollX) + "px";
    dropdown.style.top  = (rect.bottom + window.scrollY + 2) + "px";
    dropdown.style.width = Math.max(rect.width, 120) + "px";
  }

  function makeDishItemHtml(item, kw) {
    const isReview = DISH_NEEDS_REVIEW.has(item);
    const style = isReview
      ? `style="color:#c0392b;font-weight:700;"` 
      : `style="color:#1a6e3c;font-weight:700;"`;
    const prefix = `<span ${style}>🍽 `;
    if (!kw) return `<div class="fuzzy-dropdown-item" data-val="${item}">${prefix}${item}</span></div>`;
    const idx = item.toLowerCase().indexOf(kw);
    if (idx < 0) return `<div class="fuzzy-dropdown-item" data-val="${item}">${prefix}${item}</span></div>`;
    const hi = item.slice(0, idx) + `<mark>${item.slice(idx, idx+kw.length)}</mark>` + item.slice(idx+kw.length);
    return `<div class="fuzzy-dropdown-item" data-val="${item}">${prefix}${hi}</span></div>`;
  }

  function showDropdown(keyword) {
    const showAll = (!keyword || keyword === "_all_");
    const matched = showAll
      ? _allItems
      : _allItems.filter(i => i.toLowerCase().includes(keyword.toLowerCase()));
    if (!matched.length) { hideDropdown(); return; }
    const kw = showAll ? "" : keyword.toLowerCase();
    _activeIdx = -1;

    const matchedDishes = matched.filter(i => DISH_NAMES.has(i));
    const matchedIngredients = matched.filter(i => !DISH_NAMES.has(i));

    // 若為主菜且無關鍵字 → 依 MENU_GROUPS 分組顯示
    const groups = MENU_GROUPS[rowKey];
    if (showAll && groups && groups.length) {
      const matchedSet = new Set(matched);
      let html = "";
      groups.forEach(g => {
        const groupItems = g.items.filter(item => matchedSet.has(item));
        if (!groupItems.length) return;
        html += `<div class="fuzzy-dropdown-group">${g.label}</div>`;
        groupItems.forEach(item => {
          html += `<div class="fuzzy-dropdown-item" data-val="${item}">${item}</div>`;
        });
      });
      const groupedItems = new Set(groups.flatMap(g => g.items));
      const ungrouped = matchedIngredients.filter(item => !groupedItems.has(item));
      if (ungrouped.length) {
        ungrouped.forEach(item => {
          html += `<div class="fuzzy-dropdown-item" data-val="${item}">${item}</div>`;
        });
      }
      if (matchedDishes.length) {
        html += `<div class="fuzzy-dropdown-group">🍽 料理</div>`;
        matchedDishes.forEach(item => { html += makeDishItemHtml(item, kw); });
      }
      dropdown.innerHTML = html;
    } else {
      let html = matchedIngredients.map(item => {
        if (!kw) return `<div class="fuzzy-dropdown-item" data-val="${item}">${item}</div>`;
        const idx = item.toLowerCase().indexOf(kw);
        if (idx < 0) return `<div class="fuzzy-dropdown-item" data-val="${item}">${item}</div>`;
        const hi = item.slice(0, idx) + `<mark>${item.slice(idx, idx+keyword.length)}</mark>` + item.slice(idx+keyword.length);
        return `<div class="fuzzy-dropdown-item" data-val="${item}">${hi}</div>`;
      }).join("");
      if (matchedDishes.length) {
        if (matchedIngredients.length) html += `<div class="fuzzy-dropdown-group">🍽 料理</div>`;
        html += matchedDishes.map(item => makeDishItemHtml(item, kw)).join("");
      }
      dropdown.innerHTML = html;
    }
    positionDropdown();
    dropdown.style.display = "block";
  }

  function hideDropdown() {
    dropdown.style.display = "none";
    _activeIdx = -1;
  }

  function selectItem(val) {
    _isSelecting = true;
    inp2.value = val;
    hideDropdown();
    if (sel1.value === "-") {
      if (DISH_DB[val]) {
        const dishCat = DISH_DB[val].category;
        // 若 cats 裡有就直接選
        if (cats.includes(dishCat)) {
          sel1.value = dishCat;
          populateDatalistFromCat(dishCat);
        } else {
          // 動態加入 option
          const opt = document.createElement('option');
          opt.value = dishCat;
          opt.textContent = dishCat;
          sel1.appendChild(opt);
          sel1.value = dishCat;
          populateDatalistFromCat(dishCat);
        }
      } else {
        for (const cat of cats) {
          if (cat === "-") continue;
          if ((DB[cat] || []).includes(val)) {
            sel1.value = cat;
            populateDatalistFromCat(cat);
            break;
          }
        }
      }
    }
    applyItemColor(val);
    scheduleAutoSave();
    inp2.blur();
    setTimeout(() => { _isSelecting = false; }, 300);
  }

  // 鍵盤導航
  inp2.addEventListener("keydown", e => {
    if (dropdown.style.display === "none") return;
    const items = dropdown.querySelectorAll(".fuzzy-dropdown-item");
    if (e.key === "ArrowDown") {
      e.preventDefault();
      _activeIdx = Math.min(_activeIdx + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle("active", i === _activeIdx));
      if (items[_activeIdx]) items[_activeIdx].scrollIntoView({ block: "nearest" });
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      _activeIdx = Math.max(_activeIdx - 1, 0);
      items.forEach((el, i) => el.classList.toggle("active", i === _activeIdx));
      if (items[_activeIdx]) items[_activeIdx].scrollIntoView({ block: "nearest" });
    } else if (e.key === "Enter") {
      if (_activeIdx >= 0 && items[_activeIdx]) {
        e.preventDefault();
        selectItem(items[_activeIdx].dataset.val);
      }
    } else if (e.key === "Escape") {
      hideDropdown();
    }
  });

  // 視窗 resize/scroll 時重新定位
  window.addEventListener("scroll", () => { if (dropdown.style.display !== "none") positionDropdown(); }, true);
  window.addEventListener("resize", () => { if (dropdown.style.display !== "none") positionDropdown(); });

  function applyClosedState() {
    buildFullDatalist();  // 讓 L1="-" 時也能從品項欄直接選
    inp2.value = "";
    inp2.disabled = false;
    inp2.style.background = "";
    inp2.style.color = "";
    inp2.style.fontWeight = "";
    inp2.style.borderColor = "";
    td2.style.background = "";
    td2.style.color = "";
    td2.className = `td-l2 ${defaultStyleL2}`;
  }
  applyClosedState();

  function applyItemColor(item) {
    if (!item || item === "-" || item === "-- 品項 --") {
      td2.style.background = ""; td2.style.color = "";
      inp2.style.background = ""; inp2.style.color = "";
      inp2.style.fontWeight = ""; inp2.style.borderColor = "";
      td2.className = `td-l2 ${defaultStyleL2}`;
    } else if (DISH_NAMES.has(item)) {
      const isReview = DISH_NEEDS_REVIEW.has(item);
      const bg = isReview ? "#fdecea" : "#e8f5e9";
      const fg = isReview ? "#c0392b" : "#1a6e3c";
      td2.style.background = bg; td2.style.color = fg;
      inp2.style.background = bg; inp2.style.color = fg;
      inp2.style.fontWeight = "700"; inp2.style.borderColor = "transparent";
    } else {
      const colors = getFoodColors(item);
      if (colors) {
        td2.style.background = colors.bg; td2.style.color = colors.fg;
        inp2.style.background = colors.bg; inp2.style.color = colors.fg;
        inp2.style.fontWeight = "600"; inp2.style.borderColor = "transparent";
      } else {
        td2.style.background = ""; td2.style.color = "";
        inp2.style.background = ""; inp2.style.color = "";
        inp2.style.fontWeight = "600"; inp2.style.borderColor = "transparent";
        td2.className = `td-l2 ${defaultStyleL2}`;
      }
    }
  }

  sel1.addEventListener("change", () => {
    const cat = sel1.value;
    td2.className = `td-l2 ${defaultStyleL2}`;
    td2.style.background = ""; td2.style.color = "";
    inp2.style.color = ""; inp2.style.fontWeight = ""; inp2.style.borderColor = "";
    hideDropdown();
    if (!cat || cat === "-") { applyClosedState(); scheduleAutoSave(); return; }
    populateDatalistFromCat(cat);
    inp2.value = "";
    inp2.disabled = false;
    inp2.style.background = ""; inp2.style.color = "";
    scheduleAutoSave();
  });

  // 取得目前合法選項
  function getValidItems() {
    return _allItems;
  }

  inp2.addEventListener("input", () => {
    const item = inp2.value.trim();
    applyItemColor(item);
    if (!_isSelecting) showDropdown(item);

    // Auto-fill L1 category if item typed directly and matches a known item
    if (item && sel1.value === "-") {
      for (const cat of cats) {
        if (cat === "-") continue;
        if ((DB[cat] || []).includes(item)) {
          sel1.value = cat;
          populateDatalistFromCat(cat);
          break;
        }
      }
    }
    // 品項清空時，自動清空第一層類別
    if (!item) {
      sel1.value = "-";
      buildFullDatalist();
    }
    scheduleAutoSave();
  });

  // 離開欄位時：關閉下拉選單，允許自行輸入的內容保留
  inp2.addEventListener("blur", () => {
    if (_isSelecting) return;
    setTimeout(() => {
      if (_isSelecting) return;
      hideDropdown();
    }, 350);
  });

  // Allow typing even when cat not selected (auto mode)
  inp2.addEventListener("focus", () => {
    if (inp2.disabled) return;
    if (sel1.value === "-") {
      buildFullDatalist();
    }
    showDropdown(inp2.value.trim() || "_all_");
  });

  // 暴露給外部直接呼叫，不走事件流程
  inp2._applyColor = applyItemColor;
  inp2._reset = applyClosedState;

  // ── 料理 Tooltip ──
  inp2.addEventListener('mouseenter', e => {
    if (DISH_NAMES.has(inp2.value)) showDishTooltip(inp2.value, e);
  });
  inp2.addEventListener('mousemove', e => {
    if (DISH_NAMES.has(inp2.value)) positionDishTooltip(e);
  });
  inp2.addEventListener('mouseleave', hideDishTooltip);

  // ── 品項複製 / 貼上按鈕 ──
  const cpWrap = document.createElement("div");
  cpWrap.className = "item-cp-wrap";

  const itemCopyBtn = document.createElement("button");
  itemCopyBtn.className = "item-cp-btn";
  itemCopyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="13" height="15" rx="2"/><path d="M16 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h3"/></svg>`;
  itemCopyBtn.title = "複製此品項";
  itemCopyBtn.addEventListener("mousedown", e => {
    e.preventDefault(); e.stopPropagation();
    copyItem(sel1.value, inp2.value, itemCopyBtn);
  });

  const itemPasteBtn = document.createElement("button");
  itemPasteBtn.className = "item-cp-btn item-paste-btn";
  itemPasteBtn.textContent = "📋";
  itemPasteBtn.title = "貼上品項";
  itemPasteBtn.addEventListener("mousedown", e => {
    e.preventDefault(); e.stopPropagation();
    pasteItem(sel1, inp2);
  });

  cpWrap.appendChild(itemCopyBtn);
  cpWrap.appendChild(itemPasteBtn);

  td1.appendChild(sel1);
  td2.appendChild(inp2);
  td2.appendChild(cpWrap);
  return [td1, td2];
}

// ===== 地點欄複製 =====
function copyLocColumn(block, colIdx, copyBtn) {
  const cells = [];
  block.querySelectorAll("table tr").forEach(tr => {
    const catTd = tr.querySelector(".td-cat");
    if (!catTd) return;
    const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
    const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
    const s1 = sels1[colIdx];
    const i2 = inps2[colIdx];
    if (!s1) return;
    cells.push({
      row: catTd.textContent,
      v1: s1.value || "-",
      v2: i2 ? (i2.value || "") : ""
    });
  });
  _locClipboard = { cells };

  // 視覺回饋：複製按鈕變色
  copyBtn.classList.add("copied");
  copyBtn.textContent = "✓已複製";
  setTimeout(() => {
    copyBtn.classList.remove("copied");
    copyBtn.textContent = "複製";
  }, 2000);

  // 顯示所有貼上按鈕
  document.querySelectorAll("th._pasteBtn, th[data-paste-col]").forEach(el => {});
  document.querySelectorAll(".week-block table tr:nth-child(2) th").forEach(th => {
    if (th._pasteBtn) th._pasteBtn.style.display = "";
  });

  showSaveToast("📋 已複製此欄品項，可貼上到其他地點");
}

// ===== 地點欄貼上 =====
function pasteLocColumn(block, colIdx) {
  if (!_locClipboard) { showSaveToast("⚠️ 尚未複製任何欄位"); return; }

  const rowMap = {};
  block.querySelectorAll("table tr").forEach(tr => {
    const catTd = tr.querySelector(".td-cat");
    if (!catTd) return;
    rowMap[catTd.textContent] = tr;
  });

  // 先讓所有 input 失焦，避免貼上時觸發 dropdown
  document.activeElement?.blur();

  _locClipboard.cells.forEach(c => {
    const tr = rowMap[c.row]; if (!tr) return;
    const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
    const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
    const s1 = sels1[colIdx];
    const i2 = inps2[colIdx];
    if (!s1) return;

    // 設定 L1（不用 dispatchEvent，直接更新 datalist）
    s1.value = c.v1;

    // 直接設 L2 + 套顏色，完全不觸發任何事件
    if (i2 && c.v2) {
      i2.value = c.v2;
      if (i2._applyColor) i2._applyColor(c.v2);
    } else if (i2) {
      if (i2._reset) i2._reset();
    }
  });

  scheduleAutoSave();
  showSaveToast("✅ 已貼上品項到此欄");
}

// ===== 品項格子複製 =====
function copyItem(v1, v2, btn) {
  if (!v2 || v2 === "-" || v2 === "-- 品項 --") {
    showSaveToast("⚠️ 此格無品項可複製"); return;
  }
  _itemClipboard = { v1, v2 };
  document.body.classList.add("has-item-clipboard");
  if (btn) {
    const origHTML = btn.innerHTML;
    btn.textContent = "✓";
    btn.classList.add("item-copied");
    setTimeout(() => { btn.innerHTML = origHTML; btn.classList.remove("item-copied"); }, 1500);
  }
  showSaveToast(`📋 已複製：${v2}`);
}

// ===== 品項格子貼上 =====
function pasteItem(sel1, inp2) {
  if (!_itemClipboard) { showSaveToast("⚠️ 尚未複製任何品項"); return; }
  const { v1, v2 } = _itemClipboard;
  if (v1 && v1 !== "-") {
    sel1.value = v1;
    sel1.dispatchEvent(new Event("change"));
  }
  setTimeout(() => {
    inp2.value = v2;
    if (inp2._applyColor) inp2._applyColor(v2);
    scheduleAutoSave();
  }, 30);
}

// ===== 地點欄清除 =====
function clearLocColumn(block, colIdx) {
  if (!confirm("確定清空此地點的所有菜單內容？")) return;

  const rowMap = {};
  block.querySelectorAll("table tr").forEach(tr => {
    const catTd = tr.querySelector(".td-cat");
    if (!catTd) return;
    rowMap[catTd.textContent] = tr;
  });

  Object.values(rowMap).forEach(tr => {
    const sels1 = [...tr.querySelectorAll("td.td-l1 select")];
    const inps2 = [...tr.querySelectorAll("td.td-l2 input.sel-l2-inp")];
    const s1 = sels1[colIdx];
    const i2 = inps2[colIdx];
    if (s1) s1.value = "-";
    if (i2) i2._reset ? i2._reset() : (i2.value = "");
  });

  scheduleAutoSave();
  showSaveToast("🗑️ 已清空此欄品項");
}

  inp.addEventListener("dblclick", () => {

  qtyInp.addEventListener("blur", () => {

      const locName = inp.style.display === "none" ? (sel.value && sel.value !== "__custom__" ? sel.value : "") : inp.value.trim();
      if (!locName) {
        showWarningModal("請先輸入地點名稱，\n再填寫份數！", []);
        qtyInp.value = "";
        scheduleAutoSave();
      }

  const qtyUnit = document.createElement("span");
  qtyUnit.className = "loc-qty-unit";
  qtyUnit.textContent = "份";

  qtyWrap.appendChild(qtyStar);
  qtyWrap.appendChild(qtyInp);
  qtyWrap.appendChild(qtyUnit);

  const delBtn = document.createElement("button");
  delBtn.textContent = "✕";
  delBtn.title = "刪除此欄";
  delBtn.style.cssText = "background:transparent;border:none;color:inherit;opacity:0.4;font-size:0.85rem;padding:2px 4px;cursor:pointer;line-height:1;transition:opacity 0.15s;";
  delBtn.addEventListener("mouseenter", () => { delBtn.style.opacity = "0.9"; });
  delBtn.addEventListener("mouseleave", () => { delBtn.style.opacity = "0.4"; });
  delBtn.addEventListener("click", onDelete);

  // ── 複製按鈕 ──
  const copyBtn = document.createElement("button");
  copyBtn.className = "loc-cp-btn";
  copyBtn.title = "複製此欄品項";
  copyBtn.textContent = "複製";
  copyBtn.addEventListener("click", () => {
    if (onCopy) onCopy(copyBtn);
  });

  // ── 貼上按鈕 ──
  const pasteBtn = document.createElement("button");
  pasteBtn.className = "loc-cp-btn";
  pasteBtn.title = "貼上品項到此欄";
  pasteBtn.textContent = "貼上";
  pasteBtn.style.display = _locClipboard ? "" : "none";
  pasteBtn.addEventListener("click", () => {
    if (onPaste) onPaste();
  });
  // 每次顯示時根據 clipboard 狀態更新
  th._pasteBtn = pasteBtn;

  // ── 清除按鈕 ──
  const clearBtn = document.createElement("button");
  clearBtn.className = "loc-clear-btn";
  clearBtn.title = "清空此欄所有品項";
  clearBtn.textContent = "清除";
  clearBtn.addEventListener("click", () => {
    if (onClear) onClear();
  });

  wrap.appendChild(sel); wrap.appendChild(inp); wrap.appendChild(qtyWrap); wrap.appendChild(delBtn);
  outerWrap.appendChild(wrap);

  // ── 子地點清單（同欄附加地點） ──
  const subList = document.createElement("div");
  subList.className = "loc-sub-list";

  // 輔助：建立一個子地點 tag
  function makeSubItem(initName, initQty) {
    const item = document.createElement("div");
    item.className = "loc-sub-item";

    const nameInp = document.createElement("input");
    nameInp.type = "text";
    nameInp.className = "loc-sub-name";
    nameInp.placeholder = "地點";
    nameInp.value = initName || "";
    nameInp.addEventListener("input", scheduleAutoSave);

    const sep = document.createElement("span");
    sep.className = "loc-sub-sep";
    sep.textContent = "✦";

    const qtyI = document.createElement("input");
    qtyI.type = "text";
    qtyI.inputMode = "numeric";
    qtyI.className = "loc-sub-qty";
    qtyI.placeholder = "數量";
    qtyI.value = initQty || "";
    qtyI.addEventListener("input", () => {
      qtyI.value = qtyI.value.replace(/[^0-9]/g, "");
      if (qtyI.value && !nameInp.value.trim()) {
        showWarningModal("請先輸入地點名稱，\n再填寫份數！", []);
        setTimeout(() => { qtyI.value = ""; scheduleAutoSave(); }, 0);
        nameInp.focus();
        return;
      }
      scheduleAutoSave();
    });
    qtyI.addEventListener("blur", () => {
      if (qtyI.value && !nameInp.value.trim()) {
        showWarningModal("請先輸入地點名稱，\n再填寫份數！", []);
        qtyI.value = "";
        scheduleAutoSave();
      }
    });

    const unit = document.createElement("span");
    unit.className = "loc-sub-unit";
    unit.textContent = "份";

    const delS = document.createElement("button");
    delS.className = "loc-sub-del";
    delS.textContent = "✕";
    delS.title = "移除此附加地點";
    delS.addEventListener("click", () => {
      item.remove();
      if (th._updateTotal) th._updateTotal();
      scheduleAutoSave();
    });

    const qtyWrap = document.createElement("div");
    qtyWrap.className = "loc-sub-qty-wrap";
    qtyWrap.appendChild(sep);
    qtyWrap.appendChild(qtyI);
    qtyWrap.appendChild(unit);

    item.appendChild(nameInp);
    item.appendChild(qtyWrap);
    item.appendChild(delS);
    item._nameInp = nameInp;
    item._qtyInp = qtyI;
    return item;
  }

  // ── 「＋地點」按鈕 ──
  const addSubBtn = document.createElement("button");
